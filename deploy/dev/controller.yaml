# Dev controller: mock control plane on kind, no KVM, no PKI.
# --disable-pki-bootstrap makes the controller dial forkd over insecure gRPC,
# matching the no-TLS dev forkd. --mock forces the raw-forkd run path (the
# pod-native husk-pods default needs real KVM nodes, which the kind/no-KVM dev
# path lacks); --enable-raw-forkd is passed too as belt and suspenders so the
# dev overlay is explicit about running fork-per-claim, not husk pods. A single
# replica is enough for local dev.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-run-controller
  namespace: agent-run
  labels:
    app.kubernetes.io/name: agent-run
    app.kubernetes.io/component: controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agent-run
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent-run
        app.kubernetes.io/component: controller
    spec:
      serviceAccountName: agent-run-controller
      containers:
        - name: controller
          image: agent-run-controller:ci
          imagePullPolicy: IfNotPresent
          args:
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
            - --mock
            - --enable-raw-forkd
            - --disable-pki-bootstrap
          ports:
            - name: metrics
              containerPort: 8080
            - name: health
              containerPort: 8081
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-run-controller
  namespace: agent-run
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: agent-run-controller
rules:
  - apiGroups: ["agentrun.dev"]
    resources: ["sandboxtemplates", "sandboxpools", "sandboxclaims", "sandboxforks", "workspaces", "workspacerevisions"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["agentrun.dev"]
    resources: ["sandboxpools/status", "sandboxclaims/status", "sandboxforks/status", "workspaces/status", "workspacerevisions/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["agentrun.dev"]
    resources: ["sandboxclaims/finalizers", "sandboxforks/finalizers"]
    verbs: ["update"]
  - apiGroups: ["agentrun.dev"]
    resources: ["sandboxpools/scale"]
    verbs: ["get", "update"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "update"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshots"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: agent-run-controller
subjects:
  - kind: ServiceAccount
    name: agent-run-controller
    namespace: agent-run
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: agent-run-controller
