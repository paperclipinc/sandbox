# Dev controller: mock control plane on kind, no KVM, no PKI.
# --disable-pki-bootstrap makes the controller dial forkd over insecure gRPC,
# matching the no-TLS dev forkd. --mock forces the raw-forkd run path (the
# pod-native husk-pods default needs real KVM nodes, which the kind/no-KVM dev
# path lacks); --enable-raw-forkd is passed too as belt and suspenders so the
# dev overlay is explicit about running fork-per-claim, not husk pods. A single
# replica is enough for local dev.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mitos-controller
  namespace: mitos
  labels:
    app.kubernetes.io/name: mitos
    app.kubernetes.io/component: controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mitos
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mitos
        app.kubernetes.io/component: controller
    spec:
      serviceAccountName: mitos-controller
      containers:
        - name: controller
          image: mitos-controller:ci
          imagePullPolicy: IfNotPresent
          args:
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
            - --mock
            - --enable-raw-forkd
            - --disable-pki-bootstrap
          ports:
            - name: metrics
              containerPort: 8080
            - name: health
              containerPort: 8081
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mitos-controller
  namespace: mitos
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mitos-controller
rules:
  # workspaces + workspacerevisions: the Workspace reconciler owns the revision
  # DAG, and the claim reconciler (W4 slice 2) reads a bound workspace's head for
  # hydrate (get) and creates a dehydrated revision on terminate (create). A
  # missing list/watch here silently stalls the manager (the slice-1 lesson), so
  # the dev mock overlay carries the same grants as the base ClusterRole.
  - apiGroups: ["mitos.run"]
    resources: ["sandboxtemplates", "sandboxpools", "sandboxclaims", "sandboxforks", "workspaces", "workspacerevisions"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["mitos.run"]
    resources: ["sandboxpools/status", "sandboxclaims/status", "sandboxforks/status", "workspaces/status", "workspacerevisions/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["mitos.run"]
    resources: ["sandboxclaims/finalizers", "sandboxforks/finalizers"]
    verbs: ["update"]
  - apiGroups: ["mitos.run"]
    resources: ["sandboxpools/scale"]
    verbs: ["get", "update"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "update"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshots"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mitos-controller
subjects:
  - kind: ServiceAccount
    name: mitos-controller
    namespace: mitos
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mitos-controller
