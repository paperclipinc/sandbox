apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Dev overlay: a MOCK control plane for `mitos dev up` on kind (no KVM).
# The controller and forkd run in mock mode and the default pool gives
# `mitos sandbox create` something to claim. The CRDs are applied separately
# (`kubectl apply -f deploy/crds/`) because kustomize refuses to reference files
# outside this directory under its default load restrictor; `mitos dev up`
# applies the CRDs before this overlay.
resources:
  - namespace.yaml
  - controller.yaml
  - forkd.yaml
  - pool.yaml
