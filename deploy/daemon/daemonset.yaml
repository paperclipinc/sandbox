apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: mitos-forkd
  namespace: mitos
  labels:
    app.kubernetes.io/name: mitos
    app.kubernetes.io/component: forkd
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: mitos
      app.kubernetes.io/component: forkd
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mitos
        app.kubernetes.io/component: forkd
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9091"
        prometheus.io/path: "/metrics"
    spec:
      # ghcr-pull so the kubelet can pull ghcr.io/paperclipinc/mitos-forkd.
      imagePullSecrets:
        - name: ghcr-pull
      nodeSelector:
        mitos.run/kvm: "true"

      tolerations:
        - key: mitos.run/dedicated
          operator: Exists
          effect: NoSchedule

      containers:
        - name: forkd
          image: ghcr.io/paperclipinc/mitos-forkd:latest
          args:
            - --listen=:9090
            - --data-dir=/var/lib/mitos
            - --firecracker=/usr/local/bin/firecracker
            - --kernel=/var/lib/mitos/vmlinux
            - --http=:9091
            # Dedicated token-gated TLS listener for peer template
            # distribution. It is a SEPARATE port from --http: the CAS
            # surface is served here over TLS, while the sandbox
            # exec/files/metrics/healthz API on :9091 keeps its scheme
            # unchanged so SDK clients are unaffected. Effective only
            # when FORKD_PEER_TOKEN is set (with mTLS); the controller
            # derives this port to build each holder's CAS source URL.
            - --cas-listen=:9092
            - --tls-cert=/etc/forkd/tls/tls.crt
            - --tls-key=/etc/forkd/tls/tls.key
            - --tls-ca=/etc/forkd/ca/ca.crt
            # Guest agent injected as /init for OCI image template builds. The
            # binary ships in the forkd image at this path (Dockerfile.forkd).
            - --agent-bin=/usr/local/bin/agent
            # JAILER FOLLOW-UP: the per-VM jailer (uid/gid, chroot, cgroup) is
            # disabled here. forkd runs privileged: true (below) on the husk
            # path until jailer-in-pod lands. Re-add --jailer / --chroot-base /
            # --uid-range and drop privileged once the jailer runs inside the
            # forkd pod. Tracked as the jailer-in-pod follow-up.
          # FORKD_PEER_TOKEN is the shared bearer credential a peer
          # forkd must present to pull templates from this node's CAS.
          # It is read from the ENVIRONMENT, not a flag, so it is never
          # exposed in /proc/<pid>/cmdline (it is a credential). The
          # controller reads the SAME FORKD_PEER_TOKEN. Set it via a
          # Secret to enable the token-gated TLS CAS listener; left
          # unset, CAS distribution stays disabled. Example:
          # env:
          #   - name: FORKD_PEER_TOKEN
          #     valueFrom:
          #       secretKeyRef:
          #         name: mitos-peer-token
          #         key: token
          env:
            # forkd authenticates to ghcr/private registries when pulling OCI
            # template images. DOCKER_CONFIG points at the mounted docker-config
            # secret (the docker-config volume below). Unset = anonymous pulls.
            - name: DOCKER_CONFIG
              value: /etc/forkd/docker
          ports:
            - name: grpc
              containerPort: 9090
            - name: metrics
              containerPort: 9091
            # Dedicated token-gated TLS CAS listener (--cas-listen) for
            # peer template distribution; separate from the sandbox API.
            - name: cas
              containerPort: 9092
          # PRIVILEGED until jailer-in-pod lands (see the --agent-bin block).
          # Without the jailer, forkd needs unrestricted access to /dev/kvm,
          # /dev/net/tun, cgroups, and chroot to launch each VM; the trimmed
          # capability set only worked WITH the jailer mediating. The honest
          # regression is documented in docs/threat-model.md. Re-narrow to the
          # capability list once the jailer runs inside the pod.
          securityContext:
            privileged: true
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "16Gi"
              cpu: "8"
          volumeMounts:
            - name: data
              mountPath: /var/lib/mitos
            - name: kvm
              mountPath: /dev/kvm
            - name: tls
              mountPath: /etc/forkd/tls
              readOnly: true
            - name: ca
              mountPath: /etc/forkd/ca
              readOnly: true
            - name: docker-config
              mountPath: /etc/forkd/docker
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: 9091
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9091
            initialDelaySeconds: 30
            periodSeconds: 10

      volumes:
        - name: data
          hostPath:
            path: /var/lib/mitos
            type: DirectoryOrCreate
        - name: kvm
          hostPath:
            path: /dev/kvm
            type: CharDevice
        # Created by the controller's PKI bootstrap (EnsurePKI) at startup.
        - name: tls
          secret:
            secretName: mitos-forkd-tls
        # Only the CA certificate is projected; the CA private key in this
        # secret must never reach forkd.
        - name: ca
          secret:
            secretName: mitos-ca
            items:
              - key: ca.crt
                path: ca.crt
        # forkd's registry credentials for OCI template pulls. Reuses the
        # ghcr-pull dockerconfigjson secret, projected to the config.json name
        # the docker/containerd auth resolver reads under DOCKER_CONFIG.
        - name: docker-config
          secret:
            secretName: ghcr-pull
            items:
              - key: .dockerconfigjson
                path: config.json
