apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: mitos-forkd
  namespace: mitos
  labels:
    app.kubernetes.io/name: mitos
    app.kubernetes.io/component: forkd
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: mitos
      app.kubernetes.io/component: forkd
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mitos
        app.kubernetes.io/component: forkd
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9091"
        prometheus.io/path: "/metrics"
    spec:
      nodeSelector:
        mitos.run/kvm: "true"

      tolerations:
        - key: mitos.run/dedicated
          operator: Exists
          effect: NoSchedule

      containers:
        - name: forkd
          image: ghcr.io/paperclipinc/mitos-forkd:latest
          args:
            - --listen=:9090
            - --data-dir=/var/lib/mitos
            - --firecracker=/usr/local/bin/firecracker
            - --kernel=/var/lib/mitos/vmlinux
            - --http=:9091
            # Dedicated token-gated TLS listener for peer template
            # distribution. It is a SEPARATE port from --http: the CAS
            # surface is served here over TLS, while the sandbox
            # exec/files/metrics/healthz API on :9091 keeps its scheme
            # unchanged so SDK clients are unaffected. Effective only
            # when FORKD_PEER_TOKEN is set (with mTLS); the controller
            # derives this port to build each holder's CAS source URL.
            - --cas-listen=:9092
            - --tls-cert=/etc/forkd/tls/tls.crt
            - --tls-key=/etc/forkd/tls/tls.key
            - --tls-ca=/etc/forkd/ca/ca.crt
            # Every VM runs through the jailer: per-VM uid/gid, chroot,
            # cgroup. The chroot base lives inside the data volume so
            # snapshot and rootfs files hard-link into each chroot
            # (forkd refuses to start if they are on different
            # filesystems).
            - --jailer=/usr/local/bin/jailer
            - --chroot-base=/var/lib/mitos/jailer
            - --uid-range=64000-64999
          # FORKD_PEER_TOKEN is the shared bearer credential a peer
          # forkd must present to pull templates from this node's CAS.
          # It is read from the ENVIRONMENT, not a flag, so it is never
          # exposed in /proc/<pid>/cmdline (it is a credential). The
          # controller reads the SAME FORKD_PEER_TOKEN. Set it via a
          # Secret to enable the token-gated TLS CAS listener; left
          # unset, CAS distribution stays disabled. Example:
          # env:
          #   - name: FORKD_PEER_TOKEN
          #     valueFrom:
          #       secretKeyRef:
          #         name: mitos-peer-token
          #         key: token
          ports:
            - name: grpc
              containerPort: 9090
            - name: metrics
              containerPort: 9091
            # Dedicated token-gated TLS CAS listener (--cas-listen) for
            # peer template distribution; separate from the sandbox API.
            - name: cas
              containerPort: 9092
          # forkd runs as root with an explicit capability list instead
          # of privileged: true. Each retained capability is annotated
          # with why the jailer (or forkd itself) needs it; everything
          # else is dropped. The set is pending proof in the KVM CI
          # jailer run (issue #2 Task 5) and may still be trimmed.
          securityContext:
            runAsUser: 0
            allowPrivilegeEscalation: true
            capabilities:
              drop:
                - ALL
              add:
                # Jailer: cgroup attachment and namespace setup for each
                # VM's jail.
                - SYS_ADMIN
                # Jailer: chroot(2) into the per-VM jail; SYS_ADMIN does
                # NOT cover chroot, so without this the jailer fails with
                # EPERM at launch.
                - SYS_CHROOT
                # Jailer: hands the per-VM chroot and API socket to the
                # dedicated uid.
                - CHOWN
                # Jailer/forkd: traverse and modify the jail tree after
                # files have been chowned to per-VM uids. Pending KVM CI
                # confirmation (issue #2 Task 5); may be trimmed.
                - DAC_OVERRIDE
                # Jailer/forkd: file-owner operations on jail files owned
                # by per-VM uids. Pending KVM CI confirmation (issue #2
                # Task 5); may be trimmed.
                - FOWNER
                # Jailer: drops the Firecracker process to the per-VM
                # uid (--uid-range).
                - SETUID
                # Jailer: drops the Firecracker process to the per-VM
                # gid.
                - SETGID
                # Jailer: creates /dev/kvm and /dev/net/tun device nodes
                # inside each chroot.
                - MKNOD
                # forkd: tap device creation when guest networking lands
                # (threat model section 4); listed now so the manifest
                # does not silently re-broaden later.
                - NET_ADMIN
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "16Gi"
              cpu: "8"
          volumeMounts:
            - name: data
              mountPath: /var/lib/mitos
            - name: kvm
              mountPath: /dev/kvm
            - name: tls
              mountPath: /etc/forkd/tls
              readOnly: true
            - name: ca
              mountPath: /etc/forkd/ca
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: 9091
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9091
            initialDelaySeconds: 30
            periodSeconds: 10

      volumes:
        - name: data
          hostPath:
            path: /var/lib/mitos
            type: DirectoryOrCreate
        - name: kvm
          hostPath:
            path: /dev/kvm
            type: CharDevice
        # Created by the controller's PKI bootstrap (EnsurePKI) at startup.
        - name: tls
          secret:
            secretName: mitos-forkd-tls
        # Only the CA certificate is projected; the CA private key in this
        # secret must never reach forkd.
        - name: ca
          secret:
            secretName: mitos-ca
            items:
              - key: ca.crt
                path: ca.crt
