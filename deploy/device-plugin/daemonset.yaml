apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: agent-run-kvm-device-plugin
  namespace: agent-run
  labels:
    app.kubernetes.io/name: agent-run
    app.kubernetes.io/component: kvm-device-plugin
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: agent-run
      app.kubernetes.io/component: kvm-device-plugin
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent-run
        app.kubernetes.io/component: kvm-device-plugin
    spec:
      # No nodeSelector ON PURPOSE: the plugin runs on EVERY node and reflects
      # scheduler truth, advertising agentrun.dev/kvm slots only where /dev/kvm
      # exists and zero elsewhere. Running everywhere (rather than gating on the
      # agentrun.dev/kvm=true label forkd uses) means a node that gains /dev/kvm
      # is covered automatically: the plugin re-registers and starts advertising
      # without a manual relabel. On a node without /dev/kvm it advertises zero,
      # so no pod requesting the resource is ever scheduled there.
      priorityClassName: system-node-critical
      tolerations:
        # Tolerate everything so the plugin lands on every node (including
        # control-plane and tainted KVM workers); it is a node-local daemon with
        # no scheduling preferences of its own.
        - operator: Exists
      containers:
        - name: kvm-device-plugin
          image: ghcr.io/paperclipinc/sandbox-kvm-device-plugin:latest
          args:
            - --resource-name=agentrun.dev/kvm
            # 0 = auto: advertise a sane slot count (100) where /dev/kvm exists.
            # /dev/kvm is shareable, so this is a soft per-node concurrency cap
            # on husk pods, not a physical device count.
            - --device-count=0
            - --device-paths=/dev/kvm,/dev/net/tun
            - --kubelet-dir=/var/lib/kubelet/device-plugins
            # Probe the host /dev/kvm at /host-dev/kvm: the host /dev is mounted
            # read-only at /host-dev (NOT over the container's own /dev). A
            # read-only /dev mounted at /dev shadows the kubelet-created
            # /dev/termination-log and makes the container fail to start
            # (RunContainerError), so the mount is kept off the container /dev.
            - --kvm-device-path=/host-dev/kvm
          # Minimal privileges. This is NOT the privileged forkd: it needs only
          # to (1) write its plugin socket into the kubelet device-plugins dir
          # and dial kubelet.sock there, and (2) stat /dev/kvm to decide whether
          # to advertise. It creates NO device nodes and starts NO VMs. It runs
          # as root because the kubelet device-plugins dir is root-owned (the
          # socket must be writable there), but it is unprivileged with ALL
          # capabilities dropped: binding a unix socket in a directory it owns
          # and stat(2) on /dev/kvm need no capabilities.
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            privileged: false
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "64Mi"
              cpu: "100m"
          volumeMounts:
            # The kubelet device-plugins dir: the plugin serves its socket here
            # and dials the kubelet registry socket (kubelet.sock) here. This is
            # the one hostPath the plugin requires.
            - name: device-plugins
              mountPath: /var/lib/kubelet/device-plugins
            # Host /dev mounted read-only at /host-dev (NOT at the container's
            # own /dev) so the plugin can stat /host-dev/kvm to decide whether
            # KVM is present. Mounting a read-only /dev over the container root
            # would shadow the kubelet-created /dev/termination-log and break
            # container start; /host-dev avoids that. Read-only: the plugin
            # never creates device nodes (the kubelet injects /dev/kvm into
            # requesting containers on Allocate).
            - name: dev
              mountPath: /host-dev
              readOnly: true
      volumes:
        - name: device-plugins
          hostPath:
            path: /var/lib/kubelet/device-plugins
            type: Directory
        - name: dev
          hostPath:
            path: /dev
            type: Directory
