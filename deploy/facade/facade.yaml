# agents.x-k8s.io conformance facade (issue #19): OPT-IN.
#
# This manifest is deliberately NOT part of the default base
# (deploy/kustomization.yaml). The facade is opt-in: apply it only when you want
# upstream agents.x-k8s.io/v1alpha1 Sandbox objects fulfilled on our fork engine:
#
#   kubectl apply -f deploy/facade/facade.yaml
#
# It assumes the agent-run namespace and our agentrun.dev CRDs already exist
# (from the base install) and that the upstream agents.x-k8s.io Sandbox CRD is
# installed (from third_party/agent-sandbox/crds/agents.x-k8s.io_sandboxes.yaml
# or the upstream helm chart). The facade maps each Sandbox onto our husk-backed
# SandboxClaim via the agentrun.dev/pool bridge annotation (or --default-pool).
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-run-facade
  namespace: agent-run
  labels:
    app.kubernetes.io/name: agent-run
    app.kubernetes.io/component: facade
---
# Facade ClusterRole. Every rule is justified by a client call in
# internal/facade; nothing is granted speculatively.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: agent-run-facade
  labels:
    app.kubernetes.io/name: agent-run
    app.kubernetes.io/component: facade
rules:
  # The upstream Sandbox the facade watches and whose status it mirrors.
  - apiGroups:
      - agents.x-k8s.io
    resources:
      - sandboxes
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - agents.x-k8s.io
    resources:
      - sandboxes/status
    verbs:
      - get
      - patch
      - update
  # The upstream extension kinds the facade watches and whose status it mirrors:
  # SandboxTemplate -> our template, SandboxWarmPool -> our pool, SandboxClaim ->
  # our fork-from-snapshot claim.
  - apiGroups:
      - extensions.agents.x-k8s.io
    resources:
      - sandboxtemplates
      - sandboxwarmpools
      - sandboxclaims
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - extensions.agents.x-k8s.io
    resources:
      - sandboxtemplates/status
      - sandboxwarmpools/status
      - sandboxclaims/status
    verbs:
      - get
      - patch
      - update
  # Our run-path objects the facade creates, owns, and terminates: the claim it
  # bridges plus the template and pool the extension reconcilers map.
  - apiGroups:
      - agentrun.dev
    resources:
      - sandboxclaims
      - sandboxtemplates
      - sandboxpools
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - agentrun.dev
    resources:
      - sandboxpools/status
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: agent-run-facade
  labels:
    app.kubernetes.io/name: agent-run
    app.kubernetes.io/component: facade
subjects:
  - kind: ServiceAccount
    name: agent-run-facade
    namespace: agent-run
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: agent-run-facade
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-run-facade
  namespace: agent-run
  labels:
    app.kubernetes.io/name: agent-run
    app.kubernetes.io/component: facade
spec:
  # Single instance: leader election is off in cmd/facade for now (the facade is
  # one opt-in instance). Raise replicas only after enabling leader election.
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agent-run
      app.kubernetes.io/component: facade
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent-run
        app.kubernetes.io/component: facade
    spec:
      serviceAccountName: agent-run-facade
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: facade
          image: ghcr.io/paperclipinc/sandbox-facade:latest
          # --default-pool is the agentrun.dev pool a Sandbox binds to when it
          # carries no agentrun.dev/pool bridge annotation. Set it to one of your
          # pools; a Sandbox with neither the annotation nor a default reports
          # NotReady with remediation text rather than creating an unbindable
          # claim.
          args:
            - --metrics-bind-address=:8082
            - --health-probe-bind-address=:8083
            - --default-pool=default
            - --cluster-domain=cluster.local
          ports:
            - name: metrics
              containerPort: 8082
            - name: health
              containerPort: 8083
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
