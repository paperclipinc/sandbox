apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-run-controller
  namespace: agent-run
  labels:
    app.kubernetes.io/name: agent-run
    app.kubernetes.io/component: controller
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: agent-run
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent-run
        app.kubernetes.io/component: controller
    spec:
      serviceAccountName: agent-run-controller
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: controller
          image: ghcr.io/paperclipinc/sandbox-controller:latest
          # Production runs with the default flags: metrics on :8080, health
          # on :8081, PKI bootstrap ENABLED (mTLS to forkd). --mock is a no-op
          # on the controller and --disable-pki-bootstrap is deliberately
          # omitted so the control plane refuses to dial forkd unauthenticated.
          args:
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
          ports:
            - name: metrics
              containerPort: 8080
            - name: health
              containerPort: 8081
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
