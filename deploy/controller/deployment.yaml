apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-run-controller
  namespace: agent-run
  labels:
    app.kubernetes.io/name: agent-run
    app.kubernetes.io/component: controller
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: agent-run
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent-run
        app.kubernetes.io/component: controller
    spec:
      serviceAccountName: agent-run-controller
      containers:
        - name: controller
          image: ghcr.io/paperclipinc/sandbox-controller:latest
          args:
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
          ports:
            - name: metrics
              containerPort: 8080
            - name: health
              containerPort: 8081
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-run-controller
  namespace: agent-run
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: agent-run-controller
rules:
  - apiGroups: ["agentrun.dev"]
    resources: ["sandboxtemplates", "sandboxpools", "sandboxclaims", "sandboxforks"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["agentrun.dev"]
    resources: ["sandboxpools/status", "sandboxclaims/status", "sandboxforks/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["agentrun.dev"]
    resources: ["sandboxpools/scale"]
    verbs: ["get", "update"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshots"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: agent-run-controller
subjects:
  - kind: ServiceAccount
    name: agent-run-controller
    namespace: agent-run
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: agent-run-controller
