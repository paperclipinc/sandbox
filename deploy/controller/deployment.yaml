apiVersion: apps/v1
kind: Deployment
metadata:
  name: mitos-controller
  namespace: mitos
  labels:
    app.kubernetes.io/name: mitos
    app.kubernetes.io/component: controller
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: mitos
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mitos
        app.kubernetes.io/component: controller
    spec:
      serviceAccountName: mitos-controller
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: controller
          image: ghcr.io/paperclipinc/mitos-controller:latest
          # Production runs the pod-native default (issue #18): metrics on
          # :8080, health on :8081, PKI bootstrap ENABLED (mTLS to forkd AND to
          # the husk control channel). --disable-pki-bootstrap is deliberately
          # omitted so the control plane refuses to dial forkd or activate a
          # husk pod over an unauthenticated channel.
          #
          # --enable-husk-pods is the DEFAULT (passed explicitly here for
          # readability): each SandboxPool builds its template snapshot on the
          # KVM nodes AND maintains a warm pool of pre-scheduled husk pods pinned
          # to the snapshot-holding nodes; a SandboxClaim activates a dormant
          # husk pod in place. The husk pods run the husk-stub image
          # (--husk-stub-image) and mount the node template snapshot rooted at
          # --husk-data-dir (matching forkd's --data-dir), the kernel, and the
          # PKI Secrets. forkd stays as the privileged snapshot BUILDER and the
          # --enable-raw-forkd fork-per-claim fallback. Pass --enable-raw-forkd
          # (or --mock) to disable husk pods and fork per claim instead.
          args:
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
            - --enable-husk-pods
            - --husk-stub-image=ghcr.io/paperclipinc/mitos-husk-stub:latest
            - --husk-data-dir=/var/lib/mitos
          ports:
            - name: metrics
              containerPort: 8080
            - name: health
              containerPort: 8081
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
