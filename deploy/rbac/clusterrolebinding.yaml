metadata:
  name: mitos-controller
  labels:
    app.kubernetes.io/name: mitos
    app.kubernetes.io/component: controller
subjects:
  - kind: ServiceAccount
    name: mitos-controller
    namespace: mitos
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mitos-controller
