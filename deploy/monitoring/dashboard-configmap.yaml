# Grafana dashboard for the mitos.run control plane, wrapped in a ConfigMap.
#
# The grafana_dashboard: "1" label is the Grafana sidecar convention: a Grafana
# deployment running the kiwigrid/k8s-sidecar (the kube-prometheus-stack default)
# watches for ConfigMaps with this label and loads the JSON under data as a
# dashboard. This is OPT-IN: it is not part of the default `kubectl apply -k
# deploy/` base. Install it with the monitoring layer:
#   kubectl apply -k deploy/monitoring/
#
# The dashboard.json on disk is the source of truth; this ConfigMap embeds the
# same JSON. Every panel references only metrics the control plane exports.
apiVersion: v1
kind: ConfigMap
metadata:
  name: mitos-grafana-dashboard
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/name: mitos
    app.kubernetes.io/component: monitoring
data:
  mitos-control-plane.json: |-
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "links": [],
      "liveNow": false,
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": [
        "mitos",
        "sandbox"
      ],
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": {},
            "hide": 0,
            "label": "Prometheus",
            "refresh": 1
          }
        ]
      },
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "",
      "title": "mitos control plane",
      "uid": "mitos-control-plane",
      "version": 1,
      "weekStart": "",
      "panels": [
        {
          "title": "Fork latency (p50 / p99)",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "description": "p50 and p99 fork-from-snapshot latency from the forkd histogram. The <=10ms p99 fork is a bare-metal target, not an asserted SLO.",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 10
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "histogram_quantile(0.50, sum by (le) (rate(mitos_fork_duration_seconds_bucket[5m])))",
              "legendFormat": "p50",
              "refId": "A"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "histogram_quantile(0.99, sum by (le) (rate(mitos_fork_duration_seconds_bucket[5m])))",
              "legendFormat": "p99",
              "refId": "B"
            }
          ]
        },
        {
          "title": "Active sandboxes",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "description": "Currently running sandboxes per node (forkd gauge).",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 0
          },
          "id": 2,
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 10
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "sum(mitos_active_sandboxes)",
              "legendFormat": "active sandboxes",
              "refId": "A"
            }
          ]
        },
        {
          "title": "CoW memory density",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "description": "CoW-aware memory accounting. Shared bytes count each template's shared page set once (the shared-once dedup); unique bytes are per-fork dirty pages summed; savings is naive minus CoW-aware.",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 8
          },
          "id": 3,
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 10
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "sum(mitos_memory_shared_bytes)",
              "legendFormat": "shared (counted once)",
              "refId": "A"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "sum(mitos_memory_unique_bytes)",
              "legendFormat": "unique (per-fork dirty)",
              "refId": "B"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "sum(mitos_cow_memory_savings_bytes)",
              "legendFormat": "CoW savings",
              "refId": "C"
            }
          ]
        },
        {
          "title": "Metered backing disk",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "description": "CoW-aware metered backing storage: template volume seeds counted once (forkd gauge).",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 8
          },
          "id": 4,
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 10
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "sum(mitos_metered_disk_bytes)",
              "legendFormat": "metered disk",
              "refId": "A"
            }
          ]
        },
        {
          "title": "Claims pending (requeue rate)",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "description": "Rate of claim requeues for no node with a ready snapshot (capacity exhaustion signal). mitos_claim_pending_total is a counter; this panel shows its rate.",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 16
          },
          "id": 5,
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 10
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "sum(rate(mitos_claim_pending_total[5m]))",
              "legendFormat": "pending requeues/s",
              "refId": "A"
            }
          ]
        },
        {
          "title": "Claim error rate by pool and reason",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "description": "Terminal claim failures split by pool and coarse reason (fork, secret, volume, token). mitos_claim_errors_total is a counter; this panel shows its rate.",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 16
          },
          "id": 6,
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 10
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "sum by (pool, reason) (rate(mitos_claim_errors_total[5m]))",
              "legendFormat": "{{pool}} / {{reason}}",
              "refId": "A"
            }
          ]
        },
        {
          "title": "Pool ready snapshots",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "description": "Ready snapshots per pool (controller gauge mirroring SandboxPool.Status.ReadySnapshots). Compare against each pool's desired warm count.",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 24
          },
          "id": 7,
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 10
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "mitos_pool_ready_snapshots",
              "legendFormat": "{{pool}}",
              "refId": "A"
            }
          ]
        },
        {
          "title": "Orphan sweeps (reaped VMs)",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "description": "Rate of orphan sandbox VMs reaped by the garbage collector. A sustained nonzero rate means VMs are leaking and being cleaned up. mitos_orphan_sweeps_total is a counter; this panel shows its rate.",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 24
          },
          "id": 8,
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 10
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "sum(rate(mitos_orphan_sweeps_total[15m]))",
              "legendFormat": "orphan sweeps/s",
              "refId": "A"
            }
          ]
        }
      ]
    }
