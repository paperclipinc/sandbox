syntax = "proto3";

package forkd;

option go_package = "github.com/paperclipinc/mitos/proto/forkd;forkdpb";

service ForkDaemon {
  // Template management
  rpc CreateTemplate(CreateTemplateRequest) returns (CreateTemplateResponse);
  rpc DeleteTemplate(DeleteTemplateRequest) returns (DeleteTemplateResponse);
  rpc ListTemplates(ListTemplatesRequest) returns (ListTemplatesResponse);
  // PullTemplate fetches a template's snapshot from a peer forkd's CAS over the
  // peer's token-gated, TLS-only /cas surface, materializes it into this node's
  // template dir, verifies it, and records the digest. The controller calls this
  // to distribute a template that was built once on another node.
  rpc PullTemplate(PullTemplateRequest) returns (PullTemplateResponse);

  // Snapshot management
  rpc CreateSnapshot(CreateSnapshotRequest) returns (CreateSnapshotResponse);
  rpc DeleteSnapshot(DeleteSnapshotRequest) returns (DeleteSnapshotResponse);

  // Fork operations (hot path; must be <2ms)
  rpc Fork(ForkRequest) returns (ForkResponse);
  rpc ForkRunning(ForkRunningRequest) returns (ForkRunningResponse);

  // Sandbox lifecycle
  rpc Exec(ExecRequest) returns (ExecResponse);
  rpc ExecStream(ExecStreamRequest) returns (stream ExecStreamResponse);
  rpc Terminate(TerminateRequest) returns (TerminateResponse);
  rpc ListSandboxes(ListSandboxesRequest) returns (ListSandboxesResponse);

  // File operations
  rpc ReadFile(ReadFileRequest) returns (ReadFileResponse);
  rpc WriteFile(WriteFileRequest) returns (WriteFileResponse);
  rpc ListDir(ListDirRequest) returns (ListDirResponse);

  // Node capacity
  rpc GetCapacity(GetCapacityRequest) returns (GetCapacityResponse);
}

// --- Template management ---

message CreateTemplateRequest {
  string template_id = 1;
  string image = 2;
  repeated string init_commands = 3;
  string kernel_path = 4;
  ResourceSpec resources = 5;
  // Volumes the template declares. The node bakes one placeholder block device
  // per volume into the snapshot at build time so each fork can rebind it to
  // its own backing; the fork's ForkRequest.volumes must match this set by
  // name. Empty means the template has no volumes.
  repeated VolumeMount volumes = 6;
  // encryption_key is the per-template at-rest DEK, WRAPPED by the KMS KEK
  // (envelope encryption). It is opaque ciphertext, not the plaintext key, but
  // is still a SECRET-adjacent value carried only over the mTLS RPC and MUST
  // NEVER be logged or written to the node data disk. The node unwraps it via
  // its KMS at container open/build time and zeroizes the plaintext after.
  // Empty means the template is not encrypted.
  bytes encryption_key = 7;
  // kek_id identifies the KMS KEK that wrapped encryption_key, so the node can
  // select the matching KEK to unwrap. It is NOT secret and may be logged.
  // Empty when the template is not encrypted.
  string kek_id = 8;
}

message CreateTemplateResponse {
  string template_id = 1;
  double creation_time_ms = 2;
  // Content-addressed manifest digest of the snapshot just built. A stable
  // identifier for the snapshot, safe to log; the controller records it in the
  // SandboxPool status.
  string template_digest = 3;
}

message DeleteTemplateRequest {
  string template_id = 1;
}

message DeleteTemplateResponse {}

message PullTemplateRequest {
  // template_id is the id the pulled snapshot is materialized under on this node.
  string template_id = 1;
  // manifest_digest is the content-addressed digest of the source manifest to
  // pull and verify against. The pull fails closed if the materialized snapshot
  // does not re-derive to this digest.
  string manifest_digest = 2;
  // source_url is the base URL of the holder forkd's CAS surface, e.g.
  // "https://10.0.3.7:9091/cas". TLS only.
  string source_url = 3;
  // pull_token is the bearer credential the holder forkd requires on its
  // token-gated CAS surface. It is a SECRET VALUE: it must NEVER be logged,
  // placed in an error message, or recorded as a span attribute, and it travels
  // only over TLS.
  string pull_token = 4;
}

message PullTemplateResponse {
  string template_id = 1;
  // template_digest echoes the verified manifest digest of the pulled snapshot
  // (a content address, safe to log).
  string template_digest = 2;
}

message ListTemplatesRequest {}

message ListTemplatesResponse {
  repeated TemplateInfo templates = 1;
}

message TemplateInfo {
  string template_id = 1;
  string image = 2;
  int64 snapshot_size_bytes = 3;
  int64 created_at_unix = 4;
  bool ready = 5;
}

// --- Snapshot management ---

message CreateSnapshotRequest {
  string template_id = 1;
  string snapshot_id = 2;
  // Wait for this condition before snapshotting
  string wait_condition = 3;
  // Delay after condition is met
  int32 delay_seconds = 4;
}

message CreateSnapshotResponse {
  string snapshot_id = 1;
  double snapshot_time_ms = 2;
  int64 snapshot_size_bytes = 3;
}

message DeleteSnapshotRequest {
  string snapshot_id = 1;
}

message DeleteSnapshotResponse {}

// --- Fork operations ---

message ForkRequest {
  string snapshot_id = 1;
  string sandbox_id = 2;
  repeated EnvVar env = 3;
  repeated SecretVar secrets = 4;
  NetworkConfig network = 5;
  // Bearer token the HTTP sandbox API will require for this sandbox.
  // Empty means no token is registered and HTTP calls fail closed (401).
  string api_token = 6;
  // Volumes to prepare and attach to the fork. The node resolves the backing
  // source for Snapshot/Share/Clone policies; the controller passes the policy
  // and spec.
  repeated VolumeMount volumes = 7;
  // encryption_key is the source template's at-rest DEK, WRAPPED by the KMS KEK
  // (envelope encryption), carried only over the mTLS RPC so the node can open
  // the encrypted container before restoring the snapshot. It is opaque
  // ciphertext, not the plaintext key, but is still a SECRET-adjacent value and
  // MUST NEVER be logged or written to the node data disk. The node unwraps it
  // via its KMS and zeroizes the plaintext after. Empty means the source
  // template is not encrypted.
  bytes encryption_key = 8;
  // kek_id identifies the KMS KEK that wrapped encryption_key, so the node can
  // select the matching KEK to unwrap. It is NOT secret and may be logged.
  // Empty when the source template is not encrypted.
  string kek_id = 9;
}

message VolumeMount {
  string name = 1;
  string mount_path = 2;
  bool read_only = 3;
  // fork_policy is the API ForkPolicy string: Fresh, Share, Clone, Snapshot.
  string fork_policy = 4;
  // size is a Kubernetes resource quantity such as 5Gi or 512Mi. Empty uses the
  // node default. Only meaningful for the Fresh policy.
  string size = 5;
}

message ForkResponse {
  string sandbox_id = 1;
  string endpoint = 2;
  double fork_time_ms = 3;
  int64 memory_unique_bytes = 4;
  int64 memory_shared_bytes = 5;
}

message ForkRunningRequest {
  string source_sandbox_id = 1;
  string new_sandbox_id = 2;
  bool pause_source = 3;
  repeated EnvVar env = 4;
  // Bearer token the HTTP sandbox API will require for the new sandbox.
  // Empty means no token is registered and HTTP calls fail closed (401).
  string api_token = 5;
}

message ForkRunningResponse {
  string sandbox_id = 1;
  string endpoint = 2;
  double checkpoint_time_ms = 3;
  double fork_time_ms = 4;
}

// --- Exec ---

message ExecRequest {
  string sandbox_id = 1;
  string command = 2;
  int32 timeout_seconds = 3;
  string working_dir = 4;
  repeated EnvVar env = 5;
}

message ExecResponse {
  int32 exit_code = 1;
  string stdout = 2;
  string stderr = 3;
  double exec_time_ms = 4;
}

message ExecStreamRequest {
  string sandbox_id = 1;
  string command = 2;
  int32 timeout_seconds = 3;
  string working_dir = 4;
  repeated EnvVar env = 5;
}

message ExecStreamResponse {
  enum Stream {
    STDOUT = 0;
    STDERR = 1;
  }
  Stream stream = 1;
  bytes data = 2;
  // Set on the final message
  bool done = 3;
  int32 exit_code = 4;
}

// --- Sandbox lifecycle ---

message TerminateRequest {
  string sandbox_id = 1;
}

message TerminateResponse {
  double uptime_seconds = 1;
}

message ListSandboxesRequest {}

message ListSandboxesResponse {
  repeated SandboxInfo sandboxes = 1;
}

message SandboxInfo {
  string sandbox_id = 1;
  int64 created_at_unix = 2;
  // zero when never accessed
  int64 last_activity_unix = 3;
  int64 uptime_seconds = 4;
}

// --- File operations ---

message ReadFileRequest {
  string sandbox_id = 1;
  string path = 2;
}

message ReadFileResponse {
  bytes content = 1;
  int64 size = 2;
}

message WriteFileRequest {
  string sandbox_id = 1;
  string path = 2;
  bytes content = 3;
  uint32 mode = 4;
}

message WriteFileResponse {}

message ListDirRequest {
  string sandbox_id = 1;
  string path = 2;
}

message ListDirResponse {
  repeated FileInfo entries = 1;
}

message FileInfo {
  string name = 1;
  bool is_dir = 2;
  int64 size = 3;
  int64 modified_at_unix = 4;
  uint32 mode = 5;
}

// --- Node capacity ---

message GetCapacityRequest {}

message GetCapacityResponse {
  int32 active_sandboxes = 1;
  int32 max_sandboxes = 2;
  int64 memory_total_bytes = 3;
  int64 memory_used_bytes = 4;
  int64 memory_shared_bytes = 5;
  repeated string template_ids = 6;
  repeated string snapshot_ids = 7;
  bool kvm_available = 8;
  // template_digests maps each template id to its content-addressed snapshot
  // manifest digest (safe to log). Lets the controller record the snapshot
  // identity in the SandboxPool status even for templates it did not just
  // build.
  map<string, string> template_digests = 9;
  // templates carries a per-template capacity estimate the controller uses to
  // project the marginal memory cost of placing a new fork: the shared set a
  // cold start pays once, and the average per-fork unique footprint a warm
  // fork adds. Derived from the node's CoW-aware metering.
  repeated TemplateCapacity templates = 10;
}

// TemplateCapacity is the per-template memory estimate the controller uses to
// bin-pack forks. shared_once_bytes is the template's CoW shared set counted a
// single time (paid once on a cold start of this template on a node).
// avg_fork_unique_bytes is the mean per-fork unique footprint (paid by every
// fork, warm or cold); when fork_count is 0 it is a small floor estimate.
message TemplateCapacity {
  string template_id = 1;
  string snapshot_digest = 2;
  int64 shared_once_bytes = 3;
  int64 avg_fork_unique_bytes = 4;
  int32 fork_count = 5;
}

// --- Shared types ---

message ResourceSpec {
  int32 vcpus = 1;
  int64 memory_mb = 2;
}

message EnvVar {
  string key = 1;
  string value = 2;
}

message SecretVar {
  string key = 1;
  string value = 2;
}

message NetworkConfig {
  string egress_policy = 1;
  repeated string allow_list = 2;
}
