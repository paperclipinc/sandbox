name: KVM Integration Test

on:
  push:
    branches: [main]
    paths:
      - 'internal/firecracker/**'
      - 'internal/fork/**'
      - 'internal/cas/**'
      - 'internal/netconf/**'
      - 'internal/network/**'
      - 'internal/dnsproxy/**'
      - 'guest/**'
      - 'cmd/test-agent/**'
      - 'cmd/cas-verify/**'
      - 'cmd/net-smoke/**'
      - 'cmd/dns-stub/**'
      - 'cmd/tmpl-smoke/**'
      - 'cmd/vol-smoke/**'
      - 'cmd/crypt-smoke/**'
      - 'cmd/pull-smoke/**'
      - 'cmd/husk-stub/**'
      - 'internal/husk/**'
      - 'internal/volume/**'
      - 'internal/ociroot/**'
      - 'internal/vsock/**'
      - 'internal/storecrypt/**'
      - 'internal/pki/**'
      - 'internal/daemon/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  firecracker-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check KVM availability
        run: |
          ls -la /dev/kvm
          grep -cE '(vmx|svm)' /proc/cpuinfo

      - name: Install Firecracker
        run: |
          FC_VERSION=v1.15.0
          curl -fsSL -o /tmp/fc.tgz \
            "https://github.com/firecracker-microvm/firecracker/releases/download/${FC_VERSION}/firecracker-${FC_VERSION}-x86_64.tgz"
          tar -xzf /tmp/fc.tgz -C /tmp
          sudo mv "/tmp/release-${FC_VERSION}-x86_64/firecracker-${FC_VERSION}-x86_64" /usr/local/bin/firecracker
          sudo chmod +x /usr/local/bin/firecracker
          firecracker --version

          # The same release archive ships the jailer; install it for the
          # jailer-boot phase below.
          sudo mv "/tmp/release-${FC_VERSION}-x86_64/jailer-${FC_VERSION}-x86_64" /usr/local/bin/jailer
          sudo chmod +x /usr/local/bin/jailer
          jailer --version

      - name: Download kernel and rootfs
        run: |
          mkdir -p /tmp/agent-run-test
          ARCH=$(uname -m)

          # Determine CI version from latest Firecracker release
          FC_VERSION=v1.15.0
          CI_VERSION=$(echo $FC_VERSION | sed 's/v//' | cut -d. -f1-2)

          # Find latest kernel in S3 (strip trailing dots from XML parsing)
          KERNEL_KEY=$(curl -fsSL "https://s3.amazonaws.com/spec.ccfc.min/?prefix=firecracker-ci/v${CI_VERSION}/${ARCH}/vmlinux-" \
            | grep -oP "firecracker-ci/v${CI_VERSION}/${ARCH}/vmlinux-[0-9]+\.[0-9]+\.[0-9]+" \
            | sort -V | tail -1)
          echo "Downloading kernel: $KERNEL_KEY"
          curl -fsSL -o /tmp/agent-run-test/vmlinux \
            "https://s3.amazonaws.com/spec.ccfc.min/${KERNEL_KEY}"

          # Find latest rootfs in S3
          ROOTFS_KEY=$(curl -fsSL "https://s3.amazonaws.com/spec.ccfc.min/?prefix=firecracker-ci/v${CI_VERSION}/${ARCH}/ubuntu-" \
            | grep -oP "firecracker-ci/v${CI_VERSION}/${ARCH}/ubuntu-[0-9.]+\.(ext4|squashfs)(?=<)" \
            | sort -V | tail -1)
          echo "Downloading rootfs: $ROOTFS_KEY"

          # If squashfs, convert to ext4; if ext4, use directly
          if echo "$ROOTFS_KEY" | grep -q squashfs; then
            curl -fsSL -o /tmp/agent-run-test/rootfs.squashfs \
              "https://s3.amazonaws.com/spec.ccfc.min/${ROOTFS_KEY}"
            sudo apt-get install -y squashfs-tools
            sudo unsquashfs -d /tmp/rootfs-mount /tmp/agent-run-test/rootfs.squashfs
            dd if=/dev/zero of=/tmp/agent-run-test/rootfs.ext4 bs=1M count=512
            mkfs.ext4 /tmp/agent-run-test/rootfs.ext4
            mkdir -p /tmp/rootfs-ext4
            sudo mount /tmp/agent-run-test/rootfs.ext4 /tmp/rootfs-ext4
            sudo cp -a /tmp/rootfs-mount/* /tmp/rootfs-ext4/
            sudo umount /tmp/rootfs-ext4
          else
            curl -fsSL -o /tmp/agent-run-test/rootfs.ext4 \
              "https://s3.amazonaws.com/spec.ccfc.min/${ROOTFS_KEY}"
          fi

          ls -lh /tmp/agent-run-test/

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Run unit tests
        run: go test ./internal/fork/... ./internal/volume/... -v

      - name: Test Firecracker snapshot create/restore
        run: |
          set -e

          WORKDIR=/tmp/agent-run-test/fc-test
          mkdir -p $WORKDIR

          # Make /dev/kvm world-accessible so this VM actually boots. Without
          # this the snapshot/create call gets "Permission denied" from KVM,
          # produces no mem/vmstate, and the curl-driven step still exits 0,
          # silently leaving the snapshot dir empty for later steps.
          sudo chmod 666 /dev/kvm

          # Copy rootfs (Firecracker needs a writable copy)
          cp /tmp/agent-run-test/rootfs.ext4 $WORKDIR/rootfs.ext4

          # Start Firecracker
          SOCK=$WORKDIR/firecracker.sock
          /usr/local/bin/firecracker --api-sock $SOCK &
          FC_PID=$!
          sleep 1

          # Configure VM
          curl --unix-socket $SOCK -X PUT 'http://localhost/boot-source' \
            -H 'Content-Type: application/json' \
            -d "{\"kernel_image_path\": \"/tmp/agent-run-test/vmlinux\", \"boot_args\": \"console=ttyS0 reboot=k panic=1 pci=off\"}"

          curl --unix-socket $SOCK -X PUT 'http://localhost/drives/rootfs' \
            -H 'Content-Type: application/json' \
            -d "{\"drive_id\": \"rootfs\", \"path_on_host\": \"$WORKDIR/rootfs.ext4\", \"is_root_device\": true, \"is_read_only\": false}"

          curl --unix-socket $SOCK -X PUT 'http://localhost/machine-config' \
            -H 'Content-Type: application/json' \
            -d '{"vcpu_count": 1, "mem_size_mib": 256}'

          # Boot
          curl --unix-socket $SOCK -X PUT 'http://localhost/actions' \
            -H 'Content-Type: application/json' \
            -d '{"action_type": "InstanceStart"}'

          echo "VM booted, waiting for init..."
          sleep 5

          # Pause
          curl --unix-socket $SOCK -X PATCH 'http://localhost/vm' \
            -H 'Content-Type: application/json' \
            -d '{"state": "Paused"}'

          # Snapshot
          mkdir -p $WORKDIR/snapshot
          curl --unix-socket $SOCK -X PUT 'http://localhost/snapshot/create' \
            -H 'Content-Type: application/json' \
            -d "{\"snapshot_type\": \"Full\", \"snapshot_path\": \"$WORKDIR/snapshot/vmstate\", \"mem_file_path\": \"$WORKDIR/snapshot/mem\"}"

          echo "Snapshot created:"
          ls -lh $WORKDIR/snapshot/

          # Kill source VM
          kill $FC_PID 2>/dev/null || true
          sleep 1

          # Restore from snapshot in a new Firecracker process
          SOCK2=$WORKDIR/firecracker2.sock
          /usr/local/bin/firecracker --api-sock $SOCK2 &
          FC_PID2=$!
          sleep 1

          START_TIME=$(date +%s%N)

          curl --unix-socket $SOCK2 -X PUT 'http://localhost/snapshot/load' \
            -H 'Content-Type: application/json' \
            -d "{\"snapshot_path\": \"$WORKDIR/snapshot/vmstate\", \"mem_file_path\": \"$WORKDIR/snapshot/mem\", \"enable_diff_snapshots\": false, \"resume_vm\": true}"

          END_TIME=$(date +%s%N)
          ELAPSED_MS=$(( (END_TIME - START_TIME) / 1000000 ))

          echo ""
          echo "================================"
          echo "  Snapshot restore: ${ELAPSED_MS}ms"
          echo "================================"

          # Clean up
          kill $FC_PID2 2>/dev/null || true
          echo "Firecracker snapshot create/restore test passed"

      # CAS integrity proof on REAL large binaries. This phase proves the
      # content-addressed store machinery (chunking, dedup, byte-identical
      # reconstruction, and the verify-on-load tamper gate) on the real kernel
      # and rootfs downloaded at the top of the job
      # (/tmp/agent-run-test/vmlinux is multi-hundred-MB, rootfs.ext4 is
      # multi-MB). Those files ALWAYS exist regardless of whether any KVM
      # snapshot step succeeded, so this gate does not depend on the firecracker
      # snapshot phase. cas-verify runs over those exact bytes:
      #   check        proves byte-identical reconstruction (sha256 of every
      #                Materialized file equals the original);
      #   tamper-check flips one byte of one chunk in the store and asserts
      #                Materialize fails, proving the verify-on-load gate on real
      #                large binaries, not a unit fixture.
      # This phase genuinely gates: no continue-on-error.
      - name: CAS integrity check over the real kernel and rootfs
        run: |
          set -e
          INPUTS=/tmp/agent-run-test
          echo "Real binaries under verification:"
          ls -lh $INPUTS/vmlinux $INPUTS/rootfs.ext4

          go build -o /tmp/cas-verify ./cmd/cas-verify/

          # Byte-identical reconstruction of the real kernel + rootfs.
          /tmp/cas-verify check \
            -dir $INPUTS \
            -store /tmp/agent-run-test/cas-check \
            -out /tmp/agent-run-test/cas-check-out \
            -files vmlinux,rootfs.ext4

          # Tamper detection: corrupt one chunk, assert Materialize refuses it.
          /tmp/cas-verify tamper-check \
            -dir $INPUTS \
            -store /tmp/agent-run-test/cas-tamper \
            -out /tmp/agent-run-test/cas-tamper-out \
            -files vmlinux,rootfs.ext4

          # Optional bonus: if the firecracker snapshot phase produced a real
          # mem image, additionally verify reconstruction over it. Guarded so a
          # missing snapshot never fails this phase; the kernel+rootfs check
          # above is the required gate.
          SNAP=/tmp/agent-run-test/fc-test/snapshot
          if [ -f "$SNAP/mem" ] && [ -f "$SNAP/vmstate" ]; then
            echo "Snapshot present; additionally verifying over real mem + vmstate:"
            ls -lh $SNAP/
            /tmp/cas-verify check \
              -dir $SNAP \
              -store /tmp/agent-run-test/cas-check-snap \
              -out /tmp/agent-run-test/cas-check-snap-out \
              -files mem,vmstate
          else
            echo "No firecracker snapshot present; skipping optional snapshot check"
          fi

          echo "================================"
          echo "  CAS integrity checks passed"
          echo "================================"

      # Snapshot compatibility contract proof (#32). The manifest records the
      # producing environment (snapshot format version, Firecracker version, CPU
      # model, kernel) and the engine refuses to restore an incompatible
      # snapshot on load, after the digest verify and before any Firecracker
      # launch (internal/snapcompat, internal/fork/engine.go). This phase proves
      # that load-gate contract on a REAL manifest produced by the REAL
      # Firecracker on this runner:
      #   1. record       stamps the manifest with this node's detected
      #                   environment (real firecracker --version, real
      #                   /proc/cpuinfo model name, real uname -r), then
      #      compat-check asserts it PASSES: the snapshot is compatible with the
      #                   node that produced it.
      #   2. rewrite-manifest flips the recorded VMMVersion to a bogus value and
      #      compat-check asserts the load is REFUSED, and that the refusal names
      #                   the Firecracker (VMM) mismatch.
      #   3. rewrite-manifest flips the recorded SnapshotFormatVersion to 999 and
      #      compat-check asserts the load is REFUSED (unsupported format).
      # The real kernel + rootfs (always present) stand in for the snapshot file
      # payload; the contract under test is the manifest's recorded producing
      # environment, not the file bytes (those are covered by the CAS integrity
      # phase above). HONEST SCOPE: this proves the contract CHECK refuses a
      # mismatched/downgraded manifest. It is not a live cross-Firecracker-version
      # restore, which would need two Firecracker versions on the runner; that
      # remains covered by the contract, not by a live cross-version restore.
      # This phase genuinely gates: no continue-on-error.
      - name: Snapshot compatibility contract refuses incompatible restores
        run: |
          set -e
          INPUTS=/tmp/agent-run-test
          FC=/usr/local/bin/firecracker
          STORE=/tmp/agent-run-test/cas-compat
          echo "Node environment under the compatibility contract:"
          $FC --version | head -1
          grep -m1 'model name' /proc/cpuinfo || true
          uname -r

          go build -o /tmp/cas-verify ./cmd/cas-verify/

          # (1) Record a manifest stamped with this node's real producing
          # environment and assert it is compatible with this node.
          DIGEST=$(/tmp/cas-verify record \
            -dir $INPUTS \
            -store $STORE \
            -files vmlinux,rootfs.ext4 \
            -firecracker $FC | tail -1)
          echo "recorded manifest digest: $DIGEST"

          echo "--- (1) compatible snapshot must PASS ---"
          /tmp/cas-verify compat-check -digest "$DIGEST" -store $STORE -firecracker $FC

          # (2) Synthesize a Firecracker (VMM) mismatch and assert refusal. The
          # rewritten manifest has a new digest because the producing environment
          # is part of the content-addressed identity.
          echo "--- (2) bogus Firecracker version must be REFUSED ---"
          BAD_VMM=$(/tmp/cas-verify rewrite-manifest \
            -digest "$DIGEST" -store $STORE \
            -vmm-version "0.0.0-incompatible" | tail -1)
          echo "rewritten (bad VMM) digest: $BAD_VMM"
          OUT=$(/tmp/cas-verify compat-check -digest "$BAD_VMM" -store $STORE -firecracker $FC 2>&1) && {
            echo "FAIL: compat-check accepted an incompatible Firecracker version"
            echo "$OUT"
            exit 1
          } || true
          echo "$OUT"
          echo "$OUT" | grep -qi "REFUSED" || { echo "FAIL: refusal not reported"; exit 1; }
          echo "$OUT" | grep -qi "Firecracker" || { echo "FAIL: refusal did not name the Firecracker mismatch"; exit 1; }
          echo "OK: incompatible Firecracker version refused with a VMM-mismatch message"

          # (3) Synthesize an unsupported snapshot format version and assert refusal.
          echo "--- (3) unsupported snapshot format version must be REFUSED ---"
          BAD_FMT=$(/tmp/cas-verify rewrite-manifest \
            -digest "$DIGEST" -store $STORE \
            -format-version 999 | tail -1)
          echo "rewritten (bad format) digest: $BAD_FMT"
          OUT=$(/tmp/cas-verify compat-check -digest "$BAD_FMT" -store $STORE -firecracker $FC 2>&1) && {
            echo "FAIL: compat-check accepted an unsupported snapshot format version"
            echo "$OUT"
            exit 1
          } || true
          echo "$OUT"
          echo "$OUT" | grep -qi "REFUSED" || { echo "FAIL: refusal not reported"; exit 1; }
          echo "$OUT" | grep -qi "format version" || { echo "FAIL: refusal did not name the format-version mismatch"; exit 1; }
          echo "OK: unsupported snapshot format version refused"

          echo "================================================="
          echo "  Snapshot compatibility contract enforced:"
          echo "  compatible passes, VMM + format mismatch refused"
          echo "================================================="

      - name: Build guest agent
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o /tmp/agent-run-test/agent ./guest/agent/
          ls -lh /tmp/agent-run-test/agent

      # OCI image -> rootfs pipeline proof (issue #10). This is the gate that
      # proves Engine.CreateTemplate builds a bootable template FROM A REAL OCI
      # IMAGE, not a hand-built rootfs: pull busybox:stable, flatten its layers,
      # inject the agent as /init, build an ext4, boot it, run an init command
      # INSIDE the VM, snapshot, fork a sandbox, and exec assertions over the
      # guest agent. cmd/tmpl-smoke drives fork.NewEngine directly so the engine's
      # image build path is the thing under test.
      #
      # Two assertions GATE:
      #   1. init-command proof: the init command wrote /built.txt IN the template
      #      VM at build time, so the forked sandbox can cat it back. This proves
      #      boot -> init-in-VM -> snapshot -> fork carried the init side effect.
      #   2. image-filesystem proof: /bin/busybox resolves in the fork, proving
      #      the OCI layers were flattened into the rootfs (not an empty ext4).
      #
      # The Docker Hub pull can flake. tmpl-smoke marks pull failures with
      # PULL_FAILED so this loop retries ONLY the registry flake and never masks
      # a build/boot/init defect: a non-PULL_FAILED failure fails immediately, and
      # exhausting the pull retries fails clearly as a pull problem. A registry
      # mirror is the production answer (documented in docs/templates.md).
      - name: Image to rootfs pipeline, build from busybox and run init in the VM
        timeout-minutes: 10
        run: |
          set -e
          sudo chmod 666 /dev/kvm

          # A static busybox to inject as /bin/sh if the image lacks a shell
          # (busybox:stable ships its own, but tmpl-smoke passes this through and
          # it is required for any shell-less image).
          curl -fsSL -o /tmp/agent-run-test/busybox \
            "https://busybox.net/downloads/binaries/1.35.0-x86_64-linux-musl/busybox"
          chmod +x /tmp/agent-run-test/busybox

          go build -o /tmp/tmpl-smoke ./cmd/tmpl-smoke/

          run_smoke() {
            rm -rf /tmp/agent-run-test/smoke-data
            /tmp/tmpl-smoke \
              --image busybox:stable \
              --init 'echo built-by-init > /built.txt' \
              --data-dir /tmp/agent-run-test/smoke-data \
              --firecracker /usr/local/bin/firecracker \
              --kernel /tmp/agent-run-test/vmlinux \
              --agent-bin /tmp/agent-run-test/agent \
              --busybox-bin /tmp/agent-run-test/busybox \
              --expect-file /built.txt --expect-content built-by-init \
              --expect-cmd 'ls /bin/busybox'
          }

          attempt=1
          max=4
          while true; do
            echo "=== tmpl-smoke attempt ${attempt}/${max} ==="
            if run_smoke 2>&1 | tee /tmp/smoke.out; then
              echo "================================"
              echo "  Image to rootfs pipeline proven (build + boot + init + fork + exec)"
              echo "================================"
              break
            fi
            if ! grep -q 'PULL_FAILED' /tmp/smoke.out; then
              echo "FAIL: pipeline failure (not a registry pull flake); failing the job"
              exit 1
            fi
            if [ "$attempt" -ge "$max" ]; then
              echo "FAIL: image pull from Docker Hub kept flaking after ${max} attempts (PULL_FAILED). This is a registry/network problem, not a pipeline defect; a registry mirror is the production fix."
              exit 1
            fi
            attempt=$((attempt + 1))
            sleep 5
          done

      - name: Inject agent into rootfs and test exec via vsock
        timeout-minutes: 5
        run: |
          set -e
          WORKDIR=/tmp/agent-run-test/agent-test
          mkdir -p $WORKDIR

          # Build a fresh ext4 rootfs with the agent as /init
          dd if=/dev/zero of=$WORKDIR/rootfs.ext4 bs=1M count=256 status=none
          mkfs.ext4 -q -F $WORKDIR/rootfs.ext4
          mkdir -p $WORKDIR/mnt
          sudo mount -o loop $WORKDIR/rootfs.ext4 $WORKDIR/mnt

          # Minimal filesystem
          sudo mkdir -p $WORKDIR/mnt/{bin,dev,proc,sys,tmp,workspace,etc}
          sudo cp /tmp/agent-run-test/agent $WORKDIR/mnt/init
          sudo chmod +x $WORKDIR/mnt/init

          # Need /bin/sh for exec; get busybox
          sudo curl -fsSL -o $WORKDIR/mnt/bin/busybox \
            "https://busybox.net/downloads/binaries/1.35.0-x86_64-linux-musl/busybox"
          sudo chmod +x $WORKDIR/mnt/bin/busybox
          for cmd in sh echo cat ls mkdir rm cp head date base64 tr; do
            sudo ln -sf /bin/busybox $WORKDIR/mnt/bin/$cmd
          done

          echo "sandbox" | sudo tee $WORKDIR/mnt/etc/hostname > /dev/null
          sudo umount $WORKDIR/mnt

          echo "Rootfs built with agent + busybox"
          ls -lh $WORKDIR/rootfs.ext4

          # Ensure KVM permissions after sudo operations
          sudo chmod 666 /dev/kvm

          # Start Firecracker with vsock, capture serial output
          SOCK=$WORKDIR/firecracker.sock
          VSOCK_UDS=$WORKDIR/vsock.sock
          /usr/local/bin/firecracker --api-sock $SOCK > $WORKDIR/serial.log 2>&1 &
          FC_PID=$!
          sleep 1

          # Configure VM with vsock
          curl --unix-socket $SOCK -X PUT 'http://localhost/boot-source' \
            -H 'Content-Type: application/json' \
            -d "{\"kernel_image_path\": \"/tmp/agent-run-test/vmlinux\", \"boot_args\": \"console=ttyS0 reboot=k panic=1 pci=off init=/init\"}"

          curl --unix-socket $SOCK -X PUT 'http://localhost/drives/rootfs' \
            -H 'Content-Type: application/json' \
            -d "{\"drive_id\": \"rootfs\", \"path_on_host\": \"$WORKDIR/rootfs.ext4\", \"is_root_device\": true, \"is_read_only\": false}"

          curl --unix-socket $SOCK -X PUT 'http://localhost/machine-config' \
            -H 'Content-Type: application/json' \
            -d '{"vcpu_count": 1, "mem_size_mib": 256}'

          curl --unix-socket $SOCK -X PUT 'http://localhost/vsock' \
            -H 'Content-Type: application/json' \
            -d "{\"guest_cid\": 3, \"uds_path\": \"$VSOCK_UDS\"}"

          # Boot
          curl --unix-socket $SOCK -X PUT 'http://localhost/actions' \
            -H 'Content-Type: application/json' \
            -d '{"action_type": "InstanceStart"}'

          echo "VM booted with guest agent, waiting for agent to start..."
          sleep 8

          echo "=== Serial console output ==="
          cat $WORKDIR/serial.log || true
          echo "=== End serial output ==="

          echo "Checking vsock UDS exists..."
          ls -la $VSOCK_UDS || echo "WARNING: vsock UDS not found"

          echo "Testing vsock connection to guest agent on port 52..."
          go build -o /tmp/test-agent ./cmd/test-agent/
          timeout 30 /tmp/test-agent "$VSOCK_UDS" || {
            echo "=== FAILURE: serial log ==="
            cat $WORKDIR/serial.log || true
            exit 1
          }

          kill $FC_PID 2>/dev/null || true

      # Snapshot distribution proof (#14, build-once-distribute). This phase
      # proves a PEER pulls a template over the production CAS-serving path and
      # forks from it. cmd/pull-smoke drives TWO real fork engines with TWO data
      # dirs on this ONE machine:
      #
      #   node A  builds a template (Engine.CreateTemplate) into its CAS + data
      #           dir, then serves that CAS under /cas over TLS gated by a peer
      #           token, using the EXACT handler forkd mounts
      #           (cas.RequirePullToken wrapping cas.NewHTTPHandler) with the
      #           real internal/pki server TLS config (TLS 1.3, client cert
      #           required and verified against the CA).
      #   node B  runs engine.PullTemplate(templateID, digest, A's https CAS URL,
      #           token): a real HTTPS pull that materializes the snapshot files,
      #           runs the same digest verify + snapcompat the fork path uses,
      #           and writes the verified marker. Then B FORKS a sandbox from the
      #           PULLED template and execs inside it.
      #
      # SAN PINNING (the Task 1-2 constraint): the pull client pins
      # pki.ServerName, so the holder's serving cert must carry that SAN. This is
      # handled honestly, NOT with InsecureSkipVerify: pull-smoke issues node A a
      # real cert via pki.Issue(pki.ServerName), so the pinned name is what the
      # handshake verifies. node B presents a CA-signed client identity
      # (pki.ControllerName), so the pull also rides forkd-to-forkd mTLS.
      #
      # Two layers GATE:
      #   1. `pull-smoke verify` (no KVM): a WRONG token is rejected with 403 and
      #      a WRONG/non-existent manifest digest fails the pull and leaves no
      #      manifest on B (fail-closed). This runs first because it needs no VM.
      #   2. `pull-smoke kvm`: the full build -> serve -> pull -> materialize ->
      #      verify -> fork -> exec, proving the PULLED snapshot is bootable.
      #
      # HONEST SCOPE: both engines run in one process over a loopback TLS
      # listener: a real cross-process-class HTTP-over-TLS CAS pull (two data
      # dirs, two CAS stores, the production wire path), but the two hosts are
      # the same machine. True cross-HOST distribution exercises the IDENTICAL
      # PullTemplate + cas.Pull code path and is measured only on a multi-node
      # testbed (docs/snapshot-distribution.md, issue #14). A build/boot failure
      # here surfaces as a real FAIL; a missing cert/port is a SETUP error.
      # This phase GATES: no continue-on-error.
      - name: Snapshot distribution, a peer pulls a template over TLS and forks from it
        timeout-minutes: 10
        run: |
          set -e
          sudo chmod 666 /dev/kvm

          go build -o /tmp/pull-smoke ./cmd/pull-smoke/

          # --- layer 1: auth + integrity gates (no KVM, runs anywhere) ---
          echo "=== pull-smoke verify (403 on wrong token, fail-closed on wrong digest) ==="
          rm -rf /tmp/agent-run-test/pull-verify
          /tmp/pull-smoke verify --root /tmp/agent-run-test/pull-verify

          # --- build a busybox + agent rootfs for the distributed template ---
          # pull-smoke kvm builds the template from this rootfs path via
          # Engine.CreateTemplate (agent as /init), exactly like the other KVM
          # smoke drivers.
          WORKDIR=/tmp/agent-run-test/pull-build
          mkdir -p $WORKDIR
          dd if=/dev/zero of=$WORKDIR/rootfs.ext4 bs=1M count=256 status=none
          mkfs.ext4 -q -F $WORKDIR/rootfs.ext4
          mkdir -p $WORKDIR/mnt
          sudo mount -o loop $WORKDIR/rootfs.ext4 $WORKDIR/mnt
          sudo mkdir -p $WORKDIR/mnt/{bin,dev,proc,sys,tmp,workspace,etc,run}
          sudo cp /tmp/agent-run-test/agent $WORKDIR/mnt/init
          sudo chmod +x $WORKDIR/mnt/init
          sudo curl -fsSL -o $WORKDIR/mnt/bin/busybox \
            "https://busybox.net/downloads/binaries/1.35.0-x86_64-linux-musl/busybox"
          sudo chmod +x $WORKDIR/mnt/bin/busybox
          for cmd in sh echo cat ls mkdir rm cp head date base64 tr; do
            sudo ln -sf /bin/busybox $WORKDIR/mnt/bin/$cmd
          done
          echo "sandbox" | sudo tee $WORKDIR/mnt/etc/hostname > /dev/null
          sudo umount $WORKDIR/mnt
          sudo chmod 666 /dev/kvm

          # --- layer 2: build A, serve over TLS, pull to B, fork on B + exec ---
          echo "=== pull-smoke kvm (build A -> serve TLS -> pull B -> fork+exec) ==="
          rm -rf /tmp/agent-run-test/pull-kvm
          /tmp/pull-smoke kvm \
            --root /tmp/agent-run-test/pull-kvm \
            --image $WORKDIR/rootfs.ext4 \
            --firecracker /usr/local/bin/firecracker \
            --kernel /tmp/agent-run-test/vmlinux \
            --agent-bin /tmp/agent-run-test/agent \
            --expect-cmd 'ls /init'

          echo "================================"
          echo "  Snapshot distribution proven: peer pull over TLS + fork from the pulled snapshot"
          echo "================================"

      # Fork-correctness proof: take ONE snapshot after the agent is up, restore
      # TWO VMs from it, and assert each fork reseeds its RNG (distinct urandom),
      # holds a correct wall clock, and records the generation it was told.
      #
      # forkd is NOT in this loop: the workflow drives Firecracker directly, so
      # the guest only reseeds because test-agent sends NotifyForked itself.
      # That is the correct unit-level proof of the GUEST mechanism. forkd
      # end-to-end notify (connect, generation, strict-on-real-engine) is
      # covered by go tests in internal/daemon (TestForkNotifiesAgentWithFreshEntropy,
      # TestForkGenerationIncrementsAcrossForks, TestForkFailsWhenNotifyForkedErrors).
      - name: Fork-correctness, distinct RNG streams and clock resync across forks
        timeout-minutes: 8
        run: |
          set -e
          WORKDIR=/tmp/agent-run-test/fork-correctness
          mkdir -p $WORKDIR

          # Build an ext4 rootfs with the agent as /init plus the busybox tools
          # the notify phase needs (head, date, base64, tr, cat).
          dd if=/dev/zero of=$WORKDIR/rootfs.ext4 bs=1M count=256 status=none
          mkfs.ext4 -q -F $WORKDIR/rootfs.ext4
          mkdir -p $WORKDIR/mnt
          sudo mount -o loop $WORKDIR/rootfs.ext4 $WORKDIR/mnt
          sudo mkdir -p $WORKDIR/mnt/{bin,dev,proc,sys,tmp,workspace,etc,run}
          sudo cp /tmp/agent-run-test/agent $WORKDIR/mnt/init
          sudo chmod +x $WORKDIR/mnt/init
          sudo curl -fsSL -o $WORKDIR/mnt/bin/busybox \
            "https://busybox.net/downloads/binaries/1.35.0-x86_64-linux-musl/busybox"
          sudo chmod +x $WORKDIR/mnt/bin/busybox
          for cmd in sh echo cat ls mkdir rm cp head date base64 tr; do
            sudo ln -sf /bin/busybox $WORKDIR/mnt/bin/$cmd
          done
          echo "sandbox" | sudo tee $WORKDIR/mnt/etc/hostname > /dev/null
          sudo umount $WORKDIR/mnt

          sudo chmod 666 /dev/kvm

          # Fork-correctness depends on a RELATIVE vsock uds_path: Firecracker
          # bakes the exact uds_path string into the snapshot and rebinds it
          # verbatim on every restore. A relative "vsock.sock" is resolved
          # against each Firecracker process's working directory, so identical
          # baked path + distinct per-process cwd = distinct host socket. That
          # is why the source runs in $WORKDIR/src and each fork runs in its
          # own $WORKDIR/fork<n>. This mirrors what the jailer chroot provides
          # in production; raw-forkd mode relies on the per-sandbox cwd.
          mkdir -p $WORKDIR/src

          # Boot the source VM with a relative vsock uds_path and wait for the
          # agent. The api-sock stays absolute; only the vsock path is relative
          # so it gets baked relative into the snapshot.
          SOCK=$WORKDIR/source.sock
          ( cd $WORKDIR/src && exec /usr/local/bin/firecracker --api-sock $SOCK ) > $WORKDIR/source-serial.log 2>&1 &
          SRC_PID=$!
          sleep 1

          curl --unix-socket $SOCK -X PUT 'http://localhost/boot-source' \
            -H 'Content-Type: application/json' \
            -d "{\"kernel_image_path\": \"/tmp/agent-run-test/vmlinux\", \"boot_args\": \"console=ttyS0 reboot=k panic=1 pci=off init=/init\"}"
          curl --unix-socket $SOCK -X PUT 'http://localhost/drives/rootfs' \
            -H 'Content-Type: application/json' \
            -d "{\"drive_id\": \"rootfs\", \"path_on_host\": \"$WORKDIR/rootfs.ext4\", \"is_root_device\": true, \"is_read_only\": false}"
          curl --unix-socket $SOCK -X PUT 'http://localhost/machine-config' \
            -H 'Content-Type: application/json' \
            -d '{"vcpu_count": 1, "mem_size_mib": 256}'
          curl --unix-socket $SOCK -X PUT 'http://localhost/vsock' \
            -H 'Content-Type: application/json' \
            -d "{\"guest_cid\": 3, \"uds_path\": \"vsock.sock\"}"
          curl --unix-socket $SOCK -X PUT 'http://localhost/actions' \
            -H 'Content-Type: application/json' \
            -d '{"action_type": "InstanceStart"}'

          echo "Source VM booted, waiting for agent..."
          sleep 8

          go build -o /tmp/test-agent ./cmd/test-agent/

          # Pause and take ONE full snapshot.
          curl --unix-socket $SOCK -X PATCH 'http://localhost/vm' \
            -H 'Content-Type: application/json' \
            -d '{"state": "Paused"}'
          mkdir -p $WORKDIR/snapshot
          curl --unix-socket $SOCK -X PUT 'http://localhost/snapshot/create' \
            -H 'Content-Type: application/json' \
            -d "{\"snapshot_type\": \"Full\", \"snapshot_path\": \"$WORKDIR/snapshot/vmstate\", \"mem_file_path\": \"$WORKDIR/snapshot/mem\"}"
          echo "Snapshot created:"
          ls -lh $WORKDIR/snapshot/
          kill $SRC_PID 2>/dev/null || true
          sleep 1

          # restore_fork <n> <generation> -> prints test-agent stdout to $WORKDIR/fork<n>.out
          #
          # Each fork runs in its own working directory $WORKDIR/fork<n>, so the
          # relative "vsock.sock" baked into the snapshot is rebound by this
          # fork's Firecracker at $WORKDIR/fork<n>/vsock.sock. Distinct cwd =
          # distinct host socket, so forks never collide on one UDS (the bug
          # this phase regression-tests). test-agent is pointed at exactly that
          # absolute path.
          restore_fork() {
            local n=$1 gen=$2
            local sock=$WORKDIR/fork${n}.sock
            local forkdir=$WORKDIR/fork${n}
            local vsock=$forkdir/vsock.sock
            mkdir -p $forkdir
            ( cd $forkdir && exec /usr/local/bin/firecracker --api-sock $sock ) > $WORKDIR/fork${n}-serial.log 2>&1 &
            echo $! > $WORKDIR/fork${n}.pid
            sleep 1
            curl --unix-socket $sock -X PUT 'http://localhost/snapshot/load' \
              -H 'Content-Type: application/json' \
              -d "{\"snapshot_path\": \"$WORKDIR/snapshot/vmstate\", \"mem_file_path\": \"$WORKDIR/snapshot/mem\", \"enable_diff_snapshots\": false, \"resume_vm\": true}"
            echo "Fork ${n} restored (generation ${gen}); running notify-mode test-agent..."
            timeout 60 /tmp/test-agent --mode notify --generation ${gen} "$vsock" \
              | tee $WORKDIR/fork${n}.out
          }

          restore_fork 1 1
          restore_fork 2 2

          kill $(cat $WORKDIR/fork1.pid) $(cat $WORKDIR/fork2.pid) 2>/dev/null || true

          # --- assertions ---
          RUNNER_NS=$(date +%s%N)

          URANDOM1=$(grep '^URANDOM=' $WORKDIR/fork1.out | head -1 | cut -d= -f2-)
          URANDOM2=$(grep '^URANDOM=' $WORKDIR/fork2.out | head -1 | cut -d= -f2-)
          WALL1=$(grep '^WALLCLOCK_NS=' $WORKDIR/fork1.out | head -1 | cut -d= -f2-)
          WALL2=$(grep '^WALLCLOCK_NS=' $WORKDIR/fork2.out | head -1 | cut -d= -f2-)
          GEN1=$(grep '^FORKGEN=' $WORKDIR/fork1.out | head -1 | cut -d= -f2-)
          GEN2=$(grep '^FORKGEN=' $WORKDIR/fork2.out | head -1 | cut -d= -f2-)

          echo "URANDOM1=$URANDOM1"
          echo "URANDOM2=$URANDOM2"
          echo "WALL1=$WALL1 WALL2=$WALL2 RUNNER_NS=$RUNNER_NS"
          echo "GEN1=$GEN1 GEN2=$GEN2"

          if [ -z "$URANDOM1" ] || [ -z "$URANDOM2" ]; then
            echo "FAIL: missing URANDOM sample from a fork"
            exit 1
          fi
          if [ "$URANDOM1" = "$URANDOM2" ]; then
            echo "FAIL: two forks produced IDENTICAL /dev/urandom output: shared-RNG bug"
            exit 1
          fi
          echo "PASS: forks produced distinct RNG streams"

          # Each guest wall clock must be within 2 seconds of the runner clock.
          for pair in "1:$WALL1" "2:$WALL2"; do
            n=${pair%%:*}; wall=${pair#*:}
            if [ -z "$wall" ]; then echo "FAIL: fork $n missing WALLCLOCK_NS"; exit 1; fi
            diff_ns=$(( wall > RUNNER_NS ? wall - RUNNER_NS : RUNNER_NS - wall ))
            if [ "$diff_ns" -gt 2000000000 ]; then
              echo "FAIL: fork $n wall clock off by ${diff_ns}ns (> 2s)"
              exit 1
            fi
            echo "PASS: fork $n wall clock within ${diff_ns}ns of runner"
          done

          if [ "$GEN1" != "1" ]; then echo "FAIL: fork 1 FORKGEN=$GEN1 want 1"; exit 1; fi
          if [ "$GEN2" != "2" ]; then echo "FAIL: fork 2 FORKGEN=$GEN2 want 2"; exit 1; fi
          echo "PASS: fork-generation file matches generation sent to each fork"

          echo "================================"
          echo "  Fork-correctness checks passed"
          echo "================================"

      # Volume proof: per-fork block-device VOLUMES on a REFLINK-CAPABLE
      # filesystem. The engine roots its volume backings under its data dir, so
      # this phase puts that data dir on a btrfs loopback file (btrfs supports
      # reflink, so cp --reflink=always gives instant CoW). It builds a template
      # with TWO volumes (a Fresh volume and a Snapshot volume seeded host-side
      # with /seeded.txt), forks TWO sandboxes, and asserts via the guest agent:
      #   1. Fresh round-trip: fork1 writes a file to its Fresh volume and reads
      #      it back, proving the volume is mounted writable.
      #   2. Snapshot CoW independence: both forks see the seeded file; fork1
      #      writes a fork-unique file to its Snapshot volume; fork2 does NOT see
      #      it AND the host seed image is byte-for-byte unchanged, proving the
      #      reflink copies diverge (true copy-on-write, no shared backing).
      #   3. Read-only Share: a write to the read-only Share volume is refused.
      # cmd/vol-smoke drives fork.NewEngine with --enable-volumes so the engine's
      # volume attach + guest mount path is the thing under test. This phase
      # GATES: any assertion failure fails the job. The rootfs is hand-built (no
      # registry pull), so there is no pull flake to distinguish here.
      - name: Per-fork volumes, Fresh round-trip and Snapshot CoW independence on btrfs
        timeout-minutes: 10
        run: |
          set -e
          sudo chmod 666 /dev/kvm

          # --- reflink-capable loopback filesystem for the engine data dir ---
          # btrfs supports reflink (cp --reflink=always), which is what the
          # Snapshot policy needs for instant CoW. A ~2G loop file is plenty for
          # the small volumes here.
          sudo apt-get install -y btrfs-progs
          VOL_ROOT=/mnt/vol-btrfs
          BTRFS_IMG=/tmp/agent-run-test/btrfs.img
          dd if=/dev/zero of=$BTRFS_IMG bs=1M count=2048 status=none
          mkfs.btrfs -q $BTRFS_IMG
          sudo mkdir -p $VOL_ROOT
          sudo mount -o loop $BTRFS_IMG $VOL_ROOT
          sudo chmod 777 $VOL_ROOT
          echo "Engine data dir on btrfs (reflink-capable):"
          mount | grep "$VOL_ROOT"

          # --- build a busybox + agent rootfs for the template ---
          WORKDIR=/tmp/agent-run-test/vol-build
          mkdir -p $WORKDIR
          dd if=/dev/zero of=$WORKDIR/rootfs.ext4 bs=1M count=256 status=none
          mkfs.ext4 -q -F $WORKDIR/rootfs.ext4
          mkdir -p $WORKDIR/mnt
          sudo mount -o loop $WORKDIR/rootfs.ext4 $WORKDIR/mnt
          sudo mkdir -p $WORKDIR/mnt/{bin,dev,proc,sys,tmp,workspace,etc,run,mnt}
          sudo cp /tmp/agent-run-test/agent $WORKDIR/mnt/init
          sudo chmod +x $WORKDIR/mnt/init
          sudo curl -fsSL -o $WORKDIR/mnt/bin/busybox \
            "https://busybox.net/downloads/binaries/1.35.0-x86_64-linux-musl/busybox"
          sudo chmod +x $WORKDIR/mnt/bin/busybox
          # echo/cat/sync are the volume assertions; mkdir/ls/rm round out the set.
          for cmd in sh echo cat ls mkdir rm cp head date base64 tr sync mount; do
            sudo ln -sf /bin/busybox $WORKDIR/mnt/bin/$cmd
          done
          echo "sandbox" | sudo tee $WORKDIR/mnt/etc/hostname > /dev/null
          sudo umount $WORKDIR/mnt
          sudo chmod 666 /dev/kvm

          go build -o /tmp/vol-smoke ./cmd/vol-smoke/

          # The engine data dir lives ON the btrfs mount so the volume backings
          # (and their reflink copies) are reflink-capable.
          sudo /tmp/vol-smoke \
            --image $WORKDIR/rootfs.ext4 \
            --data-dir $VOL_ROOT/vol-data \
            --firecracker /usr/local/bin/firecracker \
            --kernel /tmp/agent-run-test/vmlinux \
            --agent-bin /tmp/agent-run-test/agent \
            --fresh-mount /mnt/fresh \
            --snap-mount /mnt/snap \
            --share-mount /mnt/share \
            --seed-content seed-value

          sudo umount $VOL_ROOT || true
          echo "================================"
          echo "  Per-fork volumes proven (Fresh round-trip + Snapshot CoW independence)"
          echo "================================"

      # Encryption-at-rest proof (#31) on REAL cryptsetup. This phase drives the
      # REAL internal/storecrypt Manager (cmd/crypt-smoke uses the production
      # DefaultRunner, so the same package code forkd's encryption integration
      # uses is what runs here, not a hand-rolled cryptsetup script). It creates
      # a per-scope LUKS2 container, writes a unique plaintext marker inside the
      # decrypted mount, and proves three things:
      #
      #   1. CIPHERTEXT-AT-REST: a control read while the container is still
      #      mounted finds the marker in the decrypted view (proving the marker
      #      string IS findable, so the grep is sound), but a grep of the raw
      #      backing <scope>.img after close finds it ZERO times. The bytes on
      #      disk are ciphertext, not the plaintext marker.
      #   2. DECRYPT/RESTORE-WORKS: reopen the container with the key and mount
      #      it; the marker reads back intact. Because dm-crypt sits below the
      #      page cache, the mem mmap CoW restore path the engine uses sees these
      #      same decrypted pages, so CoW page sharing across forks is preserved
      #      exactly as in the plaintext case. The full engine
      #      fork-through-encryption path is exercised by the engine unit tests
      #      (internal/fork) plus this decrypt-roundtrip; this CI phase proves the
      #      real cryptsetup block layer underneath them.
      #   3. CRYPTO-SHRED: Shred (luksErase wipes the keyslots + removes the img),
      #      then reopening with the ORIGINAL key FAILS and the img is gone. The
      #      ciphertext is unrecoverable even though we still hold the key.
      #
      # Setup needs root, cryptsetup, and a loop device (/dev/mapper). A missing
      # tool or device is logged as ENCRYPTION-SETUP-FLAKE and still fails the
      # job (distinctly from ENCRYPTION-ASSERTION-FAILED, a real proof failure).
      # This phase GATES: no continue-on-error.
      - name: Encryption at rest, ciphertext on disk, decrypt restore, crypto-shred
        timeout-minutes: 8
        run: |
          set -e
          fail_setup() { echo "ENCRYPTION-SETUP-FLAKE: $1"; exit 1; }
          fail_assert() { echo "ENCRYPTION-ASSERTION-FAILED: $1"; exit 1; }

          # Real cryptsetup must be present (the whole point of this gate).
          if ! command -v cryptsetup >/dev/null; then
            sudo apt-get update
            sudo apt-get install -y cryptsetup || fail_setup "cryptsetup install failed"
          fi
          command -v cryptsetup >/dev/null || fail_setup "cryptsetup not available"
          cryptsetup --version

          # storecrypt drives losetup under the hood via cryptsetup luksFormat on
          # a file image; confirm loop + device-mapper are usable on this runner.
          [ -d /dev/mapper ] || fail_setup "no /dev/mapper (device-mapper unavailable)"
          sudo modprobe dm_crypt 2>/dev/null || true
          sudo modprobe loop 2>/dev/null || true

          ROOT=/tmp/agent-run-test/crypt
          MOUNT=$ROOT/mnt/tmpl1
          KEY=$ROOT/test.key
          SCOPE=tmpl1
          MARKER="PLAINTEXT-MARKER-7f3a9c21"
          IMG=$ROOT/enc/$SCOPE.img
          sudo rm -rf $ROOT
          mkdir -p $ROOT

          go build -o /tmp/crypt-smoke ./cmd/crypt-smoke/

          # Generate the (CI-only) test key once for this run.
          /tmp/crypt-smoke gen-key -key-file $KEY || fail_setup "gen-key failed"

          # (setup) Create + mount the container and write the marker inside it.
          # Create touches /dev/mapper and mount, so a failure here is setup.
          if ! sudo /tmp/crypt-smoke create \
              -root $ROOT -scope $SCOPE -mount $MOUNT -key-file $KEY \
              -marker "$MARKER" -size-mib 64 2>/tmp/crypt-create.out; then
            cat /tmp/crypt-create.out || true
            grep -qiE 'mapper|loop|cryptsetup|mount' /tmp/crypt-create.out \
              && fail_setup "container create failed (loop/dm/mount unavailable on runner)" \
              || fail_assert "container create failed unexpectedly"
          fi
          cat /tmp/crypt-create.out || true

          # (1a control) The marker IS findable in the decrypted mount, then close.
          sudo /tmp/crypt-smoke probe-open \
            -root $ROOT -scope $SCOPE -mount $MOUNT -marker "$MARKER" \
            || fail_assert "marker not readable in the decrypted mount (control grep failed)"
          sudo /tmp/crypt-smoke close -root $ROOT -scope $SCOPE -mount $MOUNT \
            || fail_setup "close failed"

          # (1b ciphertext-at-rest) The marker is ABSENT in the raw backing img.
          sudo ls -lh $IMG || fail_setup "raw image missing after create"
          sudo /tmp/crypt-smoke grep-raw -root $ROOT -scope $SCOPE -marker "$MARKER" \
            || fail_assert "marker found as PLAINTEXT in the raw image (not encrypted at rest)"

          # (2 decrypt/restore) Reopen with the key, mount, read the marker back.
          sudo /tmp/crypt-smoke reopen-read \
            -root $ROOT -scope $SCOPE -mount $MOUNT -key-file $KEY -marker "$MARKER" \
            || fail_assert "decrypt/restore failed: marker not intact after reopen"
          sudo /tmp/crypt-smoke close -root $ROOT -scope $SCOPE -mount $MOUNT \
            || fail_setup "close after reopen failed"

          # (3 crypto-shred) luksErase + remove img, then reopen MUST fail.
          sudo /tmp/crypt-smoke shred -root $ROOT -scope $SCOPE -mount $MOUNT \
            || fail_assert "shred failed"
          sudo /tmp/crypt-smoke reopen-fail \
            -root $ROOT -scope $SCOPE -mount $MOUNT -key-file $KEY \
            || fail_assert "container reopened after shred OR img still present (data recoverable)"

          echo "================================================="
          echo "  Encryption at rest proven:"
          echo "  ciphertext on disk, decrypt/restore works,"
          echo "  crypto-shred makes the data unrecoverable"
          echo "================================================="

      # Benchmark phase: run the reproducible cmd/bench harness against the real
      # KVM-backed engine and publish the latency distributions to the run page.
      #
      # IMPORTANT: these are SHARED-CI-CLASS numbers. ubuntu-latest is a noisy,
      # oversubscribed, shared runner (often itself nested-virt), so the absolute
      # values are NOT representative of bare metal. They exist to prove the
      # harness runs end to end and to give a reproducible, regenerated-every-run
      # distribution, not to be quoted as the product's latency. Bare-metal
      # reference numbers are tracked in BENCHMARKS.md / issue #15.
      #
      # This phase GATES on the bench running successfully (a crash or zero
      # samples fails the job, because cmd/bench exits non-zero on any fork/exec
      # error and Summarize over zero samples cannot happen without an error
      # first). It does NOT gate on any latency threshold.
      - name: Bench harness, fork-exec and exec round-trip on the KVM runner
        timeout-minutes: 10
        run: |
          set -e
          BENCH_DATA=/tmp/agent-run-test/bench-data
          TPL=bench
          TPL_DIR=$BENCH_DATA/templates/$TPL
          WORKDIR=/tmp/agent-run-test/bench-build
          mkdir -p $WORKDIR $TPL_DIR/snapshot

          sudo chmod 666 /dev/kvm

          # Build a rootfs with the guest agent as /init plus the busybox tools
          # the agent's exec path needs. The bench execs "/bin/true" through the
          # agent's "/bin/sh -c" wrapper, so sh and true must resolve.
          dd if=/dev/zero of=$WORKDIR/rootfs.ext4 bs=1M count=256 status=none
          mkfs.ext4 -q -F $WORKDIR/rootfs.ext4
          mkdir -p $WORKDIR/mnt
          sudo mount -o loop $WORKDIR/rootfs.ext4 $WORKDIR/mnt
          sudo mkdir -p $WORKDIR/mnt/{bin,dev,proc,sys,tmp,workspace,etc,run}
          sudo cp /tmp/agent-run-test/agent $WORKDIR/mnt/init
          sudo chmod +x $WORKDIR/mnt/init
          sudo curl -fsSL -o $WORKDIR/mnt/bin/busybox \
            "https://busybox.net/downloads/binaries/1.35.0-x86_64-linux-musl/busybox"
          sudo chmod +x $WORKDIR/mnt/bin/busybox
          for cmd in sh true echo cat ls mkdir rm cp head date base64 tr; do
            sudo ln -sf /bin/busybox $WORKDIR/mnt/bin/$cmd
          done
          echo "sandbox" | sudo tee $WORKDIR/mnt/etc/hostname > /dev/null
          sudo umount $WORKDIR/mnt

          # The engine's Fork loads the snapshot from a RELATIVE vsock uds_path
          # baked at snapshot time (firecracker.VsockRelPath = "vsock.sock"),
          # resolved against each fork's per-sandbox working directory. The
          # source VM is therefore booted in its own cwd with uds_path
          # "vsock.sock" so the snapshot bakes the relative path the engine
          # expects.
          mkdir -p $WORKDIR/src
          SOCK=$WORKDIR/source.sock
          ( cd $WORKDIR/src && exec /usr/local/bin/firecracker --api-sock $SOCK ) > $WORKDIR/source-serial.log 2>&1 &
          SRC_PID=$!
          sleep 1
          curl --unix-socket $SOCK -X PUT 'http://localhost/boot-source' \
            -H 'Content-Type: application/json' \
            -d "{\"kernel_image_path\": \"/tmp/agent-run-test/vmlinux\", \"boot_args\": \"console=ttyS0 reboot=k panic=1 pci=off init=/init\"}"
          curl --unix-socket $SOCK -X PUT 'http://localhost/drives/rootfs' \
            -H 'Content-Type: application/json' \
            -d "{\"drive_id\": \"rootfs\", \"path_on_host\": \"$WORKDIR/rootfs.ext4\", \"is_root_device\": true, \"is_read_only\": false}"
          curl --unix-socket $SOCK -X PUT 'http://localhost/machine-config' \
            -H 'Content-Type: application/json' \
            -d '{"vcpu_count": 1, "mem_size_mib": 256}'
          curl --unix-socket $SOCK -X PUT 'http://localhost/vsock' \
            -H 'Content-Type: application/json' \
            -d "{\"guest_cid\": 3, \"uds_path\": \"vsock.sock\"}"
          curl --unix-socket $SOCK -X PUT 'http://localhost/actions' \
            -H 'Content-Type: application/json' \
            -d '{"action_type": "InstanceStart"}'

          echo "Bench source VM booted, waiting for agent..."
          sleep 8

          # Pause and snapshot directly into the template layout the engine
          # loads from: <dataDir>/templates/<id>/snapshot/{mem,vmstate} plus the
          # template rootfs at <dataDir>/templates/<id>/rootfs.ext4.
          curl --unix-socket $SOCK -X PATCH 'http://localhost/vm' \
            -H 'Content-Type: application/json' \
            -d '{"state": "Paused"}'
          curl --unix-socket $SOCK -X PUT 'http://localhost/snapshot/create' \
            -H 'Content-Type: application/json' \
            -d "{\"snapshot_type\": \"Full\", \"snapshot_path\": \"$TPL_DIR/snapshot/vmstate\", \"mem_file_path\": \"$TPL_DIR/snapshot/mem\"}"
          kill $SRC_PID 2>/dev/null || true
          sleep 1
          cp $WORKDIR/rootfs.ext4 $TPL_DIR/rootfs.ext4

          # The engine refuses to fork an unverified snapshot unless the cheap
          # "verified" marker is present (internal/fork/verify.go isVerified is a
          # single stat). This snapshot was built by the workflow directly (not
          # via CreateTemplate, so no CAS digest is recorded); writing the marker
          # is the supported way to tell the engine the template is trusted for
          # this in-CI bench run. The engine's Fork-time gate then short-circuits
          # on the marker without re-hashing.
          touch $TPL_DIR/verified
          echo "Bench template laid out:"
          ls -lhR $TPL_DIR

          go build -o /tmp/bench ./cmd/bench/

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## KVM bench harness (shared-CI-class, NOT bare metal)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Runner: \`ubuntu-latest\` (noisy shared GitHub runner). Firecracker v1.15.0. CI kernel + busybox/agent rootfs. These numbers are reproducible per run but are NOT representative of bare metal; see BENCHMARKS.md and issue #15." >> $GITHUB_STEP_SUMMARY

          run_mode() {
            local mode=$1 json=$2
            echo "================================"
            echo "  bench --mode $mode"
            echo "================================"
            /tmp/bench \
              --mode $mode \
              --template $TPL \
              --data-dir $BENCH_DATA \
              --firecracker /usr/local/bin/firecracker \
              --kernel /tmp/agent-run-test/vmlinux \
              --iterations 30 --warmup 5 \
              --summary --json $json | tee /tmp/bench-$mode.out
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### \`$mode\`" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat /tmp/bench-$mode.out >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          }

          run_mode fork-exec /tmp/bench-fork.json
          run_mode exec-rt /tmp/bench-execrt.json

          echo "================================"
          echo "  Bench harness ran (shared-CI-class numbers above)"
          echo "================================"

      # Publish the raw bench JSON so BENCHMARKS.md can point at a concrete
      # artifact for the regenerated-every-run distributions.
      - name: Upload bench JSON artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: |
            /tmp/bench-fork.json
            /tmp/bench-execrt.json
          if-no-files-found: warn

      # CoW-aware metering proof: fork N (4) REAL sandboxes from ONE template
      # built by the bench phase above, then read the engine's CoW-aware
      # metering report (memory derived from /proc/<pid>/smaps_rollup on the
      # runner, disk from stat). The assertions prove the shared template region
      # is counted ONCE across the forks, not once per fork:
      #
      #   * UsedCoWAware << UsedNaive  (the shared restored page set is
      #     deduplicated: naive counts it N times, CoW-aware counts it once)
      #   * CoWSavings > 0             (the deduplicated bytes are real)
      #   * UsedCoWAware == TotalUnique + sharedOnce  (the shared template set
      #     is counted EXACTLY once, not once per fork: a double-count would
      #     inflate UsedCoWAware above this sum)
      #
      # This is BOTH a correctness gate and an honest density datapoint: the
      # marginal cost of an additional fork is the unique set, not a whole VM.
      # The numbers are SHARED-CI-CLASS (noisy ubuntu-latest), reproducible per
      # run, and NOT bare-metal figures.
      #
      # Setup reuses the bench template at $BENCH_DATA/templates/bench (built by
      # the bench phase: snapshot + rootfs + verified marker). A
      # snapshot-build/setup flake (template missing, driver fails to fork) is
      # logged distinctly from a real assertion failure so the cause is obvious.
      - name: CoW-aware metering proof, 4 forks of one template count shared memory once
        timeout-minutes: 10
        run: |
          set -e
          BENCH_DATA=/tmp/agent-run-test/bench-data
          TPL=bench
          TPL_DIR=$BENCH_DATA/templates/$TPL

          sudo chmod 666 /dev/kvm

          # Setup precondition: the bench phase must have laid out the template.
          # Treat a missing template as a SETUP FLAKE, not an assertion failure.
          if [ ! -f "$TPL_DIR/snapshot/vmstate" ] || [ ! -f "$TPL_DIR/rootfs.ext4" ]; then
            echo "SETUP-FLAKE: bench template not present at $TPL_DIR (snapshot build did not complete); cannot run metering proof"
            ls -lhR "$TPL_DIR" || true
            exit 1
          fi

          go build -o /tmp/bench ./cmd/bench/

          # Fork 4 sandboxes from the one template and emit the report JSON.
          # cmd/bench exits non-zero if a fork fails: that is a SETUP FLAKE
          # (KVM/snapshot problem), distinct from the assertions below which run
          # only once a valid report exists.
          if ! /tmp/bench \
              --mode metering \
              --template $TPL \
              --data-dir $BENCH_DATA \
              --firecracker /usr/local/bin/firecracker \
              --kernel /tmp/agent-run-test/vmlinux \
              --forks 4 --settle-ms 800 \
              --summary --json /tmp/metering.json > /tmp/metering.out 2>&1; then
            echo "SETUP-FLAKE: metering driver failed to fork/restore on this runner (KVM or snapshot issue), NOT a metering assertion failure"
            cat /tmp/metering.out || true
            exit 1
          fi
          cat /tmp/metering.out

          # From here on, failures are REAL METERING ASSERTION FAILURES.
          USED_COW=$(jq -r '.UsedCoWAware' /tmp/metering.json)
          USED_NAIVE=$(jq -r '.UsedNaive' /tmp/metering.json)
          SAVINGS=$(jq -r '.CoWSavings' /tmp/metering.json)
          TOTAL_UNIQUE=$(jq -r '.TotalUnique' /tmp/metering.json)
          FORK_COUNT=$(jq -r '.Sandboxes | length' /tmp/metering.json)
          # Shared-once is the single template group's representative shared set.
          SHARED_ONCE=$(jq -r '[.Templates[].SharedOnce] | add // 0' /tmp/metering.json)
          # Max per-fork unique (the worst-case marginal memory of one fork).
          MAX_UNIQUE=$(jq -r '[.Sandboxes[].MemoryUnique] | max // 0' /tmp/metering.json)

          echo "metering: forks=$FORK_COUNT UsedCoWAware=$USED_COW UsedNaive=$USED_NAIVE CoWSavings=$SAVINGS TotalUnique=$TOTAL_UNIQUE sharedOnce=$SHARED_ONCE maxForkUnique=$MAX_UNIQUE"

          fail() { echo "METERING-ASSERTION-FAILED: $1"; exit 1; }

          # Sanity: we forked 4 sandboxes.
          [ "$FORK_COUNT" -eq 4 ] || fail "expected 4 forks in report, got $FORK_COUNT"

          # All values are integer byte counts; use shell integer comparisons
          # (no bc dependency). 64-bit runner shells handle the magnitudes here.

          # (1) CoW-aware total must be strictly less than the naive total: the
          # shared template region is counted once, not 4x.
          if [ "$USED_COW" -ge "$USED_NAIVE" ]; then
            fail "UsedCoWAware ($USED_COW) is not < UsedNaive ($USED_NAIVE); shared region was not deduplicated"
          fi

          # (2) Savings must be positive (the deduplicated shared bytes).
          if [ "$SAVINGS" -le 0 ]; then
            fail "CoWSavings ($SAVINGS) is not > 0"
          fi

          # (3) The shared template set must be counted once: with 4 forks the
          # naive total counts it ~4x, so savings should be roughly (forks-1) x
          # shared-once. Require savings to be at least the shared-once set once
          # over (a strong, conservative form of "counted once not four times").
          if [ "$SHARED_ONCE" -gt 0 ]; then
            if [ "$SAVINGS" -lt "$SHARED_ONCE" ]; then
              fail "CoWSavings ($SAVINGS) < one shared-once set ($SHARED_ONCE); shared region not deduplicated across forks"
            fi
          fi

          # (4) The shared template set is counted EXACTLY once: for a single
          # template, UsedCoWAware must equal TotalUnique + sharedOnce. A naive
          # double-count would inflate UsedCoWAware above this sum. This is the
          # definitional proof that the shared restored page set is paid for
          # once across all forks, not once per fork. (We do NOT assert that the
          # per-fork unique set is smaller than the shared set: for a near-idle
          # minimal VM the resident shared set is tiny, so unique can exceed it.
          # The marginal cost of a fork is its unique set regardless of that
          # ratio, which is what assertions 1 to 3 already establish.)
          EXPECTED_COW=$((TOTAL_UNIQUE + SHARED_ONCE))
          if [ "$USED_COW" -ne "$EXPECTED_COW" ]; then
            fail "UsedCoWAware ($USED_COW) != TotalUnique+sharedOnce ($EXPECTED_COW); the shared template set was not counted exactly once"
          fi

          echo "All CoW-aware metering assertions passed."

          # Publish the honest density datapoint to the run summary.
          to_mib() { awk "BEGIN { printf \"%.2f\", $1 / 1048576 }"; }
          {
            echo ""
            echo "## CoW-aware metering density (shared-CI-class, NOT bare metal)"
            echo ""
            echo "4 real forks of ONE template on \`ubuntu-latest\`. Memory from \`/proc/<pid>/smaps_rollup\`, disk from stat. The shared restored template page set is counted ONCE, so per-fork marginal cost is the unique (private-dirty) set."
            echo ""
            echo "| metric | bytes | MiB |"
            echo "| --- | --- | --- |"
            echo "| UsedCoWAware (unique + shared-once) | $USED_COW | $(to_mib "$USED_COW") |"
            echo "| UsedNaive (shared counted per fork) | $USED_NAIVE | $(to_mib "$USED_NAIVE") |"
            echo "| CoWSavings (deduplicated) | $SAVINGS | $(to_mib "$SAVINGS") |"
            echo "| TotalUnique (sum of per-fork private-dirty) | $TOTAL_UNIQUE | $(to_mib "$TOTAL_UNIQUE") |"
            echo "| shared-once (one template's shared set) | $SHARED_ONCE | $(to_mib "$SHARED_ONCE") |"
            echo "| max per-fork unique (marginal cost) | $MAX_UNIQUE | $(to_mib "$MAX_UNIQUE") |"
            echo ""
            echo "Reproducible from this metering CI phase (\`cmd/bench --mode metering\`). See \`docs/metering.md\` and BENCHMARKS.md."
          } >> $GITHUB_STEP_SUMMARY

          echo "================================"
          echo "  CoW-aware metering proven: shared template memory counted once"
          echo "================================"

      - name: Upload metering report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: metering-report
          path: /tmp/metering.json
          if-no-files-found: warn

      # Husk-pods load-bearing proof (#18): CoW page sharing SURVIVES cgroup v2
      # memcg boundaries. The husk-pods design pre-schedules pods, each running a
      # dormant VMM that activates by restoring ONE template snapshot inside the
      # POD's own cgroup. The entire density argument rests on a precondition the
      # plan demands we verify FIRST: when N forks of one snapshot are placed in N
      # SEPARATE cgroup v2 memory controllers, the shared (clean, MAP_PRIVATE)
      # snapshot page set is still physically shared and counted ~ONCE across the
      # memcgs, while each fork's private-dirty divergence is charged to its OWN
      # memcg. If that did NOT hold (CoWSurvives=false), husk pods would cost a
      # full VM per pod and the design would need rethinking.
      #
      # cmd/husk-probe forks 4 sandboxes from the bench template via the REAL
      # KVM-backed engine, puts each Firecracker PID in <cgroup-root>/vm-<i>
      # (a real cgroup v2 memcg), then samples per-process smaps_rollup +
      # per-memcg memory.current/stat and emits internal/huskprobe.Analyze's
      # CoW-aware Report. It exits 0 on a clean measurement (verdict is in the
      # JSON, it never gates itself) and exits 1 with a "SETUP:"-prefixed stderr
      # line for any precondition failure (no cgroup2, +memory not delegable,
      # template missing, no /dev/kvm, fork failure). This phase reads the JSON
      # and gates on the load-bearing properties.
      #
      # cgroup v2 on ubuntu-latest: the runner uses the unified hierarchy at
      # /sys/fs/cgroup and we run the probe as root. Creating a child cgroup and
      # enabling +memory in its subtree_control requires that +memory is ALSO
      # enabled in the PARENT (root) subtree_control, so we enable it at the root
      # first. The probe-root is created empty (no member processes), so the "no
      # internal processes" rule is satisfied: PIDs only ever go into the leaf
      # vm-<i> cgroups. If child-memcg creation is genuinely blocked on this
      # runner this phase emits a clear "HUSK-SETUP-LIMITATION:" note and FAILS
      # (it never silently passes), distinct from a real "HUSK-DESIGN-FAILED:"
      # (CoWSurvives=false), which would mean CoW does NOT survive memcg
      # boundaries and fails loudly. SHARED-CI-CLASS numbers (noisy
      # ubuntu-latest); reproducible per run, not bare metal.
      - name: Husk pods, CoW page sharing survives cgroup v2 memcg boundaries
        timeout-minutes: 10
        run: |
          set -e
          BENCH_DATA=/tmp/agent-run-test/bench-data
          TPL=bench
          TPL_DIR=$BENCH_DATA/templates/$TPL
          CGROUP_ROOT=/sys/fs/cgroup/husk-probe

          fail_setup() { echo "HUSK-SETUP-LIMITATION: $1"; exit 1; }
          fail_design() { echo "HUSK-DESIGN-FAILED: $1"; exit 1; }
          fail_assert() { echo "HUSK-ASSERTION-FAILED: $1"; exit 1; }

          sudo chmod 666 /dev/kvm

          # Setup precondition: the bench phase laid out the template. Missing
          # template is a SETUP problem, not a design result.
          if [ ! -f "$TPL_DIR/snapshot/vmstate" ] || [ ! -f "$TPL_DIR/rootfs.ext4" ]; then
            fail_setup "bench template not present at $TPL_DIR (snapshot build did not complete); cannot run husk-probe"
          fi

          # Confirm cgroup v2 (unified hierarchy) is what is mounted at
          # /sys/fs/cgroup; the probe needs a cgroup2 mount to create child memcgs.
          echo "cgroup mounts:"
          mount | grep -E 'cgroup' || true
          if ! mount | grep -q 'cgroup2 on /sys/fs/cgroup'; then
            fail_setup "/sys/fs/cgroup is not a cgroup2 unified mount on this runner; child memcg creation needs cgroup v2"
          fi

          # Enable +memory at the ROOT subtree_control so a child cgroup may in
          # turn delegate +memory. The probe enables +memory in its OWN
          # subtree_control, but the kernel only allows that if the parent already
          # offers the controller. The root cgroup has no member processes on a
          # systemd v2 host (everything lives under user.slice/system.slice), so
          # this write is permitted; if it is not, that is a SETUP limitation.
          echo "root cgroup.subtree_control before: $(cat /sys/fs/cgroup/cgroup.subtree_control 2>/dev/null || echo '<unreadable>')"
          if ! grep -qw memory /sys/fs/cgroup/cgroup.subtree_control 2>/dev/null; then
            if ! echo '+memory' | sudo tee /sys/fs/cgroup/cgroup.subtree_control >/dev/null 2>&1; then
              fail_setup "cannot enable +memory in the root cgroup.subtree_control on this runner; child memcgs cannot account memory"
            fi
          fi
          echo "root cgroup.subtree_control after:  $(cat /sys/fs/cgroup/cgroup.subtree_control 2>/dev/null || echo '<unreadable>')"

          go build -o /tmp/husk-probe ./cmd/husk-probe/

          # Run the probe as root (it creates the cgroup-root, enables +memory in
          # the probe subtree, and writes PIDs into the per-VM memcgs). A
          # "SETUP:"-prefixed failure here is a cgroup/KVM/template precondition,
          # NOT a design result.
          sudo rm -rf "$CGROUP_ROOT" 2>/dev/null || true
          if ! sudo /tmp/husk-probe \
              --template $TPL \
              --data-dir $BENCH_DATA \
              --firecracker /usr/local/bin/firecracker \
              --kernel /tmp/agent-run-test/vmlinux \
              --forks 4 \
              --cgroup-root "$CGROUP_ROOT" \
              --json /tmp/husk.json > /tmp/husk.out 2>&1; then
            cat /tmp/husk.out || true
            # A "SETUP:" line means a precondition (cgroup/KVM/template/fork)
            # blocked the measurement: surface it as a SETUP limitation, NOT a
            # design failure, so a runner-class cgroup restriction is never
            # mistaken for CoW failing to survive memcg boundaries.
            if grep -q '^SETUP:' /tmp/husk.out; then
              fail_setup "husk-probe could not measure (cgroup/KVM/template precondition); see SETUP line above"
            fi
            fail_assert "husk-probe exited non-zero without a SETUP marker (unexpected probe failure)"
          fi
          cat /tmp/husk.out

          # From here on, failures are REAL results read from the report JSON.
          [ -f /tmp/husk.json ] || fail_assert "husk-probe produced no JSON report"

          COW_SURVIVES=$(jq -r '.CoWSurvives' /tmp/husk.json)
          DIRTY_PER_VM=$(jq -r '.DirtyPerVM' /tmp/husk.json)
          NAIVE=$(jq -r '.NaiveSum' /tmp/husk.json)
          AGG=$(jq -r '.AggregatePhysical' /tmp/husk.json)
          SHARED=$(jq -r '.SharedResident' /tmp/husk.json)
          TPD=$(jq -r '.TotalPrivateDirty' /tmp/husk.json)
          SAVINGS=$(jq -r '.CoWSavings' /tmp/husk.json)
          VM_COUNT=$(jq -r '.VMs | length' /tmp/husk.json)
          MIN_DIRTY=$(jq -r '[.VMs[].PrivateDirty] | min // 0' /tmp/husk.json)

          echo "husk: forks=$VM_COUNT CoWSurvives=$COW_SURVIVES DirtyPerVM=$DIRTY_PER_VM NaiveSum=$NAIVE AggregatePhysical=$AGG SharedResident=$SHARED TotalPrivateDirty=$TPD CoWSavings=$SAVINGS minForkDirty=$MIN_DIRTY"

          # Sanity: 4 forks measured.
          [ "$VM_COUNT" -eq 4 ] || fail_assert "expected 4 forks in report, got $VM_COUNT"

          # (1) THE load-bearing claim: CoW survives the memcg boundaries. If the
          # shared snapshot pages were re-charged per memcg (sharing destroyed by
          # the cgroup boundary), Analyze would report CoWSurvives=false. That is
          # a DESIGN failure for husk pods, not a CI flake: fail loudly.
          if [ "$COW_SURVIVES" != "true" ]; then
            fail_design "CoWSurvives=$COW_SURVIVES: the shared snapshot page set was NOT counted once across the 4 cgroup v2 memcgs. CoW page sharing did NOT survive the per-pod memcg boundary; the husk-pods density argument needs rethinking."
          fi

          # (2) AggregatePhysical materially below NaiveSum: the shared snapshot
          # resident set is counted ~once across the 4 memcgs, not 4x. Analyze
          # already requires AggregatePhysical <= NaiveSum - SharedResident for
          # CoWSurvives; assert the integer relations directly here too.
          if [ "$AGG" -ge "$NAIVE" ]; then
            fail_assert "AggregatePhysical ($AGG) not < NaiveSum ($NAIVE); the shared snapshot set was not deduplicated across memcgs"
          fi
          if [ "$SHARED" -le 0 ]; then
            fail_assert "SharedResident ($SHARED) not > 0; no shared snapshot resident set was observed"
          fi
          # Material margin: savings must be at least one whole shared set (the
          # snapshot region counted once instead of, naively, once per fork).
          if [ "$SAVINGS" -lt "$SHARED" ]; then
            fail_assert "CoWSavings ($SAVINGS) < one SharedResident set ($SHARED); sharing did not save a material margin across the 4 memcgs"
          fi

          # (3) Private dirty is charged PER memcg: every fork has its own
          # non-trivial private-dirty divergence (DirtyPerVM=true means every VM
          # has PrivateDirty > 0), attributed to that fork's own memcg.
          if [ "$DIRTY_PER_VM" != "true" ]; then
            fail_assert "DirtyPerVM=$DIRTY_PER_VM: some fork had no private-dirty pages charged to its own memcg"
          fi
          if [ "$MIN_DIRTY" -le 0 ]; then
            fail_assert "min per-fork PrivateDirty ($MIN_DIRTY) not > 0; per-VM dirty not charged to each memcg"
          fi

          echo "All husk-pods load-bearing assertions passed: CoW survives cgroup v2 memcg boundaries."

          # Publish the measured numbers (real smaps + memcg) to the run summary.
          to_mib() { awk "BEGIN { printf \"%.2f\", $1 / 1048576 }"; }
          {
            echo ""
            echo "## Husk pods: CoW survives cgroup v2 memcg boundaries (shared-CI-class, NOT bare metal)"
            echo ""
            echo "4 real forks of ONE template, each Firecracker PID in its OWN cgroup v2 memory controller (\`$CGROUP_ROOT/vm-<i>\`) on \`ubuntu-latest\`. Per-VM memory from \`/proc/<pid>/smaps_rollup\`; per-memcg from \`memory.current\`/\`memory.stat\`. The shared snapshot resident set is counted ONCE across the 4 memcgs while each fork's private-dirty divergence is charged to its own memcg. These numbers are reproducible per run but are NOT bare metal."
            echo ""
            echo "**Verdict: CoWSurvives = ${COW_SURVIVES}** (the load-bearing precondition of husk pods #18)."
            echo ""
            echo "| metric | bytes | MiB |"
            echo "| --- | --- | --- |"
            echo "| NaiveSum (every VM charged its full RSS) | $NAIVE | $(to_mib "$NAIVE") |"
            echo "| AggregatePhysical (SharedResident + per-VM dirty) | $AGG | $(to_mib "$AGG") |"
            echo "| SharedResident (snapshot clean set, counted once) | $SHARED | $(to_mib "$SHARED") |"
            echo "| TotalPrivateDirty (sum of per-VM dirty) | $TPD | $(to_mib "$TPD") |"
            echo "| CoWSavings (NaiveSum - AggregatePhysical) | $SAVINGS | $(to_mib "$SAVINGS") |"
            echo ""
            echo "Per-fork private dirty (charged to that fork's own memcg):"
            echo ""
            echo "| pid | PrivateDirty (MiB) | Rss (MiB) | memory.current (MiB) |"
            echo "| --- | --- | --- | --- |"
            jq -r '.VMs[] | "| \(.PID) | \(.PrivateDirty/1048576*100|round/100) | \(.Rss/1048576*100|round/100) | \(.MemcgCurrent/1048576*100|round/100) |"' /tmp/husk.json
            echo ""
            echo "Reproducible from this husk-probe CI phase (\`cmd/husk-probe\`). See \`docs/husk-pods.md\` and \`docs/metering.md\` (#33)."
          } >> $GITHUB_STEP_SUMMARY

          echo "================================"
          echo "  Husk pods load-bearing claim proven: CoW survives cgroup v2 memcg boundaries"
          echo "================================"

      - name: Upload husk-probe report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: husk-probe-report
          path: /tmp/husk.json
          if-no-files-found: warn

      # Husk-stub in-place activation proof (#18). This phase proves the
      # prepare/activate SPLIT and measures the activation latency, the
      # claim-time cost of a husk pod. The model:
      #
      #   prepare  cmd/husk-stub brings up a DORMANT Firecracker VMM (process +
      #            API socket, no snapshot loaded) and serves a control socket.
      #            In production this is the pre-started VMM inside an
      #            already-scheduled husk pod, so the VMM process is NOT spawned
      #            at claim time.
      #   activate the husk-stub --activate control client sends ONE
      #            ActivateRequest for the bench template snapshot; the serving
      #            stub LoadSnapshotWithOverrides + resumes the VM in place and
      #            waits for the guest agent to answer over vsock, then replies
      #            with LatencyMs (load-start to guest-ready). This is the only
      #            cost paid at claim time.
      #
      # The phase reuses the bench template snapshot laid out by the bench phase
      # at $BENCH_DATA/templates/bench/snapshot/{mem,vmstate}. One husk-stub owns
      # exactly one VM, so each activation needs a FRESH dormant stub: the loop
      # starts a stub, waits for its control socket, activates, records LatencyMs,
      # and kills the stub. The husk-stub is LONG-LIVED: it KEEPS the activated
      # VM alive after the activate reply and tears it down only on SIGTERM, so
      # the first activation additionally execs a real command through the guest
      # agent over the returned vsock path WHILE THE SERVING STUB IS STILL ALIVE
      # holding the VM (cmd/test-agent default suite). The gate is "activate OK
      # AND exec works", not just a control reply. The background stub PID is
      # killed after the exec (and on every failure path) so no FC process leaks.
      #
      # HONEST SCOPE: these are SHARED-CI-CLASS numbers on noisy ubuntu-latest,
      # reproducible per run, NOT bare metal. The <=10ms warm activation figure is
      # the bare-metal reference-node TARGET (#18/#15); this phase does NOT assert
      # it and must not be quoted as achieving it. A missing snapshot, missing
      # /dev/kvm, or a control socket that never appears is a SETUP FLAKE
      # (HUSK-STUB-SETUP), distinct from a real activate/exec failure
      # (HUSK-STUB-FAILED). This phase GATES on activate OK + exec.
      - name: Husk-stub in-place activation latency (prepare then activate)
        timeout-minutes: 10
        run: |
          set -e
          BENCH_DATA=/tmp/agent-run-test/bench-data
          TPL=bench
          SNAP_DIR=$BENCH_DATA/templates/$TPL/snapshot
          WORKBASE=/tmp/agent-run-test/husk-stub
          mkdir -p $WORKBASE

          fail_setup()  { echo "HUSK-STUB-SETUP: $1"; exit 1; }
          fail_active() { echo "HUSK-STUB-FAILED: $1"; exit 1; }

          sudo chmod 666 /dev/kvm || fail_setup "no /dev/kvm on this runner"

          # Setup precondition: the bench phase laid out the template snapshot.
          if [ ! -f "$SNAP_DIR/mem" ] || [ ! -f "$SNAP_DIR/vmstate" ]; then
            ls -lhR "$SNAP_DIR" || true
            fail_setup "bench template snapshot not present at $SNAP_DIR (snapshot build did not complete); cannot run husk-stub activation"
          fi

          go build -o /tmp/husk-stub ./cmd/husk-stub/
          go build -o /tmp/test-agent ./cmd/test-agent/

          # activate_once <n>: start a FRESH dormant husk-stub in its own workdir,
          # wait for its control socket, run the --activate client, print the
          # result JSON to $WORKBASE/result<n>.json, and kill the stub. Echoes the
          # measured LatencyMs on success; a setup vs activate failure is
          # distinguished by the markers above. On the FIRST run it also execs a
          # real command through the guest agent over the returned vsock path
          # WHILE the background serving stub is still alive holding the activated
          # VM (the stub is long-lived and does not kill the VM on activate-done);
          # the stub is killed only after the exec, and on every failure path.
          activate_once() {
            local n=$1
            local workdir=$WORKBASE/vm$n
            local ctrl=$WORKBASE/control$n.sock
            local stublog=$WORKBASE/stub$n.log
            local result=$WORKBASE/result$n.json
            mkdir -p $workdir
            rm -f $ctrl

            # Prepare: dormant VMM + control socket served in the background. The
            # stub runs firecracker in $workdir, so the snapshot's baked relative
            # vsock.sock is rebound at $workdir/vsock.sock. A per-n sandbox port
            # keeps concurrent/overlapping stubs from colliding on the in-pod
            # sandbox HTTP API port (this phase exercises the control socket +
            # vsock exec, not the HTTP API).
            # --allow-unverified-snapshots: this phase proves activation LATENCY
            # against the real bench snapshot, not the integrity gate (that gate
            # is unit-tested in internal/husk). The bench snapshot carries no
            # mounted manifest here, so the development escape hatch keeps the
            # default verify-enforced stub from refusing it. Production husk pods
            # run with --manifest and verify enforced (controller-driven).
            /tmp/husk-stub \
              --firecracker /usr/local/bin/firecracker \
              --workdir $workdir \
              --control-socket $ctrl \
              --sandbox-listen 127.0.0.1:$((19090 + n)) \
              --mem-mib 256 \
              --allow-unverified-snapshots \
              > $stublog 2>&1 &
            local stub_pid=$!

            # Wait for the control socket to appear (dormant VMM came up).
            local ready=0
            for i in $(seq 1 40); do
              if [ -S "$ctrl" ]; then ready=1; break; fi
              if ! kill -0 $stub_pid 2>/dev/null; then break; fi
              sleep 0.25
            done
            if [ "$ready" -ne 1 ]; then
              echo "=== stub$n log ==="; cat $stublog || true
              kill $stub_pid 2>/dev/null || true
              fail_setup "control socket $ctrl never appeared (dormant VMM did not come up); SETUP, not an activate failure"
            fi

            # Activate: the control client sends one ActivateRequest for the bench
            # snapshot and prints the ActivateResult JSON. Exit non-zero => not OK.
            if ! /tmp/husk-stub --activate --control-socket $ctrl --snapshot-dir $SNAP_DIR > $result 2>$WORKBASE/activate$n.err; then
              echo "=== activate$n stderr ==="; cat $WORKBASE/activate$n.err || true
              echo "=== result$n.json ==="; cat $result || true
              echo "=== stub$n log ==="; cat $stublog || true
              kill $stub_pid 2>/dev/null || true
              fail_active "activate $n did not return OK (snapshot load or guest-readiness failed); this is a real activation failure"
            fi
            cat $result

            local ok lat vsock
            ok=$(jq -r '.ok' $result)
            lat=$(jq -r '.latency_ms' $result)
            vsock=$(jq -r '.vsock_path' $result)
            if [ "$ok" != "true" ]; then
              kill $stub_pid 2>/dev/null || true
              fail_active "activate $n result ok=$ok"
            fi
            echo "activate $n: OK latency_ms=$lat vsock=$vsock"

            # First run: exec a real command through the guest agent over the
            # returned vsock path, so the gate is activate OK AND a working exec.
            if [ "$n" -eq 1 ]; then
              echo "Proving exec works through the activated VM (vsock=$vsock)..."
              if ! timeout 60 /tmp/test-agent "$vsock"; then
                echo "=== stub$n log ==="; cat $stublog || true
                kill $stub_pid 2>/dev/null || true
                fail_active "exec through the activated guest agent FAILED; the VM was reported active but is not usable"
              fi
              echo "PASS: exec works through the activated VM"
            fi

            echo "$lat" >> $WORKBASE/latencies.txt
            kill $stub_pid 2>/dev/null || true
            sleep 0.3
          }

          rm -f $WORKBASE/latencies.txt
          # Iterations: one is enough to gate (activate OK + exec); a small loop
          # gives a nearest-rank distribution. Each needs a fresh dormant stub.
          ITERS=10
          for n in $(seq 1 $ITERS); do
            echo "================================"
            echo "  husk-stub prepare + activate iteration $n/$ITERS"
            echo "================================"
            activate_once $n
          done

          # Nearest-rank percentiles over the collected activation latencies
          # (same nearest-rank method as internal/benchstat: index ceil(p*N), so
          # P50/P99 are real observed samples, not interpolations). All values are
          # the LatencyMs the stub measured for load-start to guest-ready.
          echo "Collected activation latencies (ms):"
          cat $WORKBASE/latencies.txt
          STATS=$(sort -n $WORKBASE/latencies.txt | LC_ALL=C awk '
            function nr(p,   idx){ idx=int(p*n + 0.999999); if(idx<1)idx=1; if(idx>n)idx=n; return v[idx] }
            { v[NR]=$1 }
            END {
              n=NR
              if (n==0) { print "0 0 0 0 0"; exit }
              printf "%d %.3f %.3f %.3f %.3f", n, v[1], nr(0.50), nr(0.99), v[n]
            }')
          read -r CNT MIN P50 P99 MAX <<< "$STATS"
          echo "husk-stub activation latency: n=$CNT min=${MIN}ms p50=${P50}ms p99=${P99}ms max=${MAX}ms"

          {
            echo ""
            echo "## Husk-stub in-place activation latency (shared-CI-class, NOT bare metal)"
            echo ""
            echo "Prepare = a DORMANT Firecracker VMM pre-started by \`cmd/husk-stub\` (the VMM process is NOT spawned at claim time). Activate = in-place \`LoadSnapshotWithOverrides\` + resume + guest-ready over vsock, the only cost paid at claim. ${CNT} prepare+activate cycles on \`ubuntu-latest\` (noisy shared runner), each a fresh dormant stub activating the bench template snapshot. LatencyMs is load-start to guest-ready, measured by the stub."
            echo ""
            echo "The first iteration additionally execs a real command through the guest agent over the activated VM's vsock (gate: activate OK AND exec works)."
            echo ""
            echo "| metric | ms |"
            echo "| --- | --- |"
            echo "| min | ${MIN} |"
            echo "| p50 (nearest-rank) | ${P50} |"
            echo "| p99 (nearest-rank) | ${P99} |"
            echo "| max | ${MAX} |"
            echo ""
            echo "These numbers are reproducible per run but are NOT bare metal. The **<=10ms warm activation figure is the bare-metal reference-node TARGET (#18/#15), not a shared-CI claim** and is not asserted here. See \`docs/husk-pods.md\` and BENCHMARKS.md."
          } >> $GITHUB_STEP_SUMMARY

          echo "================================"
          echo "  Husk-stub prepare/activate proven: dormant VMM activated in place, exec works"
          echo "================================"

      - name: Upload husk-stub activation results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: husk-stub-activation
          path: |
            /tmp/agent-run-test/husk-stub/result*.json
            /tmp/agent-run-test/husk-stub/latencies.txt
          if-no-files-found: warn

      # Husk activate-correctness proof (#18). The fork-correctness phase above
      # proves the GUEST mechanism (distinct RNG + clock resync) when the host
      # sends NotifyForked directly via test-agent. THIS phase proves the same
      # three correctness properties for the husk ACTIVATE path, where the husk
      # stub itself runs the fork-correctness handshake during Activate (fresh
      # crypto/rand entropy -> NotifyForked reseed + clock step) and delivers the
      # claim-time env/secrets via Configure, fail-closed (a guest that did not
      # report ReseededRNG is not served). The model mirrors fork-correctness:
      # ONE snapshot (the bench template, same one the husk-stub phase used),
      # activated into TWO independent VMs via two fresh dormant stubs, then a
      # READ-ONLY sample of each activated guest.
      #
      # Each stub is activated with an env var and a secret via the --activate
      # client's --env/--secret flags. The stubs are LONG-LIVED, so both stay
      # alive holding their activated VMs while test-agent --mode read EXECs each
      # guest (sending NO NotifyForked; the stub already reseeded) to sample the
      # CRNG, the wall clock, and the delivered values. Assertions, mirroring the
      # fork-correctness phase exactly:
      #   (1) DISTINCT RNG: the two guests' /dev/urandom samples MUST differ. If
      #       they are EQUAL the activate reseed failed and the CRNG is shared
      #       across activations: a real correctness/DESIGN failure, FAIL loudly
      #       (HUSK-ACTIVATE-FAILED), not a flake.
      #   (2) CORRECT CLOCKS: each guest wall clock is within 2s of the runner
      #       (it stepped forward from the frozen snapshot time), same tolerance
      #       and method as fork-correctness.
      #   (3) ENV/SECRET DELIVERY: the env var AND the secret delivered at
      #       activate are readable in the guest (ENVVAL), AND neither value
      #       appears in the host-side stub/client logs (entropy + secrets are
      #       never logged).
      # A missing snapshot or missing /dev/kvm is a SETUP FLAKE (HUSK-ACTIVATE-
      # SETUP), distinct from a real correctness failure (HUSK-ACTIVATE-FAILED).
      - name: Husk activate-correctness, distinct RNG + stepped clock + secret delivery across two activations
        timeout-minutes: 10
        run: |
          set -e
          BENCH_DATA=/tmp/agent-run-test/bench-data
          TPL=bench
          SNAP_DIR=$BENCH_DATA/templates/$TPL/snapshot
          WORKBASE=/tmp/agent-run-test/husk-activate
          mkdir -p $WORKBASE

          fail_setup()  { echo "HUSK-ACTIVATE-SETUP: $1"; exit 1; }
          fail_active() { echo "HUSK-ACTIVATE-FAILED: $1"; exit 1; }

          sudo chmod 666 /dev/kvm || fail_setup "no /dev/kvm on this runner"

          if [ ! -f "$SNAP_DIR/mem" ] || [ ! -f "$SNAP_DIR/vmstate" ]; then
            ls -lhR "$SNAP_DIR" || true
            fail_setup "bench template snapshot not present at $SNAP_DIR (snapshot build did not complete); cannot run husk activate-correctness"
          fi

          go build -o /tmp/husk-stub ./cmd/husk-stub/
          go build -o /tmp/test-agent ./cmd/test-agent/

          # The env value is non-secret and safe to log. The secret value is the
          # canary we assert IS readable in the guest and is NOT in the host logs.
          ENV_KEY=HUSK_ENV
          ENV_VAL=husk-env-value
          SECRET_KEY=HUSK_SECRET
          SECRET_VAL=s3cr3t-husk-canary-$RANDOM

          # PIDs of the two long-lived serving stubs; killed at the end and on
          # every failure path so no firecracker process leaks.
          STUB1_PID=""; STUB2_PID=""
          cleanup() {
            [ -n "$STUB1_PID" ] && kill $STUB1_PID 2>/dev/null || true
            [ -n "$STUB2_PID" ] && kill $STUB2_PID 2>/dev/null || true
          }
          trap cleanup EXIT

          # activate_vm <n>: start a FRESH dormant husk-stub in its own workdir,
          # wait for its control socket, run the --activate client carrying the
          # env var + secret, and LEAVE the stub alive (it is long-lived and holds
          # the activated VM). Sets STUB<n>_PID and prints the vsock path on a
          # VSOCK<n>= line. The stub itself runs the fork-correctness handshake
          # during Activate; this returns OK only if the guest reseeded.
          activate_vm() {
            local n=$1
            local workdir=$WORKBASE/vm$n
            local ctrl=$WORKBASE/control$n.sock
            local stublog=$WORKBASE/stub$n.log
            local result=$WORKBASE/result$n.json
            mkdir -p $workdir
            rm -f $ctrl

            # A per-n sandbox port: two husk stubs run CONCURRENTLY in this phase,
            # so each needs a distinct in-pod sandbox HTTP API port (this phase
            # execs over vsock, not the HTTP API, but the stub serves it on
            # activate and the two must not collide on one port).
            # --allow-unverified-snapshots: this fork-correctness phase exercises
            # the reseed handshake + env/secret delivery against the real bench
            # snapshot, not the integrity gate (unit-tested in internal/husk).
            # No manifest is mounted here, so the development escape hatch keeps
            # the default verify-enforced stub from refusing the bench snapshot.
            /tmp/husk-stub \
              --firecracker /usr/local/bin/firecracker \
              --workdir $workdir \
              --control-socket $ctrl \
              --sandbox-listen 127.0.0.1:$((19090 + n)) \
              --mem-mib 256 \
              --allow-unverified-snapshots \
              > $stublog 2>&1 &
            local pid=$!
            eval "STUB${n}_PID=$pid"

            local ready=0
            for i in $(seq 1 40); do
              if [ -S "$ctrl" ]; then ready=1; break; fi
              if ! kill -0 $pid 2>/dev/null; then break; fi
              sleep 0.25
            done
            if [ "$ready" -ne 1 ]; then
              echo "=== stub$n log ==="; cat $stublog || true
              fail_setup "control socket $ctrl never appeared for VM $n (dormant VMM did not come up); SETUP, not a correctness failure"
            fi

            # Activate WITH an env var and a secret. --secret values are never
            # echoed by the client (kvFlag.String reports counts only). Exit
            # non-zero => not OK (snapshot load, guest-readiness, or reseed
            # handshake failed): a real activation failure, fail closed.
            if ! /tmp/husk-stub --activate \
                --control-socket $ctrl \
                --snapshot-dir $SNAP_DIR \
                --env "$ENV_KEY=$ENV_VAL" \
                --secret "$SECRET_KEY=$SECRET_VAL" \
                > $result 2>$WORKBASE/activate$n.err; then
              echo "=== activate$n stderr ==="; cat $WORKBASE/activate$n.err || true
              echo "=== result$n.json ==="; cat $result || true
              echo "=== stub$n log ==="; cat $stublog || true
              fail_active "activate $n did not return OK (snapshot load, guest-readiness, or fork-correctness reseed handshake failed); this is a real activation failure"
            fi
            cat $result

            local ok vsock
            ok=$(jq -r '.ok' $result)
            vsock=$(jq -r '.vsock_path' $result)
            if [ "$ok" != "true" ]; then
              fail_active "activate $n result ok=$ok"
            fi
            echo "activate $n: OK vsock=$vsock"
          }

          # Activate both VMs from the SAME snapshot; both stubs stay alive. The
          # vsock path is read back from each result JSON (activate_vm runs in the
          # current shell so STUB<n>_PID is set for cleanup).
          activate_vm 1
          activate_vm 2
          VSOCK1=$(jq -r '.vsock_path' $WORKBASE/result1.json)
          VSOCK2=$(jq -r '.vsock_path' $WORKBASE/result2.json)
          echo "VSOCK1=$VSOCK1 VSOCK2=$VSOCK2"

          # READ-ONLY sample of each activated guest. test-agent --mode read sends
          # NO NotifyForked (the stub already reseeded during Activate); it only
          # EXECs the guest to sample URANDOM + WALLCLOCK_NS and read back the
          # delivered secret as ENVVAL. Run while both serving stubs are alive.
          sample_vm() {
            local n=$1 vsock=$2
            echo "Sampling activated VM $n (vsock=$vsock)..."
            if ! timeout 60 /tmp/test-agent --mode read --read-env "$SECRET_KEY" "$vsock" \
                | tee $WORKBASE/read$n.out; then
              echo "=== stub$n log ==="; cat $WORKBASE/stub$n.log || true
              fail_active "read-back exec through activated VM $n FAILED; the VM was reported active but is not usable"
            fi
          }
          sample_vm 1 "$VSOCK1"
          sample_vm 2 "$VSOCK2"

          # --- assertions, mirroring the fork-correctness phase ---
          RUNNER_NS=$(date +%s%N)

          URANDOM1=$(grep '^URANDOM=' $WORKBASE/read1.out | head -1 | cut -d= -f2-)
          URANDOM2=$(grep '^URANDOM=' $WORKBASE/read2.out | head -1 | cut -d= -f2-)
          WALL1=$(grep '^WALLCLOCK_NS=' $WORKBASE/read1.out | head -1 | cut -d= -f2-)
          WALL2=$(grep '^WALLCLOCK_NS=' $WORKBASE/read2.out | head -1 | cut -d= -f2-)
          ENVVAL1=$(grep '^ENVVAL=' $WORKBASE/read1.out | head -1 | cut -d= -f2-)
          ENVVAL2=$(grep '^ENVVAL=' $WORKBASE/read2.out | head -1 | cut -d= -f2-)

          echo "URANDOM1=$URANDOM1"
          echo "URANDOM2=$URANDOM2"
          echo "WALL1=$WALL1 WALL2=$WALL2 RUNNER_NS=$RUNNER_NS"

          # (1) DISTINCT RNG across the two activations.
          if [ -z "$URANDOM1" ] || [ -z "$URANDOM2" ]; then
            fail_active "missing URANDOM sample from an activated VM"
          fi
          if [ "$URANDOM1" = "$URANDOM2" ]; then
            fail_active "two activations produced IDENTICAL /dev/urandom output: the activate reseed failed and the CRNG is shared across activations (shared-RNG correctness failure, not a flake)"
          fi
          echo "PASS: two activations produced distinct RNG streams"

          # (2) CORRECT CLOCKS: each guest wall clock within 2s of the runner, i.e.
          # it stepped forward from the frozen snapshot time.
          for pair in "1:$WALL1" "2:$WALL2"; do
            n=${pair%%:*}; wall=${pair#*:}
            if [ -z "$wall" ]; then fail_active "VM $n missing WALLCLOCK_NS"; fi
            diff_ns=$(( wall > RUNNER_NS ? wall - RUNNER_NS : RUNNER_NS - wall ))
            if [ "$diff_ns" -gt 2000000000 ]; then
              fail_active "VM $n wall clock off by ${diff_ns}ns (> 2s); the clock did not step from the snapshot"
            fi
            echo "PASS: VM $n wall clock within ${diff_ns}ns of runner"
          done

          # (3) ENV/SECRET DELIVERY: the delivered secret is readable in each guest.
          if [ "$ENVVAL1" != "$SECRET_VAL" ] || [ "$ENVVAL2" != "$SECRET_VAL" ]; then
            # Do NOT echo the expected secret value; report only the mismatch.
            fail_active "delivered secret was not present in an activated guest (VM1 match=$([ "$ENVVAL1" = "$SECRET_VAL" ] && echo yes || echo no), VM2 match=$([ "$ENVVAL2" = "$SECRET_VAL" ] && echo yes || echo no))"
          fi
          echo "PASS: env/secret delivered at activate are readable in both guests"

          # The secret value MUST NOT appear in the host-side stub logs or the
          # activate client stderr. The guest read-back (read*.out) intentionally
          # contains it, so it is excluded from this grep.
          if grep -rF "$SECRET_VAL" \
              $WORKBASE/stub1.log $WORKBASE/stub2.log \
              $WORKBASE/activate1.err $WORKBASE/activate2.err \
              $WORKBASE/result1.json $WORKBASE/result2.json 2>/dev/null; then
            fail_active "the delivered secret value LEAKED into a host-side stub/client log; secrets must never be logged"
          fi
          echo "PASS: delivered secret value is NOT present in any host-side stub/client log"

          {
            echo ""
            echo "## Husk activate-correctness (shared-CI-class)"
            echo ""
            echo "Two VMs activated from ONE bench template snapshot via two fresh dormant \`cmd/husk-stub\` processes. Each Activate runs the fork-correctness handshake (fresh \`crypto/rand\` entropy reseeds the guest CRNG via NotifyForked, the wall clock steps) and delivers a claim-time env var + secret via Configure, fail-closed. Proven, mirroring the fork-correctness suite:"
            echo ""
            echo "| property | result |"
            echo "| --- | --- |"
            echo "| distinct RNG across two activations | PASS |"
            echo "| each guest wall clock within 2s of runner | PASS |"
            echo "| env + secret delivered to each guest | PASS |"
            echo "| secret value absent from host-side logs | PASS |"
            echo ""
            echo "See \`docs/husk-pods.md\` and \`docs/fork-correctness.md\`."
          } >> $GITHUB_STEP_SUMMARY

          echo "================================"
          echo "  Husk activate-correctness checks passed"
          echo "================================"

      - name: Upload husk activate-correctness artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: husk-activate-correctness
          path: |
            /tmp/agent-run-test/husk-activate/result*.json
            /tmp/agent-run-test/husk-activate/read*.out
          if-no-files-found: warn

      # Husk NETWORK mTLS activation proof (#18, slice 2). The two husk phases
      # above drive activation over a LOCAL unix control socket. This phase proves
      # the SLICE-2 transport: a real husk activation over the NETWORK mTLS
      # control channel (internal/husk ServeTLS) using the EXACT controller
      # reconcile path (internal/controller ActivateHuskPod), the wire a claim
      # uses to activate a pre-scheduled dormant husk pod in place. The model:
      #
      #   certs    cmd/husk-stub --emit-certs issues an internal/pki test CA and
      #            the two control plane leaves (the husk SERVER leaf carrying the
      #            pki.ServerName SAN, the controller CLIENT leaf carrying the
      #            pki.ControllerName SAN) plus an INDEPENDENT wrong-CA controller
      #            leaf. Reusing internal/pki (not openssl) guarantees the SANs
      #            match what ServerTLSConfig/ClientTLSConfig pin and what
      #            AuthorizeControllerIdentity authorizes; SAN drift is impossible.
      #   prepare  cmd/husk-stub --control-listen serves a DORMANT VMM's mTLS
      #            network control (RequireAndVerifyClientCert, authorized to the
      #            controller identity), refusing to serve without all three TLS
      #            flags (fail closed).
      #   activate cmd/husk-stub --activate --control-addr drives ActivateHuskPod
      #            over mTLS with a claim-time env var + secret; OK means the
      #            snapshot loaded, the guest is ready, and the fork-correctness
      #            reseed + secret delivery ran (fail closed).
      #
      # GATES (all):
      #   1. mTLS network activate returns OK (ActivateHuskPod over the wire).
      #   2. a real exec works through the activated guest agent over the
      #      returned vsock (the VM is genuinely usable, not just a control reply).
      #   3. the delivered secret is readable IN the guest and is NOT present in
      #      any host-side stub/client log (secrets never logged).
      #   4. NEGATIVE: an activate presenting a WRONG-CA controller client cert is
      #      REJECTED by the mTLS gate (the handshake fails; no ActivateResult is
      #      returned). This proves an unauthenticated/wrong-CA peer cannot drive
      #      the secret-bearing activate path.
      #   5. HTTP exec over the SANDBOX endpoint (podIP:sandboxPort, the wire the
      #      claim advertises in Status.Endpoint): a tokened exec reaches the guest
      #      and an UNTOKENED / WRONG-token exec is rejected (401/403). This proves
      #      the advertised endpoint is reachable AND token-gated, and the per-
      #      sandbox bearer token value never appears in any host-side log.
      #
      # HONEST SCOPE: SHARED-CI-CLASS, reproducible per run, NOT bare metal. This
      # proves the network transport + mTLS auth + a real activate+exec+secret and
      # the auth rejection; it does NOT make pod-native the default (raw-forkd
      # remains the default) and the full kind claim->pod->exec-as-default is
      # slice 3. A missing snapshot or /dev/kvm or a control port that never
      # listens is a SETUP FLAKE (HUSK-NET-SETUP), distinct from a real failure
      # (HUSK-NET-FAILED). This phase GATES.
      - name: Husk activation over the mTLS NETWORK control channel (activate + vsock exec + secret + auth rejection + token-gated HTTP exec)
        timeout-minutes: 10
        run: |
          set -e
          BENCH_DATA=/tmp/agent-run-test/bench-data
          TPL=bench
          SNAP_DIR=$BENCH_DATA/templates/$TPL/snapshot
          WORKBASE=/tmp/agent-run-test/husk-net
          CERTS=$WORKBASE/certs
          mkdir -p $WORKBASE

          fail_setup() { echo "HUSK-NET-SETUP: $1"; exit 1; }
          fail_net()   { echo "HUSK-NET-FAILED: $1"; exit 1; }

          sudo chmod 666 /dev/kvm || fail_setup "no /dev/kvm on this runner"

          if [ ! -f "$SNAP_DIR/mem" ] || [ ! -f "$SNAP_DIR/vmstate" ]; then
            ls -lhR "$SNAP_DIR" || true
            fail_setup "bench template snapshot not present at $SNAP_DIR (snapshot build did not complete); cannot run husk network activation"
          fi

          go build -o /tmp/husk-stub ./cmd/husk-stub/
          go build -o /tmp/test-agent ./cmd/test-agent/

          # Issue the mTLS material via internal/pki so the SERVER leaf carries
          # pki.ServerName and the CONTROLLER leaf carries pki.ControllerName,
          # the exact names the husk server pins/authorizes. A second independent
          # CA backs wrong-controller.{crt,key} for the negative test.
          /tmp/husk-stub --emit-certs $CERTS || fail_setup "could not emit internal/pki test certs"
          for f in ca.crt server.crt server.key controller.crt controller.key wrong-controller.crt wrong-controller.key; do
            [ -f "$CERTS/$f" ] || fail_setup "cert $f missing after --emit-certs"
          done

          ENV_KEY=HUSK_NET_ENV
          ENV_VAL=husk-net-env-value
          SECRET_KEY=HUSK_NET_SECRET
          SECRET_VAL=s3cr3t-husk-net-canary-$RANDOM

          # The per-sandbox bearer token the controller mints and delivers over
          # the control channel; the stub gates the in-pod sandbox HTTP API on it.
          # Written to a FILE (never an argv flag) so it is not visible in ps; its
          # value must never appear in any host-side log.
          SANDBOX_TOKEN=husk-net-sandbox-token-canary-$RANDOM
          TOKEN_FILE=$WORKBASE/token
          umask 077; printf '%s' "$SANDBOX_TOKEN" > $TOKEN_FILE

          # A free TCP port for the dormant pod's network control listener, and a
          # second free port for the in-pod token-gated sandbox HTTP API.
          PORT=$(python3 -c 'import socket; s=socket.socket(); s.bind(("127.0.0.1",0)); print(s.getsockname()[1]); s.close()')
          SBPORT=$(python3 -c 'import socket; s=socket.socket(); s.bind(("127.0.0.1",0)); print(s.getsockname()[1]); s.close()')
          ADDR=127.0.0.1:$PORT
          SBADDR=127.0.0.1:$SBPORT
          STUBLOG=$WORKBASE/stub.log
          WORKDIR=$WORKBASE/vm
          mkdir -p $WORKDIR

          STUB_PID=""
          cleanup() { [ -n "$STUB_PID" ] && kill $STUB_PID 2>/dev/null || true; }
          trap cleanup EXIT

          # Start a DORMANT husk pod serving mTLS network control. With all three
          # TLS flags it serves ServeTLS authorized to the controller identity;
          # WITHOUT them cmd/husk-stub refuses to serve (proven by the stub guard).
          # --allow-unverified-snapshots: this phase proves the NETWORK mTLS
          # transport + auth + a real activate/exec/secret against the bench
          # snapshot, not the snapshot integrity gate (unit-tested in
          # internal/husk). No manifest is mounted here, so the development escape
          # hatch keeps the default verify-enforced stub from refusing the bench
          # snapshot. Production husk pods run with --manifest and verify enforced.
          /tmp/husk-stub \
            --firecracker /usr/local/bin/firecracker \
            --workdir $WORKDIR \
            --control-listen $ADDR \
            --sandbox-listen $SBADDR \
            --tls-cert $CERTS/server.crt \
            --tls-key $CERTS/server.key \
            --tls-ca $CERTS/ca.crt \
            --mem-mib 256 \
            --allow-unverified-snapshots \
            > $STUBLOG 2>&1 &
          STUB_PID=$!

          # Wait for the control port to accept connections (dormant VMM up +
          # listener bound). A port that never listens is SETUP, not a failure.
          ready=0
          for i in $(seq 1 60); do
            if python3 -c "import socket,sys; s=socket.socket(); s.settimeout(0.3); sys.exit(0 if s.connect_ex(('127.0.0.1',$PORT))==0 else 1)" 2>/dev/null; then ready=1; break; fi
            if ! kill -0 $STUB_PID 2>/dev/null; then break; fi
            sleep 0.25
          done
          if [ "$ready" -ne 1 ]; then
            echo "=== stub log ==="; cat $STUBLOG || true
            fail_setup "control port $ADDR never accepted (dormant VMM/listener did not come up); SETUP, not an activation failure"
          fi

          # --- GATE 4 (negative) FIRST, while the VM is still dormant: a wrong-CA
          # controller client must be REJECTED by the mTLS gate. ActivateHuskPod
          # presents the wrong-CA leaf; the husk server, trusting only ca.crt,
          # fails the handshake, so --activate exits non-zero and prints NO OK
          # result. We assert it FAILS. Running this first keeps the VM dormant so
          # a (wrongly) accepted activate could not hide behind an already-active
          # VM; a rejected handshake leaves the VM dormant for the real activate.
          echo "=== NEGATIVE: wrong-CA controller cert must be rejected by mTLS ==="
          if /tmp/husk-stub --activate \
              --control-addr $ADDR \
              --snapshot-dir $SNAP_DIR \
              --tls-cert $CERTS/wrong-controller.crt \
              --tls-key $CERTS/wrong-controller.key \
              --tls-ca $CERTS/ca.crt \
              > $WORKBASE/neg.json 2>$WORKBASE/neg.err; then
            echo "=== neg.json ==="; cat $WORKBASE/neg.json || true
            echo "=== stub log ==="; cat $STUBLOG || true
            fail_net "a WRONG-CA controller client was ACCEPTED by the mTLS network control; the activation auth gate did not hold"
          fi
          echo "PASS: wrong-CA controller activate was rejected by the mTLS gate"

          # --- GATES 1-3: a real mTLS network activate with the VALID controller
          # client cert, carrying a claim-time env var + secret, via the exact
          # controller ActivateHuskPod path. OK means snapshot loaded + guest
          # ready + reseed/secret-delivery handshake ran (fail closed).
          echo "=== mTLS network activate (valid controller cert) ==="
          if ! /tmp/husk-stub --activate \
              --control-addr $ADDR \
              --snapshot-dir $SNAP_DIR \
              --tls-cert $CERTS/controller.crt \
              --tls-key $CERTS/controller.key \
              --tls-ca $CERTS/ca.crt \
              --env "$ENV_KEY=$ENV_VAL" \
              --secret "$SECRET_KEY=$SECRET_VAL" \
              --token-file $TOKEN_FILE \
              > $WORKBASE/result.json 2>$WORKBASE/activate.err; then
            echo "=== activate stderr ==="; cat $WORKBASE/activate.err || true
            echo "=== result.json ==="; cat $WORKBASE/result.json || true
            echo "=== stub log ==="; cat $STUBLOG || true
            fail_net "mTLS network activate did not return OK (handshake, snapshot load, guest-readiness, or reseed/secret handshake failed)"
          fi
          cat $WORKBASE/result.json
          OK=$(jq -r '.ok' $WORKBASE/result.json)
          VSOCK=$(jq -r '.vsock_path' $WORKBASE/result.json)
          [ "$OK" = "true" ] || fail_net "mTLS network activate result ok=$OK"
          echo "PASS: mTLS network activate returned OK (vsock=$VSOCK)"

          # GATE 2: a real exec through the activated guest, and GATE 3 read-back
          # of the delivered secret as ENVVAL. The serving stub is still alive
          # holding the activated VM (husk pods are long-lived).
          if ! timeout 60 /tmp/test-agent --mode read --read-env "$SECRET_KEY" "$VSOCK" \
              | tee $WORKBASE/read.out; then
            echo "=== stub log ==="; cat $STUBLOG || true
            fail_net "exec through the mTLS-activated guest FAILED; the VM was reported active but is not usable"
          fi
          echo "PASS: exec works through the mTLS-activated guest"

          ENVVAL=$(grep '^ENVVAL=' $WORKBASE/read.out | head -1 | cut -d= -f2-)
          if [ "$ENVVAL" != "$SECRET_VAL" ]; then
            # Do NOT echo the expected secret; report only the mismatch.
            fail_net "delivered secret was not readable in the mTLS-activated guest (match=$([ "$ENVVAL" = "$SECRET_VAL" ] && echo yes || echo no))"
          fi
          echo "PASS: claim-time secret delivered over mTLS is readable in the guest"

          # GATE 3 (leak check): the secret VALUE must NOT appear in any host-side
          # stub/client log. read.out intentionally contains it (guest read-back)
          # so it is excluded from this grep.
          if grep -rF "$SECRET_VAL" \
              $STUBLOG $WORKBASE/activate.err $WORKBASE/neg.err \
              $WORKBASE/result.json $WORKBASE/neg.json 2>/dev/null; then
            fail_net "the delivered secret value LEAKED into a host-side stub/client log; secrets must never be logged"
          fi
          echo "PASS: delivered secret value is NOT present in any host-side stub/client log"

          # --- GATE 5 (HTTP exec over the SANDBOX endpoint, token-gated): the
          # claim advertises Status.Endpoint = podIP:sandboxPort. Prove that
          # endpoint is actually reachable: the activated stub serves the daemon
          # SandboxAPI on $SBADDR, gated by the per-sandbox bearer token delivered
          # over the control channel. An exec WITH the token must reach the guest;
          # an exec WITHOUT the token (and with a WRONG token) must be rejected
          # (401/403). This is the SDK-style path the controller advertises, not
          # just the local vsock. Wait briefly for the sandbox listener (started on
          # the first successful activate).
          sbready=0
          for i in $(seq 1 40); do
            if python3 -c "import socket,sys; s=socket.socket(); s.settimeout(0.3); sys.exit(0 if s.connect_ex(('127.0.0.1',$SBPORT))==0 else 1)" 2>/dev/null; then sbready=1; break; fi
            sleep 0.25
          done
          [ "$sbready" -eq 1 ] || { echo "=== stub log ==="; cat $STUBLOG || true; fail_net "in-pod sandbox API never listened on $SBADDR after activate"; }

          EXEC_BODY='{"sandbox":"husk","command":"echo husk-http-exec-ok"}'

          # GATE 5a: tokened exec works and reaches the guest.
          HTTP_CODE=$(curl -s -o $WORKBASE/exec.out -w '%{http_code}' \
            -H "Authorization: Bearer $SANDBOX_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$EXEC_BODY" "http://$SBADDR/v1/exec" || echo 000)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "=== exec.out ==="; cat $WORKBASE/exec.out || true
            echo "=== stub log ==="; cat $STUBLOG || true
            fail_net "tokened HTTP exec over the sandbox endpoint returned $HTTP_CODE, want 200 (the advertised endpoint is not reachable + token-gated)"
          fi
          if ! grep -q "husk-http-exec-ok" $WORKBASE/exec.out; then
            echo "=== exec.out ==="; cat $WORKBASE/exec.out || true
            fail_net "tokened HTTP exec did not return the guest's stdout; the endpoint did not bridge to the VM"
          fi
          echo "PASS: tokened HTTP exec over the sandbox endpoint reached the guest"

          # GATE 5b: an exec WITHOUT the token is rejected (fail closed).
          NOTOK_CODE=$(curl -s -o /dev/null -w '%{http_code}' \
            -H "Content-Type: application/json" \
            -d "$EXEC_BODY" "http://$SBADDR/v1/exec" || echo 000)
          case "$NOTOK_CODE" in
            401|403) echo "PASS: untokened HTTP exec rejected ($NOTOK_CODE)";;
            *) fail_net "untokened HTTP exec returned $NOTOK_CODE, want 401/403 (the sandbox endpoint is NOT token-gated)";;
          esac

          # GATE 5c: an exec with a WRONG token is rejected.
          WRONG_CODE=$(curl -s -o /dev/null -w '%{http_code}' \
            -H "Authorization: Bearer wrong-token-not-the-real-one" \
            -H "Content-Type: application/json" \
            -d "$EXEC_BODY" "http://$SBADDR/v1/exec" || echo 000)
          case "$WRONG_CODE" in
            401|403) echo "PASS: wrong-token HTTP exec rejected ($WRONG_CODE)";;
            *) fail_net "wrong-token HTTP exec returned $WRONG_CODE, want 401/403";;
          esac

          # GATE 5 leak check: the bearer token VALUE must not appear in any
          # host-side stub/client log.
          if grep -rF "$SANDBOX_TOKEN" \
              $STUBLOG $WORKBASE/activate.err $WORKBASE/neg.err \
              $WORKBASE/result.json $WORKBASE/neg.json 2>/dev/null; then
            fail_net "the per-sandbox bearer token value LEAKED into a host-side stub/client log; the token is a secret and must never be logged"
          fi
          echo "PASS: per-sandbox bearer token value is NOT present in any host-side stub/client log"

          {
            echo ""
            echo "## Husk activation over the mTLS network control channel (slice 2, shared-CI-class)"
            echo ""
            echo "A real husk activation over the NETWORK mTLS control channel (\`internal/husk\` \`ServeTLS\`) driven by the exact controller reconcile path (\`internal/controller\` \`ActivateHuskPod\`), the wire a claim uses to activate a pre-scheduled dormant husk pod in place. Certs issued via \`internal/pki\` so the server leaf carries \`pki.ServerName\` and the controller leaf carries \`pki.ControllerName\`. Proven:"
            echo ""
            echo "| property | result |"
            echo "| --- | --- |"
            echo "| mTLS network activate returns OK (ActivateHuskPod over the wire) | PASS |"
            echo "| exec works through the activated guest | PASS |"
            echo "| claim-time secret delivered over mTLS, readable in the guest | PASS |"
            echo "| secret value absent from host-side logs | PASS |"
            echo "| wrong-CA controller cert rejected by the mTLS gate | PASS |"
            echo "| HTTP exec over the sandbox endpoint with the bearer token reaches the guest | PASS |"
            echo "| untokened / wrong-token HTTP exec over the sandbox endpoint rejected (401/403) | PASS |"
            echo "| per-sandbox bearer token value absent from host-side logs | PASS |"
            echo ""
            echo "Honest scope: raw-forkd remains the DEFAULT; the full kind claim->pod->exec-as-default is slice 3. See \`docs/husk-pods.md\`."
          } >> $GITHUB_STEP_SUMMARY

          echo "================================"
          echo "  Husk mTLS network activation proven: activate + vsock exec + secret + auth rejection + token-gated HTTP exec over the sandbox endpoint"
          echo "================================"

      - name: Upload husk network-activation artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: husk-net-activation
          path: |
            /tmp/agent-run-test/husk-net/result.json
            /tmp/agent-run-test/husk-net/read.out
          if-no-files-found: warn

      # Install the host networking tools the egress phases need. nftables and
      # iproute2 are what the real internal/network Linux Manager shells out to
      # (nft, ip); a stock ubuntu-latest runner has iproute2 but may lack nft.
      - name: Install nftables and iproute2
        run: |
          set -e
          if ! command -v nft >/dev/null; then
            sudo apt-get update
            sudo apt-get install -y nftables
          fi
          sudo apt-get install -y iproute2 || true
          nft --version
          ip -V

      # Host-side nftables proof against REAL nft, including TWO concurrent
      # sandboxes (the darwin gap). cmd/net-smoke drives the real
      # internal/network Linux Manager: it installs two sandbox identities (two
      # taps, two /30s, two distinct allowlists) exactly as forkd does, then
      # asserts with `nft list ruleset` that both per-sandbox chains exist and
      # the dispatch verdict map keys BOTH taps to their OWN chains. This proves
      # (1) real nft ACCEPTS the rendered ruleset (never exercised on darwin)
      # and (2) the two-sandbox dispatch model installs cleanly without one
      # sandbox's drop killing another's allowed traffic (the cross-tap
      # isolation regression the dispatch redesign fixed). REQUIRED gate.
      - name: Host nftables two-sandbox install validation against real nft
        run: |
          set -e
          go build -o /tmp/net-smoke ./cmd/net-smoke/
          sudo /tmp/net-smoke validate
          echo "================================"
          echo "  Real-nft two-sandbox install validated"
          echo "================================"

      # Guest egress enforcement proof: boot ONE Firecracker VM whose NIC is on
      # a per-sandbox tap, apply the host-side nftables allowlist (via the same
      # Manager.Setup forkd uses) permitting exactly one destination IP:port and
      # denying the rest, then from INSIDE the guest assert: a connect to the
      # ALLOWED destination succeeds and a connect to a DENIED destination is
      # blocked (times out). The guest cannot influence the host ruleset, so this
      # is a genuine end-to-end proof of host-side default-deny egress.
      #
      # The "allowed" and "denied" destinations live in a separate network
      # namespace reached over a veth, so guest->destination traffic is genuinely
      # FORWARDED through the host and traverses the nftables forward hook the
      # allowlist filters (traffic to a host-local IP would hit INPUT, not
      # FORWARD, and would not be a faithful test). REQUIRED gate.
      - name: Guest egress enforcement, reach allowed and block denied
        timeout-minutes: 8
        run: |
          set -e
          WORKDIR=/tmp/agent-run-test/egress
          mkdir -p $WORKDIR
          sudo chmod 666 /dev/kvm

          # The GitHub runner has Docker installed, whose legacy `ip filter
          # FORWARD` chain has policy DROP plus DOCKER-USER/DOCKER-FORWARD
          # chains. nftables evaluates ALL base chains on the forward hook
          # across families, and a DROP in ANY of them is terminal, so Docker's
          # FORWARD policy would drop the sandbox's forwarded egress before our
          # `inet agentrun_egress` table is ever consulted, masking our
          # enforcement and timing out the ALLOWED connect. Insert a permissive
          # rule into Docker's purpose-built user chain so Docker stops being
          # the deciding verdict, leaving OUR `inet agentrun_egress` table as
          # the actual egress enforcer under test. This keeps the proof honest:
          # the DENY still comes from OUR table. With DOCKER-USER ACCEPT the
          # ALLOWED dst passes (Docker accepts, our table accepts) and the
          # DENIED dst is still dropped by OUR sb_<tap> chain, because a drop in
          # our inet table is terminal regardless of Docker accepting. In
          # production forkd runs the tap in the host or per-VM/pod netns
          # without Docker's host FORWARD rules (husk pods #18), so this only
          # removes an environmental artifact of the runner.
          sudo iptables -I DOCKER-USER -j ACCEPT 2>/dev/null || sudo nft insert rule ip filter DOCKER-USER accept 2>/dev/null || true
          sudo sysctl -w net.ipv4.ip_forward=1

          # Addressing.
          TAP=tap_egress
          HOST_IP=10.250.0.1
          GUEST_IP=10.250.0.2
          # Destination netns reachable over a veth; the guest is allowed to
          # reach DST_IP:ALLOWED_PORT only.
          DST_IP=198.51.100.2
          HOST_VETH_IP=198.51.100.1
          ALLOWED_PORT=8080
          DENIED_PORT=9090

          # --- destination network namespace with two listeners ---
          # A veth pair bridges the host and the netns; the netns side holds
          # DST_IP and runs a listener on BOTH ports. Only ALLOWED_PORT is
          # permitted by the host allowlist, so reachability difference is due to
          # nftables, not a missing listener.
          sudo ip netns add egress-dst
          sudo ip link add veth-host type veth peer name veth-ns
          sudo ip link set veth-ns netns egress-dst
          sudo ip addr add ${HOST_VETH_IP}/30 dev veth-host
          sudo ip link set veth-host up
          sudo ip netns exec egress-dst ip addr add ${DST_IP}/30 dev veth-ns
          sudo ip netns exec egress-dst ip link set veth-ns up
          sudo ip netns exec egress-dst ip link set lo up
          sudo ip netns exec egress-dst ip route add default via ${HOST_VETH_IP}
          # Listeners on both ports inside the netns. The script is written to a
          # file first (printf, one bash line) so no multi-line python lands in
          # this YAML block scalar. It binds both ports and accept-loops forever.
          printf '%s\n' \
            'import socket, os' \
            'for p in (int(os.environ["AP"]), int(os.environ["DP"])):' \
            '    s = socket.socket()' \
            '    s.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)' \
            '    s.bind((os.environ["DST"], p))' \
            '    s.listen(16)' \
            '    if os.fork() == 0:' \
            '        while True:' \
            '            c, _ = s.accept(); c.close()' \
            > $WORKDIR/listener.py
          sudo AP=$ALLOWED_PORT DP=$DENIED_PORT DST=$DST_IP \
            ip netns exec egress-dst python3 $WORKDIR/listener.py &
          LISTENER_PID=$!
          sleep 1

          # --- host tap + nftables allowlist via the REAL Manager ---
          # net-smoke setup-one enables forwarding, creates the tap with HOST_IP,
          # and installs the default-deny egress chain permitting only
          # DST_IP:ALLOWED_PORT for GUEST_IP. Same Manager.Setup forkd runs.
          go build -o /tmp/net-smoke ./cmd/net-smoke/
          sudo /tmp/net-smoke setup-one \
            --tap $TAP --host-ip $HOST_IP --guest-ip $GUEST_IP \
            --guest-mac '02:00:00:00:ee:01' \
            --allow ${DST_IP}:${ALLOWED_PORT}
          echo "Live ruleset after setup-one:"
          sudo nft list ruleset

          # --- build the guest rootfs (agent as /init + busybox net tools) ---
          dd if=/dev/zero of=$WORKDIR/rootfs.ext4 bs=1M count=256 status=none
          mkfs.ext4 -q -F $WORKDIR/rootfs.ext4
          mkdir -p $WORKDIR/mnt
          sudo mount -o loop $WORKDIR/rootfs.ext4 $WORKDIR/mnt
          sudo mkdir -p $WORKDIR/mnt/{bin,dev,proc,sys,tmp,workspace,etc,run}
          sudo cp /tmp/agent-run-test/agent $WORKDIR/mnt/init
          sudo chmod +x $WORKDIR/mnt/init
          sudo curl -fsSL -o $WORKDIR/mnt/bin/busybox \
            "https://busybox.net/downloads/binaries/1.35.0-x86_64-linux-musl/busybox"
          sudo chmod +x $WORKDIR/mnt/bin/busybox
          # Net tools (ip, nc, timeout) plus the basics the agent needs.
          for cmd in sh echo cat ls mkdir rm cp head date base64 tr ip nc timeout sleep; do
            sudo ln -sf /bin/busybox $WORKDIR/mnt/bin/$cmd
          done
          echo "sandbox" | sudo tee $WORKDIR/mnt/etc/hostname > /dev/null
          sudo umount $WORKDIR/mnt
          sudo chmod 666 /dev/kvm

          # --- boot the VM with a NIC on the tap and a vsock for the agent ---
          SOCK=$WORKDIR/firecracker.sock
          VSOCK_UDS=$WORKDIR/vsock.sock
          /usr/local/bin/firecracker --api-sock $SOCK > $WORKDIR/serial.log 2>&1 &
          FC_PID=$!
          sleep 1
          curl --unix-socket $SOCK -X PUT 'http://localhost/boot-source' \
            -H 'Content-Type: application/json' \
            -d "{\"kernel_image_path\": \"/tmp/agent-run-test/vmlinux\", \"boot_args\": \"console=ttyS0 reboot=k panic=1 pci=off init=/init\"}"
          curl --unix-socket $SOCK -X PUT 'http://localhost/drives/rootfs' \
            -H 'Content-Type: application/json' \
            -d "{\"drive_id\": \"rootfs\", \"path_on_host\": \"$WORKDIR/rootfs.ext4\", \"is_root_device\": true, \"is_read_only\": false}"
          curl --unix-socket $SOCK -X PUT 'http://localhost/network-interfaces/eth0' \
            -H 'Content-Type: application/json' \
            -d "{\"iface_id\": \"eth0\", \"guest_mac\": \"02:00:00:00:ee:01\", \"host_dev_name\": \"$TAP\"}"
          curl --unix-socket $SOCK -X PUT 'http://localhost/machine-config' \
            -H 'Content-Type: application/json' \
            -d '{"vcpu_count": 1, "mem_size_mib": 256}'
          curl --unix-socket $SOCK -X PUT 'http://localhost/vsock' \
            -H 'Content-Type: application/json' \
            -d "{\"guest_cid\": 3, \"uds_path\": \"$VSOCK_UDS\"}"
          curl --unix-socket $SOCK -X PUT 'http://localhost/actions' \
            -H 'Content-Type: application/json' \
            -d '{"action_type": "InstanceStart"}'

          echo "VM booted with NIC on $TAP, waiting for agent..."
          sleep 8
          echo "=== Serial console output ==="
          cat $WORKDIR/serial.log || true
          echo "=== End serial output ==="

          # --- drive the guest: configure eth0, probe allowed + denied ---
          go build -o /tmp/test-agent ./cmd/test-agent/
          timeout 90 /tmp/test-agent --mode egress \
            --guest-ip $GUEST_IP --prefix-len 30 --gateway $HOST_IP \
            --allowed ${DST_IP}:${ALLOWED_PORT} \
            --denied ${DST_IP}:${DENIED_PORT} \
            "$VSOCK_UDS" || {
              echo "=== FAILURE: serial log ==="
              cat $WORKDIR/serial.log || true
              sudo nft list ruleset || true
              exit 1
            }

          # --- cleanup ---
          kill $FC_PID 2>/dev/null || true
          kill $LISTENER_PID 2>/dev/null || true
          sudo /tmp/net-smoke teardown-one --tap $TAP --host-ip $HOST_IP || true
          sudo ip netns del egress-dst 2>/dev/null || true
          sudo ip link del veth-host 2>/dev/null || true

          echo "================================"
          echo "  Guest egress enforcement proven (reach allowed, block denied)"
          echo "================================"

      # Name-based egress proof: the controlled DNS resolver is the only way a
      # sandbox reaches a host by NAME. forkd resolves only allowlisted names and
      # pins each resolved (ip . port) into that sandbox's nftables set, so the
      # guest can reach exactly what it resolved for an allowlisted name and
      # nothing else. This phase boots ONE VM behind a per-sandbox tap whose
      # allowlist is the NAME egress.test:8080 (not an IP), points the guest at
      # the controlled resolver, and asserts from INSIDE the guest:
      #
      #   1. a DIRECT dial to the destination IP before resolving anything is
      #      BLOCKED (the IP is not statically allowed; reachability is name-gated);
      #   2. resolve+connect egress.test:8080 SUCCEEDS (resolver answered, pinned
      #      198.51.100.2:8080, guest reached it);
      #   3. egress.test:9090 is BLOCKED (the name resolves but only the allowed
      #      port was pinned);
      #   4. denied.test is REFUSED by the resolver (not allowlisted), so the guest
      #      cannot resolve it even though the stub maps it to the SAME test IP:
      #      this proves allowlisting is by NAME, not by IP.
      #
      # The upstream is a STUB resolver under our control (cmd/dns-stub) mapping
      # BOTH names to the same test server IP, so assertion 4 is meaningful. The
      # controlled resolver binds 169.254.1.1 on the host loopback: guest->resolver
      # is delivered locally (INPUT, which our forward-hook table does not filter),
      # while the actual egress to 198.51.100.2 is FORWARDED and gated by the
      # sandbox chain's dynamic pin set. The same DOCKER-USER ACCEPT workaround as
      # the IP-egress phase keeps OUR inet table the deciding verdict. REQUIRED gate.
      - name: Name-based egress enforcement, resolve allowlisted name and block the rest
        timeout-minutes: 8
        run: |
          set -e
          WORKDIR=/tmp/agent-run-test/name-egress
          mkdir -p $WORKDIR
          sudo chmod 666 /dev/kvm

          # Same Docker FORWARD-policy workaround as the IP-egress phase: leave OUR
          # inet agentrun_egress table as the actual egress enforcer.
          sudo iptables -I DOCKER-USER -j ACCEPT 2>/dev/null || sudo nft insert rule ip filter DOCKER-USER accept 2>/dev/null || true
          sudo sysctl -w net.ipv4.ip_forward=1

          # Addressing.
          TAP=tap_negress
          HOST_IP=10.251.0.1
          GUEST_IP=10.251.0.2
          GUEST_MAC='02:00:00:00:ee:02'
          DST_IP=198.51.100.2
          HOST_VETH_IP=198.51.100.1
          ALLOWED_PORT=8080
          DENIED_PORT=9090
          RESOLVER_IP=169.254.1.1
          STUB_ADDR=127.0.0.1:5353

          # Bind the controlled-resolver IP on the host loopback so guest queries
          # to it are delivered locally. /32 on lo is enough; remove on cleanup.
          sudo ip addr add ${RESOLVER_IP}/32 dev lo 2>/dev/null || true

          # --- destination netns: the test server on both ports ---
          # Both names resolve to DST_IP; the listener answers on both the allowed
          # and the wrong port so a reachability difference is due to the pin set,
          # not a missing listener.
          sudo ip netns add negress-dst
          sudo ip link add veth-nhost type veth peer name veth-nns
          sudo ip link set veth-nns netns negress-dst
          sudo ip addr add ${HOST_VETH_IP}/30 dev veth-nhost
          sudo ip link set veth-nhost up
          sudo ip netns exec negress-dst ip addr add ${DST_IP}/30 dev veth-nns
          sudo ip netns exec negress-dst ip link set veth-nns up
          sudo ip netns exec negress-dst ip link set lo up
          sudo ip netns exec negress-dst ip route add default via ${HOST_VETH_IP}
          printf '%s\n' \
            'import socket, os' \
            'for p in (int(os.environ["AP"]), int(os.environ["DP"])):' \
            '    s = socket.socket()' \
            '    s.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)' \
            '    s.bind((os.environ["DST"], p))' \
            '    s.listen(16)' \
            '    if os.fork() == 0:' \
            '        while True:' \
            '            c, _ = s.accept(); c.close()' \
            > $WORKDIR/listener.py
          sudo AP=$ALLOWED_PORT DP=$DENIED_PORT DST=$DST_IP \
            ip netns exec negress-dst python3 $WORKDIR/listener.py &
          LISTENER_PID=$!
          sleep 1

          # --- stub upstream resolver under our control ---
          # Maps BOTH names to the same test server IP so the denied-name proof is
          # by NAME, not by IP. The controlled resolver forwards allowed queries
          # here.
          go build -o /tmp/dns-stub ./cmd/dns-stub/
          /tmp/dns-stub --listen $STUB_ADDR \
            --map egress.test=${DST_IP},denied.test=${DST_IP} --ttl 30 \
            > $WORKDIR/dns-stub.log 2>&1 &
          STUB_PID=$!
          sleep 1
          echo "=== dns-stub log ==="
          cat $WORKDIR/dns-stub.log || true

          # --- host tap + chain + controlled resolver via the REAL Manager ---
          # setup-name-egress installs the per-sandbox chain WITH the resolver IP
          # (DNS to resolver allowed, dynamic pin set declared) and NO static IP
          # allow, then runs the controlled resolver (the same dnsproxy forkd runs)
          # bound on RESOLVER_IP, pinning resolved IPs via real nft. It BLOCKS, so
          # run it in the background.
          go build -o /tmp/net-smoke ./cmd/net-smoke/
          sudo /tmp/net-smoke setup-name-egress \
            --tap $TAP --host-ip $HOST_IP --guest-ip $GUEST_IP \
            --guest-mac "$GUEST_MAC" \
            --resolver-ip $RESOLVER_IP \
            --upstream $STUB_ADDR \
            --name-allow egress.test:${ALLOWED_PORT} \
            > $WORKDIR/net-smoke.log 2>&1 &
          NETSMOKE_PID=$!
          # Wait for the resolver to come up (the chain is installed before listen).
          for i in $(seq 1 20); do
            grep -q 'controlled resolver listening' $WORKDIR/net-smoke.log && break
            sleep 0.5
          done
          echo "=== net-smoke log ==="
          cat $WORKDIR/net-smoke.log || true
          echo "Live ruleset after setup-name-egress:"
          sudo nft list ruleset

          # --- build the guest rootfs (agent + busybox net tools incl. nslookup) ---
          dd if=/dev/zero of=$WORKDIR/rootfs.ext4 bs=1M count=256 status=none
          mkfs.ext4 -q -F $WORKDIR/rootfs.ext4
          mkdir -p $WORKDIR/mnt
          sudo mount -o loop $WORKDIR/rootfs.ext4 $WORKDIR/mnt
          sudo mkdir -p $WORKDIR/mnt/{bin,dev,proc,sys,tmp,workspace,etc,run}
          sudo cp /tmp/agent-run-test/agent $WORKDIR/mnt/init
          sudo chmod +x $WORKDIR/mnt/init
          sudo curl -fsSL -o $WORKDIR/mnt/bin/busybox \
            "https://busybox.net/downloads/binaries/1.35.0-x86_64-linux-musl/busybox"
          sudo chmod +x $WORKDIR/mnt/bin/busybox
          for cmd in sh echo cat ls mkdir rm cp head date base64 tr ip nc nslookup timeout sleep printf; do
            sudo ln -sf /bin/busybox $WORKDIR/mnt/bin/$cmd
          done
          echo "sandbox" | sudo tee $WORKDIR/mnt/etc/hostname > /dev/null
          sudo umount $WORKDIR/mnt
          sudo chmod 666 /dev/kvm

          # --- boot the VM with a NIC on the tap and a vsock for the agent ---
          SOCK=$WORKDIR/firecracker.sock
          VSOCK_UDS=$WORKDIR/vsock.sock
          /usr/local/bin/firecracker --api-sock $SOCK > $WORKDIR/serial.log 2>&1 &
          FC_PID=$!
          sleep 1
          curl --unix-socket $SOCK -X PUT 'http://localhost/boot-source' \
            -H 'Content-Type: application/json' \
            -d "{\"kernel_image_path\": \"/tmp/agent-run-test/vmlinux\", \"boot_args\": \"console=ttyS0 reboot=k panic=1 pci=off init=/init\"}"
          curl --unix-socket $SOCK -X PUT 'http://localhost/drives/rootfs' \
            -H 'Content-Type: application/json' \
            -d "{\"drive_id\": \"rootfs\", \"path_on_host\": \"$WORKDIR/rootfs.ext4\", \"is_root_device\": true, \"is_read_only\": false}"
          curl --unix-socket $SOCK -X PUT 'http://localhost/network-interfaces/eth0' \
            -H 'Content-Type: application/json' \
            -d "{\"iface_id\": \"eth0\", \"guest_mac\": \"$GUEST_MAC\", \"host_dev_name\": \"$TAP\"}"
          curl --unix-socket $SOCK -X PUT 'http://localhost/machine-config' \
            -H 'Content-Type: application/json' \
            -d '{"vcpu_count": 1, "mem_size_mib": 256}'
          curl --unix-socket $SOCK -X PUT 'http://localhost/vsock' \
            -H 'Content-Type: application/json' \
            -d "{\"guest_cid\": 3, \"uds_path\": \"$VSOCK_UDS\"}"
          curl --unix-socket $SOCK -X PUT 'http://localhost/actions' \
            -H 'Content-Type: application/json' \
            -d '{"action_type": "InstanceStart"}'

          echo "VM booted with NIC on $TAP, waiting for agent..."
          sleep 8
          echo "=== Serial console output ==="
          cat $WORKDIR/serial.log || true
          echo "=== End serial output ==="

          # --- drive the guest: configure eth0 + resolver, run the four probes ---
          go build -o /tmp/test-agent ./cmd/test-agent/
          timeout 120 /tmp/test-agent --mode name-egress \
            --guest-ip $GUEST_IP --prefix-len 30 --gateway $HOST_IP \
            --resolver $RESOLVER_IP \
            --allow-name egress.test:${ALLOWED_PORT} \
            --wrong-port egress.test:${DENIED_PORT} \
            --denied-name denied.test:${ALLOWED_PORT} \
            --direct-ip ${DST_IP}:${ALLOWED_PORT} \
            "$VSOCK_UDS" || {
              echo "=== FAILURE: serial log ==="
              cat $WORKDIR/serial.log || true
              echo "=== net-smoke log ==="
              cat $WORKDIR/net-smoke.log || true
              echo "=== dns-stub log ==="
              cat $WORKDIR/dns-stub.log || true
              sudo nft list ruleset || true
              exit 1
            }

          # --- cleanup ---
          kill $FC_PID 2>/dev/null || true
          kill $LISTENER_PID 2>/dev/null || true
          kill $STUB_PID 2>/dev/null || true
          sudo kill $NETSMOKE_PID 2>/dev/null || true
          sudo /tmp/net-smoke teardown-one --tap $TAP --host-ip $HOST_IP || true
          sudo ip addr del ${RESOLVER_IP}/32 dev lo 2>/dev/null || true
          sudo ip netns del negress-dst 2>/dev/null || true
          sudo ip link del veth-nhost 2>/dev/null || true

          echo "================================"
          echo "  Name-based egress proven (resolved allowlisted name reachable; wrong port, denied name, and un-resolved direct IP blocked)"
          echo "================================"

      # Jailer-boot proof: launch Firecracker via the jailer (mirroring the
      # internal/firecracker jailerArgs shape), restore the same snapshot inside
      # the chroot, and assert the agent answers over the jailed vsock.
      #
      # This proves the jailer MECHANICS (chroot, --id, --exec-file, per-VM
      # uid/gid, API at the jailed socket). It does NOT prove the exact dropped
      # capability set: the runner is root and still holds every capability, so
      # a missing cap would not surface here. Dropped-cap proof is tracked
      # separately. See issue #2.
      - name: Jailer-boot proof, snapshot restore under the jailer
        timeout-minutes: 8
        # TODO(#2): chroot path/vsock-socket semantics under the jailer are not
        # yet validated end to end on the runner; if a jailer arg/cap detail
        # makes this fail we do not want to block the load-bearing
        # fork-correctness phase above. Drop continue-on-error once this is
        # confirmed green and tighten into a required assertion.
        continue-on-error: true
        run: |
          set -e
          CHROOT_BASE=/srv/jailer
          ID=smoke
          UID_GID=64000
          sudo mkdir -p $CHROOT_BASE
          sudo chmod 666 /dev/kvm

          # The jailer chroots to <base>/firecracker/<id>/root and runs as
          # --uid/--gid; the API socket lives at run/firecracker.socket inside it.
          ROOT=$CHROOT_BASE/firecracker/$ID/root
          sudo mkdir -p $ROOT/run

          # Hard-link kernel, rootfs, and snapshot into the chroot (jailer
          # cannot follow paths outside it). Use the agent rootfs + snapshot
          # produced by the fork-correctness phase.
          FC_WORK=/tmp/agent-run-test/fork-correctness
          sudo cp /tmp/agent-run-test/vmlinux $ROOT/vmlinux
          sudo cp $FC_WORK/rootfs.ext4 $ROOT/rootfs.ext4
          sudo mkdir -p $ROOT/snapshot
          sudo cp $FC_WORK/snapshot/vmstate $ROOT/snapshot/vmstate
          sudo cp $FC_WORK/snapshot/mem $ROOT/snapshot/mem
          sudo chown -R ${UID_GID}:${UID_GID} $CHROOT_BASE/firecracker/$ID

          # Launch via the jailer. Arg shape mirrors internal/firecracker.jailerArgs.
          sudo /usr/local/bin/jailer \
            --id $ID \
            --exec-file /usr/local/bin/firecracker \
            --uid $UID_GID \
            --gid $UID_GID \
            --chroot-base-dir $CHROOT_BASE \
            -- \
            --api-sock run/firecracker.socket \
            > /tmp/jailer-serial.log 2>&1 &
          JAILER_PID=$!
          sleep 2

          JAILED_SOCK=$ROOT/run/firecracker.socket
          JAILED_VSOCK=$ROOT/run/agent-vsock.sock
          echo "Waiting for jailed API socket at $JAILED_SOCK ..."
          for i in $(seq 1 20); do
            [ -S "$JAILED_SOCK" ] && break
            sleep 0.5
          done
          sudo ls -la $ROOT/run || true

          # Paths in API requests are relative to the chroot root.
          sudo curl --unix-socket $JAILED_SOCK -X PUT 'http://localhost/vsock' \
            -H 'Content-Type: application/json' \
            -d '{"guest_cid": 3, "uds_path": "run/agent-vsock.sock"}'
          sudo curl --unix-socket $JAILED_SOCK -X PUT 'http://localhost/snapshot/load' \
            -H 'Content-Type: application/json' \
            -d '{"snapshot_path": "snapshot/vmstate", "mem_file_path": "snapshot/mem", "enable_diff_snapshots": false, "resume_vm": true}'

          echo "Jailed VM restored; pinging agent over jailed vsock..."
          sudo chmod 666 $JAILED_VSOCK 2>/dev/null || true
          go build -o /tmp/test-agent ./cmd/test-agent/
          sudo timeout 60 /tmp/test-agent "$JAILED_VSOCK" || {
            echo "=== FAILURE: jailer serial log ==="
            sudo cat /tmp/jailer-serial.log || true
            exit 1
          }

          sudo kill $JAILER_PID 2>/dev/null || true
          echo "================================"
          echo "  Jailer-boot proof passed"
          echo "================================"
