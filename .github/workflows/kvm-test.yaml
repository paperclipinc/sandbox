name: KVM Integration Test

on:
  push:
    branches: [main]
    paths:
      - 'internal/firecracker/**'
      - 'internal/fork/**'
      - 'guest/**'
      - 'cmd/test-agent/**'
      - 'internal/vsock/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  firecracker-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check KVM availability
        run: |
          ls -la /dev/kvm
          grep -cE '(vmx|svm)' /proc/cpuinfo

      - name: Install Firecracker
        run: |
          FC_VERSION=v1.15.0
          curl -fsSL -o /tmp/fc.tgz \
            "https://github.com/firecracker-microvm/firecracker/releases/download/${FC_VERSION}/firecracker-${FC_VERSION}-x86_64.tgz"
          tar -xzf /tmp/fc.tgz -C /tmp
          sudo mv "/tmp/release-${FC_VERSION}-x86_64/firecracker-${FC_VERSION}-x86_64" /usr/local/bin/firecracker
          sudo chmod +x /usr/local/bin/firecracker
          firecracker --version

      - name: Download kernel and rootfs
        run: |
          mkdir -p /tmp/agent-run-test
          ARCH=$(uname -m)

          # Determine CI version from latest Firecracker release
          FC_VERSION=v1.15.0
          CI_VERSION=$(echo $FC_VERSION | sed 's/v//' | cut -d. -f1-2)

          # Find latest kernel in S3 (strip trailing dots from XML parsing)
          KERNEL_KEY=$(curl -fsSL "https://s3.amazonaws.com/spec.ccfc.min/?prefix=firecracker-ci/v${CI_VERSION}/${ARCH}/vmlinux-" \
            | grep -oP "firecracker-ci/v${CI_VERSION}/${ARCH}/vmlinux-[0-9]+\.[0-9]+\.[0-9]+" \
            | sort -V | tail -1)
          echo "Downloading kernel: $KERNEL_KEY"
          curl -fsSL -o /tmp/agent-run-test/vmlinux \
            "https://s3.amazonaws.com/spec.ccfc.min/${KERNEL_KEY}"

          # Find latest rootfs in S3
          ROOTFS_KEY=$(curl -fsSL "https://s3.amazonaws.com/spec.ccfc.min/?prefix=firecracker-ci/v${CI_VERSION}/${ARCH}/ubuntu-" \
            | grep -oP "firecracker-ci/v${CI_VERSION}/${ARCH}/ubuntu-[0-9.]+\.(ext4|squashfs)(?=<)" \
            | sort -V | tail -1)
          echo "Downloading rootfs: $ROOTFS_KEY"

          # If squashfs, convert to ext4; if ext4, use directly
          if echo "$ROOTFS_KEY" | grep -q squashfs; then
            curl -fsSL -o /tmp/agent-run-test/rootfs.squashfs \
              "https://s3.amazonaws.com/spec.ccfc.min/${ROOTFS_KEY}"
            sudo apt-get install -y squashfs-tools
            sudo unsquashfs -d /tmp/rootfs-mount /tmp/agent-run-test/rootfs.squashfs
            dd if=/dev/zero of=/tmp/agent-run-test/rootfs.ext4 bs=1M count=512
            mkfs.ext4 /tmp/agent-run-test/rootfs.ext4
            mkdir -p /tmp/rootfs-ext4
            sudo mount /tmp/agent-run-test/rootfs.ext4 /tmp/rootfs-ext4
            sudo cp -a /tmp/rootfs-mount/* /tmp/rootfs-ext4/
            sudo umount /tmp/rootfs-ext4
          else
            curl -fsSL -o /tmp/agent-run-test/rootfs.ext4 \
              "https://s3.amazonaws.com/spec.ccfc.min/${ROOTFS_KEY}"
          fi

          ls -lh /tmp/agent-run-test/

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Run unit tests
        run: go test ./internal/fork/... ./internal/workspace/... -v

      - name: Test Firecracker snapshot create/restore
        run: |
          set -e

          WORKDIR=/tmp/agent-run-test/fc-test
          mkdir -p $WORKDIR

          # Copy rootfs (Firecracker needs a writable copy)
          cp /tmp/agent-run-test/rootfs.ext4 $WORKDIR/rootfs.ext4

          # Start Firecracker
          SOCK=$WORKDIR/firecracker.sock
          /usr/local/bin/firecracker --api-sock $SOCK &
          FC_PID=$!
          sleep 1

          # Configure VM
          curl --unix-socket $SOCK -X PUT 'http://localhost/boot-source' \
            -H 'Content-Type: application/json' \
            -d "{\"kernel_image_path\": \"/tmp/agent-run-test/vmlinux\", \"boot_args\": \"console=ttyS0 reboot=k panic=1 pci=off\"}"

          curl --unix-socket $SOCK -X PUT 'http://localhost/drives/rootfs' \
            -H 'Content-Type: application/json' \
            -d "{\"drive_id\": \"rootfs\", \"path_on_host\": \"$WORKDIR/rootfs.ext4\", \"is_root_device\": true, \"is_read_only\": false}"

          curl --unix-socket $SOCK -X PUT 'http://localhost/machine-config' \
            -H 'Content-Type: application/json' \
            -d '{"vcpu_count": 1, "mem_size_mib": 256}'

          # Boot
          curl --unix-socket $SOCK -X PUT 'http://localhost/actions' \
            -H 'Content-Type: application/json' \
            -d '{"action_type": "InstanceStart"}'

          echo "VM booted, waiting for init..."
          sleep 5

          # Pause
          curl --unix-socket $SOCK -X PATCH 'http://localhost/vm' \
            -H 'Content-Type: application/json' \
            -d '{"state": "Paused"}'

          # Snapshot
          mkdir -p $WORKDIR/snapshot
          curl --unix-socket $SOCK -X PUT 'http://localhost/snapshot/create' \
            -H 'Content-Type: application/json' \
            -d "{\"snapshot_type\": \"Full\", \"snapshot_path\": \"$WORKDIR/snapshot/vmstate\", \"mem_file_path\": \"$WORKDIR/snapshot/mem\"}"

          echo "Snapshot created:"
          ls -lh $WORKDIR/snapshot/

          # Kill source VM
          kill $FC_PID 2>/dev/null || true
          sleep 1

          # Restore from snapshot in a new Firecracker process
          SOCK2=$WORKDIR/firecracker2.sock
          /usr/local/bin/firecracker --api-sock $SOCK2 &
          FC_PID2=$!
          sleep 1

          START_TIME=$(date +%s%N)

          curl --unix-socket $SOCK2 -X PUT 'http://localhost/snapshot/load' \
            -H 'Content-Type: application/json' \
            -d "{\"snapshot_path\": \"$WORKDIR/snapshot/vmstate\", \"mem_file_path\": \"$WORKDIR/snapshot/mem\", \"enable_diff_snapshots\": false, \"resume_vm\": true}"

          END_TIME=$(date +%s%N)
          ELAPSED_MS=$(( (END_TIME - START_TIME) / 1000000 ))

          echo ""
          echo "================================"
          echo "  Snapshot restore: ${ELAPSED_MS}ms"
          echo "================================"

          # Clean up
          kill $FC_PID2 2>/dev/null || true
          echo "Firecracker snapshot create/restore test passed"

      - name: Build guest agent
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o /tmp/agent-run-test/agent ./guest/agent/
          ls -lh /tmp/agent-run-test/agent

      - name: Inject agent into rootfs and test exec via vsock
        timeout-minutes: 5
        run: |
          set -e
          WORKDIR=/tmp/agent-run-test/agent-test
          mkdir -p $WORKDIR

          # Build a fresh ext4 rootfs with the agent as /init
          dd if=/dev/zero of=$WORKDIR/rootfs.ext4 bs=1M count=256 status=none
          mkfs.ext4 -q -F $WORKDIR/rootfs.ext4
          mkdir -p $WORKDIR/mnt
          sudo mount -o loop $WORKDIR/rootfs.ext4 $WORKDIR/mnt

          # Minimal filesystem
          sudo mkdir -p $WORKDIR/mnt/{bin,dev,proc,sys,tmp,workspace,etc}
          sudo cp /tmp/agent-run-test/agent $WORKDIR/mnt/init
          sudo chmod +x $WORKDIR/mnt/init

          # Need /bin/sh for exec — get busybox
          sudo curl -fsSL -o $WORKDIR/mnt/bin/busybox \
            "https://busybox.net/downloads/binaries/1.35.0-x86_64-linux-musl/busybox"
          sudo chmod +x $WORKDIR/mnt/bin/busybox
          for cmd in sh echo cat ls mkdir rm cp; do
            sudo ln -sf /bin/busybox $WORKDIR/mnt/bin/$cmd
          done

          echo "sandbox" | sudo tee $WORKDIR/mnt/etc/hostname > /dev/null
          sudo umount $WORKDIR/mnt

          echo "Rootfs built with agent + busybox"
          ls -lh $WORKDIR/rootfs.ext4

          # Ensure KVM permissions after sudo operations
          sudo chmod 666 /dev/kvm

          # Start Firecracker with vsock, capture serial output
          SOCK=$WORKDIR/firecracker.sock
          VSOCK_UDS=$WORKDIR/vsock.sock
          /usr/local/bin/firecracker --api-sock $SOCK > $WORKDIR/serial.log 2>&1 &
          FC_PID=$!
          sleep 1

          # Configure VM with vsock
          curl --unix-socket $SOCK -X PUT 'http://localhost/boot-source' \
            -H 'Content-Type: application/json' \
            -d "{\"kernel_image_path\": \"/tmp/agent-run-test/vmlinux\", \"boot_args\": \"console=ttyS0 reboot=k panic=1 pci=off init=/init\"}"

          curl --unix-socket $SOCK -X PUT 'http://localhost/drives/rootfs' \
            -H 'Content-Type: application/json' \
            -d "{\"drive_id\": \"rootfs\", \"path_on_host\": \"$WORKDIR/rootfs.ext4\", \"is_root_device\": true, \"is_read_only\": false}"

          curl --unix-socket $SOCK -X PUT 'http://localhost/machine-config' \
            -H 'Content-Type: application/json' \
            -d '{"vcpu_count": 1, "mem_size_mib": 256}'

          curl --unix-socket $SOCK -X PUT 'http://localhost/vsock' \
            -H 'Content-Type: application/json' \
            -d "{\"guest_cid\": 3, \"uds_path\": \"$VSOCK_UDS\"}"

          # Boot
          curl --unix-socket $SOCK -X PUT 'http://localhost/actions' \
            -H 'Content-Type: application/json' \
            -d '{"action_type": "InstanceStart"}'

          echo "VM booted with guest agent, waiting for agent to start..."
          sleep 8

          echo "=== Serial console output ==="
          cat $WORKDIR/serial.log || true
          echo "=== End serial output ==="

          echo "Checking vsock UDS exists..."
          ls -la $VSOCK_UDS || echo "WARNING: vsock UDS not found"

          echo "Testing vsock connection to guest agent on port 52..."
          go build -o /tmp/test-agent ./cmd/test-agent/
          timeout 30 /tmp/test-agent "$VSOCK_UDS" || {
            echo "=== FAILURE: serial log ==="
            cat $WORKDIR/serial.log || true
            exit 1
          }

          kill $FC_PID 2>/dev/null || true
