name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - run: go build ./...
      - name: Install envtest assets (controller suite needs etcd/kube-apiserver)
        run: echo "KUBEBUILDER_ASSETS=$(go run sigs.k8s.io/controller-runtime/tools/setup-envtest@latest use 1.31 -p path)" >> "$GITHUB_ENV"
      - run: go test ./... -v -race
      - run: go vet ./...

  go-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: golangci-lint
        run: |
          # Build golangci-lint from source with the job's go 1.26 toolchain.
          # The prebuilt release binary (via golangci-lint-action) is built with
          # go 1.24 and refuses a go 1.26 target ("built with go1.24 is lower
          # than the targeted Go version 1.26"). A from-source install compiles
          # with go 1.26 and analyzes the target cleanly, matching the local
          # verification of the faithful go 1.26 bump (ADR 0001). v1.64.8 is the
          # last v1 line and reads our v1-format .golangci.yml.
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8
          "$(go env GOPATH)/bin/golangci-lint" run --timeout=5m

  manifests:
    # Validate the production deploy manifests: kubeconform schema-checks every
    # YAML under deploy/ and kubectl proves the kustomize base resolves. Core
    # kinds (Deployment, ClusterRole, ServiceAccount, DaemonSet, Namespace) are
    # validated strictly; the agentrun.dev custom kinds (SandboxTemplate,
    # SandboxPool, SandboxClaim, SandboxFork) have no published schema, so
    # -ignore-missing-schemas skips them rather than failing. The CRD
    # definitions themselves (kind: CustomResourceDefinition) ARE validated.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install kubeconform
        run: |
          set -euo pipefail
          curl -sSLo /tmp/kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf /tmp/kubeconform.tar.gz -C /tmp kubeconform
          sudo install /tmp/kubeconform /usr/local/bin/kubeconform
          kubeconform -v
      - name: kubeconform validates deploy manifests
        # -strict rejects unknown fields; -ignore-missing-schemas skips the
        # agentrun.dev custom kinds (no published schema) while still strictly
        # validating every core kind. deploy/talos holds Talos MachineConfig
        # PATCHES (no Kubernetes kind), which are schema-checked by the
        # talos-validate job, so they are excluded here.
        run: |
          kubeconform -strict -summary -ignore-missing-schemas \
            crds/ controller/ rbac/ daemon/ device-plugin/ facade/
        working-directory: deploy
      - name: kustomize base resolves
        run: kubectl kustomize deploy/ > /dev/null

  talos-validate:
    # Validate the Talos machine configs. worker-kvm.yaml and controlplane.yaml
    # are PATCHES, not full configs, so we generate a throwaway base with
    # talosctl gen config, merge each patch onto its generated base, and run
    # talosctl validate --mode metal on the merged documents. A malformed field
    # in either patch fails the merge or the validate.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install talosctl
        run: |
          set -euo pipefail
          curl -sSLo /tmp/talosctl \
            https://github.com/siderolabs/talos/releases/latest/download/talosctl-linux-amd64
          sudo install /tmp/talosctl /usr/local/bin/talosctl
          talosctl version --client
      - name: Generate a throwaway base config
        run: talosctl gen config testcluster https://10.0.0.1:6443 --output-dir /tmp/talos
      - name: Merge and validate the KVM worker patch
        run: |
          set -euo pipefail
          talosctl machineconfig patch /tmp/talos/worker.yaml \
            --patch @deploy/talos/worker-kvm.yaml \
            -o /tmp/worker-kvm-merged.yaml
          talosctl validate --config /tmp/worker-kvm-merged.yaml --mode metal
      - name: Merge and validate the control-plane patch
        run: |
          set -euo pipefail
          talosctl machineconfig patch /tmp/talos/controlplane.yaml \
            --patch @deploy/talos/controlplane.yaml \
            -o /tmp/controlplane-merged.yaml
          talosctl validate --config /tmp/controlplane-merged.yaml --mode metal

  python-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -v

  typescript-sdk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm run lint
      - run: npm pack --dry-run

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f Dockerfile.controller -t agent-run-controller:ci .
      - run: docker build -f Dockerfile.forkd -t agent-run-forkd:ci .
      # The husk-stub image runs the dormant VMM inside each husk pod (the
      # pod-native default, issue #18). It is referenced by the controller
      # Deployment's --husk-stub-image, so it must build cleanly here.
      - run: docker build -f Dockerfile.husk-stub -t agent-run-husk-stub:ci .

  kind-e2e:
    runs-on: ubuntu-latest
    needs: [go-test, docker-build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - uses: helm/kind-action@v1
        with:
          cluster_name: agent-run-ci
          config: hack/kind-config.yaml
      - name: Build and load images
        run: |
          docker build -f Dockerfile.controller -t agent-run-controller:ci .
          docker build -f Dockerfile.forkd -t agent-run-forkd:ci .
          docker build -f Dockerfile.kvm-device-plugin -t agent-run-kvm-device-plugin:ci .
          kind load docker-image agent-run-controller:ci --name agent-run-ci
          kind load docker-image agent-run-forkd:ci --name agent-run-ci
          kind load docker-image agent-run-kvm-device-plugin:ci --name agent-run-ci
      - name: Build agentrun CLI
        run: go build -o /usr/local/bin/agentrun ./cmd/agentrun/
      - name: agentrun dev up (mock control plane on the existing kind cluster)
        # The dev overlay (deploy/dev/) runs a MOCK control plane: forkd --mock
        # (no KVM, no /dev/kvm, no kvm nodeSelector) and the controller with
        # --mock --disable-pki-bootstrap so it dials forkd over insecure gRPC.
        # --skip-cluster-create targets the kind cluster this job already stood
        # up. The dev manifests reference the agent-run-controller:ci /
        # agent-run-forkd:ci images loaded above with imagePullPolicy:
        # IfNotPresent.
        run: agentrun dev up --skip-cluster-create
      - name: Wait for the mock control plane to be Ready
        run: |
          kubectl -n agent-run rollout status deployment/agent-run-controller --timeout=180s
          kubectl -n agent-run rollout status daemonset/agent-run-forkd --timeout=180s
      - name: Deploy the KVM device plugin DaemonSet
        # Apply the production device-plugin DaemonSet, overriding the image to
        # the :ci tag loaded above (IfNotPresent so kind serves the local image,
        # no registry pull). The plugin advertises agentrun.dev/kvm only where
        # /dev/kvm exists; this runner has /dev/kvm so the plugin advertises a
        # non-zero count. The DaemonSet rollout proves the plugin registers with
        # the kubelet regardless of whether /dev/kvm is present.
        run: |
          set -euo pipefail
          kubectl apply -f deploy/device-plugin/daemonset.yaml
          kubectl -n agent-run set image daemonset/agent-run-kvm-device-plugin \
            kvm-device-plugin=agent-run-kvm-device-plugin:ci
          kubectl -n agent-run patch daemonset/agent-run-kvm-device-plugin --type=json \
            -p='[{"op":"replace","path":"/spec/template/spec/containers/0/imagePullPolicy","value":"IfNotPresent"}]'
      - name: Device plugin DaemonSet becomes Ready and stays up
        # Gate on the DaemonSet rolling out Ready, then confirm the pod is not
        # crashlooping (restartCount stays 0 after a short settle). The plugin
        # serves its socket and registers with the kubelet; the correct behavior
        # is to advertise a non-zero count where /dev/kvm is present and zero
        # where it is absent.
        run: |
          set -euo pipefail
          # On any failure below, dump pod state, the DaemonSet description, and
          # all-container logs so the root cause is visible in the log (the
          # rollout gate alone reports only "N of M updated pods are available"
          # and hides why the pods never became Ready).
          dump_diagnostics() {
            echo "=== device-plugin diagnostics ==="
            kubectl -n agent-run get pods -o wide || true
            kubectl -n agent-run describe ds agent-run-kvm-device-plugin || true
            kubectl -n agent-run logs -l app.kubernetes.io/component=kvm-device-plugin \
              --tail=50 --all-containers || true
          }
          trap 'dump_diagnostics' ERR
          kubectl -n agent-run rollout status daemonset/agent-run-kvm-device-plugin --timeout=180s
          sleep 15
          restarts=$(kubectl -n agent-run get pods \
            -l app.kubernetes.io/component=kvm-device-plugin \
            -o jsonpath='{.items[*].status.containerStatuses[*].restartCount}')
          echo "device-plugin restartCount: ${restarts:-none}"
          for r in $restarts; do
            if [ "$r" != "0" ]; then
              echo "device plugin restarted ($r); dumping logs"
              kubectl -n agent-run logs -l app.kubernetes.io/component=kvm-device-plugin --tail=50 || true
              exit 1
            fi
          done
          kubectl -n agent-run logs -l app.kubernetes.io/component=kvm-device-plugin --tail=20 || true
      - name: Adaptive device-plugin assertion (KVM-advertised or no-KVM)
        # Determine whether the node advertises agentrun.dev/kvm by reading the
        # node allocatable. The kind-e2e runner has /dev/kvm, so kvm_present=true
        # is the expected path; a runner without /dev/kvm is handled honestly.
        #
        # If KVM IS advertised:
        #   - deploy a non-privileged probe pod that requests agentrun.dev/kvm: 1
        #     and runs `test -e /dev/kvm && sleep 300` (busybox); the request
        #     triggers Allocate which injects /dev/kvm into the container.
        #   - assert the pod reaches Running (scheduler placed it: advertise->
        #     schedule proven).
        #   - exec `test -e /dev/kvm` inside the running pod to prove Allocate
        #     actually injected the device (advertise->schedule->inject proven).
        #   - the pod is NOT privileged and carries no hostPath: access comes
        #     solely via the device plugin, proving the PSA-restricted path.
        #
        # If KVM is NOT advertised:
        #   - assert the probe pod stays Pending: honest scheduler truth, no KVM
        #     resource available means the pod is unschedulable.
        run: |
          set -euo pipefail

          # Read the allocatable value; empty or "0" means not advertised.
          kvm_allocatable=$(kubectl get nodes \
            -o jsonpath='{.items[*].status.allocatable.agentrun\.dev/kvm}' 2>/dev/null || true)
          echo "node allocatable agentrun.dev/kvm: '${kvm_allocatable}'"

          kvm_advertised=false
          for v in $kvm_allocatable; do
            if [ "$v" != "0" ] && [ -n "$v" ]; then
              kvm_advertised=true
              break
            fi
          done
          echo "kvm_advertised: $kvm_advertised"

          # Apply the probe pod. It requests agentrun.dev/kvm: 1 so Allocate
          # fires on schedule. The securityContext is restricted (non-privileged,
          # no allowPrivilegeEscalation, all capabilities dropped, read-only root
          # filesystem): /dev/kvm access comes from the device plugin alone.
          cat <<'POD' | kubectl apply -f -
          apiVersion: v1
          kind: Pod
          metadata:
            name: kvm-resource-probe
            namespace: agent-run
          spec:
            restartPolicy: Never
            containers:
              - name: probe
                image: busybox:stable
                command: ["sh", "-c", "test -e /dev/kvm && sleep 300"]
                resources:
                  limits:
                    agentrun.dev/kvm: "1"
                securityContext:
                  allowPrivilegeEscalation: false
                  privileged: false
                  readOnlyRootFilesystem: true
                  capabilities:
                    drop: ["ALL"]
          POD

          if [ "$kvm_advertised" = "true" ]; then
            echo "KVM advertised: asserting probe pod reaches Running and /dev/kvm is injected"

            # Wait up to 60s for the pod to reach Running (scheduler places it
            # because the resource is available; Allocate injects the device).
            for i in $(seq 1 30); do
              phase=$(kubectl -n agent-run get pod kvm-resource-probe \
                -o jsonpath='{.status.phase}' 2>/dev/null || true)
              echo "  [${i}/30] probe pod phase: $phase"
              if [ "$phase" = "Running" ]; then
                break
              fi
              sleep 2
            done

            phase=$(kubectl -n agent-run get pod kvm-resource-probe \
              -o jsonpath='{.status.phase}')
            echo "probe pod final phase: $phase"
            kubectl -n agent-run describe pod kvm-resource-probe | grep -i -A5 'Events:' || true

            if [ "$phase" != "Running" ]; then
              echo "FAIL: expected Running (KVM advertised, pod should be scheduled and /dev/kvm injected), got $phase"
              exit 1
            fi

            # Prove Allocate injected /dev/kvm into the non-privileged container.
            echo "Proving /dev/kvm is present inside the non-privileged probe container..."
            kubectl -n agent-run exec kvm-resource-probe -- test -e /dev/kvm
            echo "PASS: /dev/kvm injected by Allocate into the non-privileged probe pod (advertise->schedule->inject proven)"

          else
            echo "KVM not advertised: asserting probe pod stays Pending (honest scheduler truth)"

            # Give the scheduler time to (fail to) place the pod, then assert Pending.
            sleep 20
            phase=$(kubectl -n agent-run get pod kvm-resource-probe \
              -o jsonpath='{.status.phase}')
            echo "probe pod phase: $phase"
            kubectl -n agent-run describe pod kvm-resource-probe | grep -i -A2 'Events:' || true

            if [ "$phase" != "Pending" ]; then
              echo "FAIL: expected Pending (no KVM advertised), got $phase"
              exit 1
            fi
            echo "PASS: probe pod stays Pending on a no-KVM node (honest scheduler truth)"
          fi

          kubectl -n agent-run delete pod kvm-resource-probe --ignore-not-found=true
      - name: agentrun sandbox ls (control-plane dispatch lists claims)
        run: agentrun sandbox ls
      - name: agentrun sandbox create reaches Ready on the mock engine
        # The controller discovers the mock forkd, builds the dev-default pool
        # snapshot over insecure gRPC, and the claim forks via the mock engine
        # and reaches Ready. The mock engine has NO guest VM, so this asserts the
        # claim/fork path (claim -> Ready) and control-plane dispatch only; real
        # in-VM exec is NOT exercised here (proven by the KVM CI of the API).
        run: |
          set -euo pipefail
          # Give the pool reconciler time to build the snapshot on the discovered
          # mock forkd before claiming.
          kubectl -n default wait --for=jsonpath='{.status.readySnapshots}'=1 \
            sandboxpool/dev-default --timeout=120s
          ID=$(agentrun sandbox create --pool dev-default)
          echo "created sandbox: $ID"
          agentrun sandbox ls | grep -q "$ID"
          agentrun sandbox terminate "$ID"
      - name: agentrun dev down (cleanup)
        if: always()
        run: |
          kubectl -n agent-run delete pod kvm-resource-probe --ignore-not-found=true || true
          kubectl delete -f deploy/device-plugin/daemonset.yaml --ignore-not-found=true || true
          kubectl delete -k deploy/dev/ --ignore-not-found=true || true

  kind-e2e-husk:
    # The full pod-native DEFAULT path on kind (issue #18). This is the proof
    # that justifies the default flip (--enable-husk-pods is the controller
    # default): the husk-default STACK comes up, the SandboxPool builds the
    # template snapshot on the KVM node AND maintains a warm pool of
    # pre-scheduled husk pods pinned to that node, and a SandboxClaim activates
    # a husk pod in place and exec works over the in-pod sandbox API.
    #
    # SCOPE SPLIT, stated honestly so a reader knows exactly what this gates:
    #   - The Kubernetes CLUSTER object lifecycle is the new surface for the
    #     flip and is GATED here: PKI bootstrap mints the CA/forkd/controller
    #     TLS Secrets; the KVM node is labeled; the device plugin advertises
    #     agentrun.dev/kvm; the controller (husk mode) + forkd builder + device
    #     plugin roll out; the pool reconcile CREATES husk pods that SCHEDULE
    #     onto the KVM node (device-plugin resource request + nodeSelector +
    #     snapshot-node affinity honored, scheduler truth); the claim reconcile
    #     is driven to the husk-pod activation path.
    #   - The IN-VM engine path (a real dormant Firecracker VMM, in-place mTLS
    #     activation, exec through the guest, fork-correctness, secret delivery,
    #     wrong-CA rejection) is already proven END TO END on the KVM runner in
    #     kvm-test.yaml, where Firecracker runs DIRECTLY on the runner host. A
    #     husk pod only goes Ready when its dormant VMM comes up INSIDE the kind
    #     pod (Firecracker nested in a kind-node container); that nested-VMM
    #     bring-up is the one piece this job cannot guarantee on a shared runner,
    #     so the husk-pod-Ready -> claim-Ready -> in-pod exec tail is attempted
    #     BEST EFFORT here and GATED in kvm-test.yaml. If the nested VMM does
    #     come up, this job tightens to the full claim -> Ready -> exec gate; if
    #     it does not, the job reports it as the documented kind boundary
    #     (HUSK-KIND-VMM) and still gates on the cluster lifecycle above.
    #
    # Every failure distinguishes a SETUP issue (image load, PKI Secret, node
    # label, device-plugin registration, forkd build) from a real husk-path
    # failure, and dumps describe + logs of the controller, forkd,
    # device-plugin, and husk pods on any failure (trap) so it is debuggable.
    runs-on: ubuntu-latest
    needs: [go-test, docker-build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Check KVM availability on the runner
        # The kind-e2e runner class has /dev/kvm (proven by the device-plugin
        # e2e in the mock job and by kvm-test.yaml). Record it up front so a
        # no-KVM runner is an obvious SETUP signal, not a confusing later
        # failure. World-accessible /dev/kvm mirrors kvm-test.yaml so a nested
        # VMM is not blocked by KVM permissions.
        run: |
          set -euo pipefail
          ls -la /dev/kvm || { echo "HUSK-SETUP: no /dev/kvm on this runner"; exit 1; }
          grep -cE '(vmx|svm)' /proc/cpuinfo || true
          sudo chmod 666 /dev/kvm || true
      - uses: helm/kind-action@v1
        with:
          cluster_name: agent-run-husk
          config: hack/kind-config.yaml
      - name: Build and load all four images (controller, forkd, device-plugin, husk-stub)
        run: |
          set -euo pipefail
          docker build -f Dockerfile.controller -t agent-run-controller:ci .
          docker build -f Dockerfile.forkd -t agent-run-forkd:ci .
          docker build -f Dockerfile.kvm-device-plugin -t agent-run-kvm-device-plugin:ci .
          docker build -f Dockerfile.husk-stub -t agent-run-husk-stub:ci .
          for img in agent-run-controller agent-run-forkd agent-run-kvm-device-plugin agent-run-husk-stub; do
            kind load docker-image "$img:ci" --name agent-run-husk
          done
      - name: Label the kind worker so forkd and husk pods schedule, expose /dev/kvm
        # The kind-config worker already carries agentrun.dev/kvm=true; assert it
        # (a missing label is a SETUP issue: forkd's nodeSelector and the husk
        # pod placement both key off it). The device plugin runs everywhere and
        # advertises the resource only where /dev/kvm exists.
        run: |
          set -euo pipefail
          kubectl label node --all agentrun.dev/kvm=true --overwrite
          kubectl get nodes -L agentrun.dev/kvm
      - name: Deploy the husk-default stack (controller husk mode, forkd builder, device plugin, PKI on)
        # Apply the production base (deploy/), which carries the controller in
        # husk-default mode, the forkd DaemonSet (the builder), the device
        # plugin, the CRDs, and the RBAC. Then retarget every image to the :ci
        # tags loaded above with IfNotPresent (kind serves the local image, no
        # registry pull). PKI bootstrap is ON (the base omits
        # --disable-pki-bootstrap) so the controller EnsurePKI mints the CA +
        # forkd + controller TLS Secrets that forkd and the husk pods mount and
        # the husk control channel requires.
        run: |
          set -euo pipefail
          kubectl apply -k deploy/

          # Retarget images to the locally-loaded :ci tags and force IfNotPresent.
          kubectl -n agent-run set image deployment/agent-run-controller \
            controller=agent-run-controller:ci
          kubectl -n agent-run set image daemonset/agent-run-forkd \
            forkd=agent-run-forkd:ci
          kubectl -n agent-run set image daemonset/agent-run-kvm-device-plugin \
            kvm-device-plugin=agent-run-kvm-device-plugin:ci
          for kind_obj in deployment/agent-run-controller daemonset/agent-run-forkd daemonset/agent-run-kvm-device-plugin; do
            kubectl -n agent-run patch "$kind_obj" --type=json \
              -p='[{"op":"replace","path":"/spec/template/spec/containers/0/imagePullPolicy","value":"IfNotPresent"}]'
          done
          # The husk pods the controller CREATES must also use the local image:
          # override the controller's --husk-stub-image to the :ci tag. The husk
          # pod's imagePullPolicy is IfNotPresent by default for a tag kind
          # already holds.
          kubectl -n agent-run patch deployment/agent-run-controller --type=json -p='[
            {"op":"add","path":"/spec/template/spec/containers/0/args/-","value":"--husk-stub-image=agent-run-husk-stub:ci"}
          ]'
          # A single controller replica makes the e2e log a single reconcile
          # stream (the base runs 2 for HA); behavior is identical.
          kubectl -n agent-run scale deployment/agent-run-controller --replicas=1
      - name: Stack rolls out and PKI Secrets exist
        # Gate: the three workloads roll out Ready and the controller's EnsurePKI
        # produced the CA + forkd + controller TLS Secrets. A missing Secret is a
        # PKI SETUP failure (the husk control channel and forkd mTLS both depend
        # on it), distinct from a husk-path failure.
        run: |
          set -euo pipefail
          dump() {
            echo "=== husk-stack diagnostics ==="
            kubectl -n agent-run get pods -o wide || true
            kubectl -n agent-run get secrets || true
            kubectl -n agent-run describe deployment/agent-run-controller || true
            kubectl -n agent-run logs -l app.kubernetes.io/component=controller --tail=80 || true
            kubectl -n agent-run logs -l app.kubernetes.io/component=forkd --tail=80 || true
          }
          trap dump ERR
          kubectl -n agent-run rollout status deployment/agent-run-controller --timeout=180s
          kubectl -n agent-run rollout status daemonset/agent-run-kvm-device-plugin --timeout=180s
          kubectl -n agent-run rollout status daemonset/agent-run-forkd --timeout=240s
          for s in agent-run-ca agent-run-forkd-tls agent-run-controller-tls; do
            kubectl -n agent-run get secret "$s" >/dev/null || {
              echo "HUSK-SETUP: PKI Secret $s missing (EnsurePKI did not complete); the husk control channel needs it"
              exit 1
            }
            echo "PKI Secret present: $s"
          done
      - name: Device plugin advertises agentrun.dev/kvm
        # Gate: the node advertises the KVM extended resource, so husk pods
        # (which request agentrun.dev/kvm: 1) can be scheduled. Zero advertised
        # is a SETUP failure on a runner we asserted has /dev/kvm.
        run: |
          set -euo pipefail
          for i in $(seq 1 30); do
            kvm=$(kubectl get nodes -o jsonpath='{.items[*].status.allocatable.agentrun\.dev/kvm}' 2>/dev/null || true)
            echo "  [${i}/30] allocatable agentrun.dev/kvm: '${kvm}'"
            for v in $kvm; do
              if [ -n "$v" ] && [ "$v" != "0" ]; then
                echo "PASS: device plugin advertises agentrun.dev/kvm=$v"
                exit 0
              fi
            done
            sleep 2
          done
          echo "HUSK-SETUP: device plugin never advertised agentrun.dev/kvm; husk pods cannot schedule"
          kubectl -n agent-run logs -l app.kubernetes.io/component=kvm-device-plugin --tail=50 || true
          exit 1
      - name: Provide a guest kernel on the node for forkd and husk pods
        # forkd's snapshot build and the husk pod's dormant VMM both expect a
        # guest kernel at <data-dir>/vmlinux on the node hostPath. Stage a real
        # Firecracker CI kernel into the kind worker's /var/lib/agent-run so the
        # hostPath mounts resolve. (The rootfs for the template is provided via
        # the SandboxTemplate below.)
        run: |
          set -euo pipefail
          ARCH=$(uname -m)
          FC_VERSION=v1.15.0
          CI_VERSION=$(echo $FC_VERSION | sed 's/v//' | cut -d. -f1-2)
          KERNEL_KEY=$(curl -fsSL "https://s3.amazonaws.com/spec.ccfc.min/?prefix=firecracker-ci/v${CI_VERSION}/${ARCH}/vmlinux-" \
            | grep -oP "firecracker-ci/v${CI_VERSION}/${ARCH}/vmlinux-[0-9]+\.[0-9]+\.[0-9]+" \
            | sort -V | tail -1)
          echo "Staging kernel: $KERNEL_KEY"
          curl -fsSL -o /tmp/vmlinux "https://s3.amazonaws.com/spec.ccfc.min/${KERNEL_KEY}"
          # The kind worker node is a docker container named agent-run-husk-worker;
          # copy the kernel into its /var/lib/agent-run (the forkd/husk hostPath).
          worker=$(docker ps --format '{{.Names}}' | grep -m1 'agent-run-husk-worker')
          docker exec "$worker" mkdir -p /var/lib/agent-run
          docker cp /tmp/vmlinux "$worker:/var/lib/agent-run/vmlinux"
          docker exec "$worker" ls -lh /var/lib/agent-run/vmlinux
      - name: Create a SandboxTemplate and a small SandboxPool
        # The template references an OCI image (busybox); the pool asks for a
        # small warm pool of husk pods. The controller in husk mode builds the
        # snapshot on the KVM node AND maintains the husk pod warm pool pinned to
        # the snapshot-holding node.
        run: |
          set -euo pipefail
          cat <<'YAML' | kubectl apply -f -
          apiVersion: agentrun.dev/v1alpha1
          kind: SandboxTemplate
          metadata:
            name: husk-e2e
            namespace: default
          spec:
            image: busybox:stable
            resources:
              cpu: "1"
              memory: 512Mi
          ---
          apiVersion: agentrun.dev/v1alpha1
          kind: SandboxPool
          metadata:
            name: husk-e2e
            namespace: default
          spec:
            templateRef:
              name: husk-e2e
            replicas: 2
          YAML
          kubectl -n default get sandboxtemplate husk-e2e
          kubectl -n default get sandboxpool husk-e2e
      - name: The pool creates husk pods that schedule onto the KVM node
        # GATE (cluster lifecycle): the controller's pool reconcile CREATES husk
        # pods (object lifecycle) and the scheduler PLACES them on the KVM node
        # (device-plugin resource + kvm nodeSelector + snapshot-node affinity).
        # We assert the husk pod objects exist and bind to a node. Whether the
        # pod then reaches Ready depends on the nested dormant VMM coming up,
        # asserted best-effort in the next step.
        run: |
          set -euo pipefail
          dump() {
            echo "=== husk pod diagnostics ==="
            kubectl get pods -A -l agentrun.dev/husk=true -o wide || true
            kubectl -n agent-run logs -l app.kubernetes.io/component=controller --tail=120 || true
            kubectl -n agent-run logs -l app.kubernetes.io/component=forkd --tail=120 || true
            for p in $(kubectl get pods -A -l agentrun.dev/husk=true -o jsonpath='{range .items[*]}{.metadata.namespace}/{.metadata.name} {end}'); do
              ns=${p%%/*}; name=${p##*/}
              echo "--- describe $ns/$name ---"; kubectl -n "$ns" describe pod "$name" || true
              echo "--- logs $ns/$name ---"; kubectl -n "$ns" logs "$name" --tail=60 || true
            done
          }
          trap dump ERR

          # Wait for the controller to create the husk pods (object lifecycle).
          created=0
          for i in $(seq 1 60); do
            n=$(kubectl get pods -A -l agentrun.dev/husk=true --no-headers 2>/dev/null | wc -l | tr -d ' ')
            echo "  [${i}/60] husk pods created: $n"
            if [ "$n" -ge 1 ]; then created=1; break; fi
            sleep 5
          done
          if [ "$created" -ne 1 ]; then
            echo "HUSK-FAILED: the pool reconcile created no husk pods (controller husk mode did not place the warm pool)"
            exit 1
          fi

          # Assert at least one husk pod BINDS to a node (scheduler placed it onto
          # the KVM node: advertise -> schedule proven for the husk pod, not just
          # the probe). Pending forever would mean the device-plugin resource /
          # nodeSelector / affinity did not resolve.
          bound=0
          for i in $(seq 1 60); do
            node=$(kubectl get pods -A -l agentrun.dev/husk=true \
              -o jsonpath='{.items[0].spec.nodeName}' 2>/dev/null || true)
            echo "  [${i}/60] first husk pod nodeName: '${node:-<unscheduled>}'"
            if [ -n "$node" ]; then bound=1; break; fi
            sleep 5
          done
          if [ "$bound" -ne 1 ]; then
            echo "HUSK-FAILED: husk pod never bound to a node (device-plugin resource / kvm nodeSelector / snapshot affinity did not resolve)"
            kubectl get pods -A -l agentrun.dev/husk=true -o wide || true
            kubectl describe pod -A -l agentrun.dev/husk=true | grep -i -A5 'Events:' || true
            exit 1
          fi
          echo "PASS: pool created husk pods and the scheduler bound one to the KVM node"
      - name: Conformance 1, scheduler truth (requests + bound + no double-booking)
        # OBJECT-LEVEL conformance (the VMM need not boot): the husk pod is an
        # ordinary scheduled workload. Assert it carries cpu + memory REQUESTS and
        # the scheduler BOUND it (Status.NodeName set, accounting those requests),
        # and that a probe pod requesting more than node allocatable stays Pending
        # (the native scheduler does not double-book). A failure here is a
        # CONFORMANCE failure, not a SETUP issue (the prior steps already gated
        # creation + binding).
        run: |
          set -euo pipefail
          dump() {
            echo "=== scheduler-truth diagnostics ==="
            kubectl get pods -A -l agentrun.dev/husk=true -o wide || true
            kubectl describe pod over-alloc-probe 2>/dev/null || true
          }
          trap dump ERR

          hpod=$(kubectl get pods -A -l agentrun.dev/husk=true \
            -o jsonpath='{.items[0].metadata.name}')
          hns=$(kubectl get pods -A -l agentrun.dev/husk=true \
            -o jsonpath='{.items[0].metadata.namespace}')

          cpu=$(kubectl -n "$hns" get pod "$hpod" \
            -o jsonpath='{.spec.containers[0].resources.requests.cpu}')
          mem=$(kubectl -n "$hns" get pod "$hpod" \
            -o jsonpath='{.spec.containers[0].resources.requests.memory}')
          node=$(kubectl -n "$hns" get pod "$hpod" -o jsonpath='{.spec.nodeName}')
          echo "husk pod requests: cpu='${cpu}' memory='${mem}', nodeName='${node}'"
          [ -n "$cpu" ] || { echo "CONFORMANCE-FAILED: husk pod has no cpu request (not scheduler-visible)"; exit 1; }
          [ -n "$mem" ] || { echo "CONFORMANCE-FAILED: husk pod has no memory request (not scheduler-visible)"; exit 1; }
          [ -n "$node" ] || { echo "CONFORMANCE-FAILED: husk pod not bound (Status.NodeName empty)"; exit 1; }
          echo "PASS: husk pod has cpu+memory requests and the scheduler bound it (scheduler truth)"

          # No double-booking: a pod requesting absurd memory stays Pending. The
          # native scheduler refuses to bind it because no node has the allocatable.
          cat <<'YAML' | kubectl apply -f -
          apiVersion: v1
          kind: Pod
          metadata:
            name: over-alloc-probe
            namespace: default
          spec:
            restartPolicy: Never
            containers:
              - name: probe
                image: busybox:stable
                command: ["sleep", "300"]
                resources:
                  requests:
                    memory: "100000Gi"
          YAML
          pending=0
          for i in $(seq 1 12); do
            phase=$(kubectl -n default get pod over-alloc-probe -o jsonpath='{.status.phase}' 2>/dev/null || true)
            echo "  [${i}/12] over-alloc-probe phase: '${phase}'"
            if [ "$phase" = "Pending" ]; then pending=1; sleep 3; else break; fi
          done
          # It must NOT be Running/bound; Pending is the correct, stable state.
          probe_node=$(kubectl -n default get pod over-alloc-probe -o jsonpath='{.spec.nodeName}' 2>/dev/null || true)
          kubectl -n default delete pod over-alloc-probe --ignore-not-found=true --wait=false || true
          if [ "$pending" -ne 1 ] || [ -n "$probe_node" ]; then
            echo "CONFORMANCE-FAILED: an over-allocatable pod was scheduled (double-booking); nodeName='${probe_node}'"
            exit 1
          fi
          echo "PASS: an over-allocatable pod stays Pending (native scheduler, no double-booking)"
      - name: Conformance 2, ResourceQuota + LimitRange bound sandboxes (zero custom code)
        # Kubernetes ResourceQuota + LimitRange admission, with ZERO custom code,
        # bounds husk-shaped pods. Create a tiny quota (count/pods: 1) and a
        # LimitRange in a fresh namespace, create one husk-shaped pod (admitted),
        # then a second (REJECTED by the quota). The rejection text is FROM
        # KUBERNETES (exceeded quota / forbidden), not from us.
        run: |
          set -euo pipefail
          dump() {
            echo "=== quota diagnostics ==="
            kubectl -n quota-conf get resourcequota,limitrange,pods -o wide || true
            kubectl -n quota-conf describe resourcequota husk-quota || true
          }
          trap dump ERR

          kubectl create namespace quota-conf --dry-run=client -o yaml | kubectl apply -f -
          cat <<'YAML' | kubectl apply -f -
          apiVersion: v1
          kind: ResourceQuota
          metadata:
            name: husk-quota
            namespace: quota-conf
          spec:
            hard:
              count/pods: "1"
              requests.cpu: "2"
              requests.memory: 1Gi
          ---
          apiVersion: v1
          kind: LimitRange
          metadata:
            name: husk-limits
            namespace: quota-conf
          spec:
            limits:
              - type: Container
                default:
                  cpu: "1"
                  memory: 512Mi
                defaultRequest:
                  cpu: "1"
                  memory: 512Mi
          YAML

          # A husk-shaped pod (cpu/memory requests like buildHuskPod emits). No
          # device request here: this namespace is not KVM-pinned; we are proving
          # the quota math, an object-level property independent of the VMM.
          husk_pod() {
            cat <<YAML
          apiVersion: v1
          kind: Pod
          metadata:
            name: $1
            namespace: quota-conf
            labels:
              agentrun.dev/husk: "true"
          spec:
            restartPolicy: Always
            containers:
              - name: husk-stub
                image: busybox:stable
                command: ["sleep", "3600"]
                resources:
                  requests:
                    cpu: "1"
                    memory: 512Mi
          YAML
          }

          husk_pod husk-quota-1 | kubectl apply -f - || {
            echo "CONFORMANCE-FAILED: the first husk-shaped pod was rejected but should fit the quota"
            exit 1
          }
          echo "PASS: first husk-shaped pod admitted within the quota"

          # The SECOND pod must be REJECTED by the quota admission (count/pods: 1).
          set +e
          out=$(husk_pod husk-quota-2 | kubectl apply -f - 2>&1)
          rc=$?
          set -e
          echo "second-pod apply output: $out"
          if [ "$rc" -eq 0 ]; then
            echo "CONFORMANCE-FAILED: the second husk-shaped pod was admitted; the quota did not bound it"
            exit 1
          fi
          echo "$out" | grep -qiE 'exceeded quota|forbidden' || {
            echo "CONFORMANCE-FAILED: the rejection was not the Kubernetes quota admission (exceeded quota/forbidden)"
            exit 1
          }
          echo "PASS: ResourceQuota rejected the over-quota husk pod from Kubernetes (zero custom code)"
          kubectl delete namespace quota-conf --wait=false || true
      - name: Conformance 3, NetworkPolicy selects the husk pod
        # A NetworkPolicy with podSelector matchLabels agentrun.dev/husk=true is
        # the husk-mode governing egress layer. Assert it exists AND selects the
        # husk pod (the pod's labels match the selector). The in-VM enforcement of
        # the VM tap by the pod netns needs a bare-metal KVM kubelet, documented
        # below and not gated here.
        run: |
          set -euo pipefail
          dump() {
            echo "=== netpol diagnostics ==="
            kubectl get netpol -A || true
            kubectl get pods -A -l agentrun.dev/husk=true --show-labels || true
          }
          trap dump ERR

          hns=$(kubectl get pods -A -l agentrun.dev/husk=true \
            -o jsonpath='{.items[0].metadata.namespace}')
          cat <<YAML | kubectl apply -f -
          apiVersion: networking.k8s.io/v1
          kind: NetworkPolicy
          metadata:
            name: husk-egress
            namespace: ${hns}
          spec:
            podSelector:
              matchLabels:
                agentrun.dev/husk: "true"
            policyTypes:
              - Egress
            egress:
              - to:
                  - ipBlock:
                      cidr: 0.0.0.0/0
          YAML
          kubectl -n "$hns" get networkpolicy husk-egress >/dev/null || {
            echo "CONFORMANCE-FAILED: NetworkPolicy husk-egress was not created"
            exit 1
          }
          # The policy selects the husk pod: list pods matching the SAME selector
          # and assert the husk pod is among them.
          sel=$(kubectl -n "$hns" get networkpolicy husk-egress \
            -o jsonpath='{.spec.podSelector.matchLabels.agentrun\.dev/husk}')
          [ "$sel" = "true" ] || { echo "CONFORMANCE-FAILED: netpol selector is not agentrun.dev/husk=true"; exit 1; }
          matched=$(kubectl -n "$hns" get pods -l agentrun.dev/husk=true --no-headers 2>/dev/null | wc -l | tr -d ' ')
          [ "$matched" -ge 1 ] || { echo "CONFORMANCE-FAILED: the netpol selector matches no husk pod"; exit 1; }
          echo "PASS: NetworkPolicy husk-egress exists and selects the husk pod ($matched matched). In-VM enforcement of the VM tap by the pod netns is bare-metal-kubelet (documented)."
      - name: Conformance 4, PSA restricted admits the husk pod minus documented exceptions
        # EMPIRICAL PSA finding, verified object-level on kind. The husk pod's
        # securityContext satisfies every restricted control; it is NOT admitted
        # into a restricted namespace for exactly the documented exceptions (the
        # read-only snapshot hostPath, runAsNonRoot=false). We verify the EXACT
        # level the husk pod passes:
        #   - a restricted namespace REJECTS the husk-shaped pod (hostPath +
        #     runAsNonRoot), the honest finding;
        #   - the SAME securityContext minus those two exceptions IS admitted into
        #     restricted (proving the securityContext itself is restricted-clean);
        #   - a genuinely privileged pod IS rejected by restricted (control: PSA is
        #     actually enforcing, so the admission result is meaningful).
        run: |
          set -euo pipefail
          dump() {
            echo "=== PSA diagnostics ==="
            kubectl get ns psa-conf --show-labels || true
          }
          trap dump ERR

          kubectl create namespace psa-conf --dry-run=client -o yaml | kubectl apply -f -
          kubectl label namespace psa-conf \
            pod-security.kubernetes.io/enforce=restricted \
            pod-security.kubernetes.io/warn=restricted \
            pod-security.kubernetes.io/audit=restricted --overwrite

          # (a) The husk-shaped pod (the buildHuskPod securityContext + the snapshot
          # hostPath + the device request) is REJECTED by restricted on exactly the
          # documented exceptions.
          set +e
          husk_out=$(cat <<'YAML' | kubectl apply -n psa-conf -f - 2>&1
          apiVersion: v1
          kind: Pod
          metadata:
            name: husk-restricted
            labels:
              agentrun.dev/husk: "true"
          spec:
            restartPolicy: Always
            securityContext:
              runAsNonRoot: false
              seccompProfile:
                type: RuntimeDefault
            containers:
              - name: husk-stub
                image: busybox:stable
                command: ["sleep", "3600"]
                resources:
                  requests:
                    cpu: "1"
                    memory: 512Mi
                    agentrun.dev/kvm: "1"
                  limits:
                    agentrun.dev/kvm: "1"
                volumeMounts:
                  - name: snapshot
                    mountPath: /var/lib/agent-run/snapshot
                    readOnly: true
                securityContext:
                  privileged: false
                  allowPrivilegeEscalation: false
                  runAsNonRoot: false
                  capabilities:
                    drop: ["ALL"]
                  seccompProfile:
                    type: RuntimeDefault
            volumes:
              - name: snapshot
                hostPath:
                  path: /var/lib/agent-run/templates/husk-e2e/snapshot
                  type: DirectoryOrCreate
          YAML
          )
          husk_rc=$?
          set -e
          echo "husk-restricted apply output: $husk_out"
          if [ "$husk_rc" -eq 0 ]; then
            echo "CONFORMANCE-FAILED: the husk-shaped pod was admitted into a restricted namespace; the documented exceptions claim is wrong"
            exit 1
          fi
          # The rejection must cite EXACTLY the documented exceptions: hostPath +
          # runAsNonRoot. If restricted rejects on anything else, the claim is wrong.
          echo "$husk_out" | grep -qi 'hostPath' || { echo "CONFORMANCE-FAILED: restricted did not reject on hostPath (documented exception drifted)"; exit 1; }
          echo "$husk_out" | grep -qi 'runAsNonRoot' || { echo "CONFORMANCE-FAILED: restricted did not reject on runAsNonRoot (documented exception drifted)"; exit 1; }
          echo "$husk_out" | grep -qiE 'privileged|allowPrivilegeEscalation|capabilities|seccomp' && {
            echo "CONFORMANCE-FAILED: restricted rejected on a securityContext control beyond the documented exceptions; the husk securityContext is not restricted-clean"
            exit 1
          }
          echo "PASS: husk pod rejected by restricted on EXACTLY the documented hostPath + runAsNonRoot exceptions (the honest PSA level)"

          # (b) The SAME securityContext minus the two exceptions IS admitted into
          # restricted (no hostPath, runAsNonRoot=true), proving the securityContext
          # itself is restricted-clean.
          set +e
          clean_out=$(cat <<'YAML' | kubectl apply -n psa-conf -f - 2>&1
          apiVersion: v1
          kind: Pod
          metadata:
            name: husk-sc-clean
          spec:
            restartPolicy: Always
            securityContext:
              runAsNonRoot: true
              seccompProfile:
                type: RuntimeDefault
            containers:
              - name: husk-stub
                image: busybox:stable
                command: ["sleep", "3600"]
                resources:
                  requests:
                    cpu: "1"
                    memory: 512Mi
                securityContext:
                  privileged: false
                  allowPrivilegeEscalation: false
                  runAsNonRoot: true
                  capabilities:
                    drop: ["ALL"]
                  seccompProfile:
                    type: RuntimeDefault
          YAML
          )
          clean_rc=$?
          set -e
          if [ "$clean_rc" -ne 0 ]; then
            echo "CONFORMANCE-FAILED: the restricted-clean husk securityContext (minus exceptions) was not admitted into restricted: $clean_out"
            exit 1
          fi
          echo "PASS: the husk securityContext minus the documented exceptions IS admitted into restricted (restricted-clean)"

          # (c) Control: a genuinely privileged pod IS rejected by restricted, so
          # PSA is actually enforcing (the admission results above are meaningful).
          set +e
          priv_out=$(cat <<'YAML' | kubectl apply -n psa-conf -f - 2>&1
          apiVersion: v1
          kind: Pod
          metadata:
            name: priv-control
          spec:
            containers:
              - name: c
                image: busybox:stable
                command: ["sleep", "3600"]
                securityContext:
                  privileged: true
          YAML
          )
          priv_rc=$?
          set -e
          echo "priv-control apply output: $priv_out"
          if [ "$priv_rc" -eq 0 ]; then
            echo "CONFORMANCE-FAILED: a privileged pod was admitted into restricted; PSA is NOT enforcing, so the husk admission result is meaningless"
            exit 1
          fi
          echo "$priv_out" | grep -qi 'privileged' || { echo "CONFORMANCE-FAILED: the privileged-pod rejection did not cite privileged"; exit 1; }
          echo "PASS: a privileged pod IS rejected by restricted (control: PSA is enforcing)"
          kubectl delete namespace psa-conf --wait=false || true
      - name: Conformance 5, kubectl get pods + logs show the sandboxes
        # The operator-visible surface: kubectl get pods shows the husk pods and
        # kubectl logs returns the husk stub console. These are honest pod
        # semantics: a sandbox is a pod an operator can list and read logs from.
        run: |
          set -euo pipefail
          dump() {
            echo "=== kubectl get pods/logs diagnostics ==="
            kubectl get pods -A -l agentrun.dev/husk=true -o wide || true
          }
          trap dump ERR

          # kubectl get pods shows the husk pods (NAME/STATUS columns present).
          rows=$(kubectl get pods -A -l agentrun.dev/husk=true --no-headers 2>/dev/null | wc -l | tr -d ' ')
          [ "$rows" -ge 1 ] || { echo "CONFORMANCE-FAILED: kubectl get pods shows no husk pods"; exit 1; }
          kubectl get pods -A -l agentrun.dev/husk=true -o wide
          echo "PASS: kubectl get pods shows $rows husk pod(s)"

          # kubectl logs returns the stub console. The husk stub logs to stderr
          # "husk-stub: preparing dormant VMM" / "husk-stub: dormant" / "serving
          # ... control" as it Prepares. Tolerate the nested-VMM not coming up: if
          # the container has not logged the dormant line yet, accept any non-empty
          # stub console as proof the logs path works (a SETUP nuance, not a
          # conformance failure of the get-pods/logs surface).
          hpod=$(kubectl get pods -A -l agentrun.dev/husk=true -o jsonpath='{.items[0].metadata.name}')
          hns=$(kubectl get pods -A -l agentrun.dev/husk=true -o jsonpath='{.items[0].metadata.namespace}')
          logs=""
          for i in $(seq 1 24); do
            logs=$(kubectl -n "$hns" logs "$hpod" --all-containers --tail=50 2>/dev/null || true)
            echo "  [${i}/24] husk pod log lines: $(printf '%s' "$logs" | grep -c . || true)"
            if printf '%s' "$logs" | grep -qiE 'husk-stub|dormant|serving|control'; then break; fi
            sleep 5
          done
          echo "--- husk pod console (tail) ---"
          printf '%s\n' "$logs"
          if printf '%s' "$logs" | grep -qiE 'husk-stub|dormant|serving|control'; then
            echo "PASS: kubectl logs returns the husk stub console (dormant/serving control)"
          else
            echo "HUSK-KIND-VMM: the husk stub console did not yet show the dormant/serving line (the nested VMM bring-up is the documented kind boundary). kubectl get pods + the logs path itself are proven above; the stub console line is gated in kvm-test.yaml."
          fi
      - name: Eviction 1, the pool's PodDisruptionBudget bounds drain disruption
        # OBJECT-LEVEL (the VMM need not boot): the husk-mode pool reconcile
        # creates a policy/v1 PodDisruptionBudget named <pool>-husk that selects
        # the pool's husk pods and pins minAvailable = max(1, Replicas-1), so a
        # node drain disrupts AT MOST ONE warm slot at a time. Assert the PDB
        # exists with the right selector and minAvailable. A missing PDB is an
        # EVICTION conformance failure (the prior steps already gated the pool
        # creating husk pods), not a SETUP issue.
        run: |
          set -euo pipefail
          dump() {
            echo "=== PDB diagnostics ==="
            kubectl get pdb -A || true
            kubectl -n agent-run logs -l app.kubernetes.io/component=controller --tail=80 || true
          }
          trap dump ERR

          # The pool is husk-e2e (replicas: 2), so minAvailable = max(1, 2-1) = 1.
          found=0
          for i in $(seq 1 30); do
            if kubectl -n default get pdb husk-e2e-husk >/dev/null 2>&1; then found=1; break; fi
            echo "  [${i}/30] waiting for PodDisruptionBudget husk-e2e-husk"
            sleep 5
          done
          if [ "$found" -ne 1 ]; then
            echo "EVICTION-FAILED: the pool created no PodDisruptionBudget (husk-e2e-husk); a node drain would not be bounded"
            kubectl get pdb -A || true
            exit 1
          fi
          sel_pool=$(kubectl -n default get pdb husk-e2e-husk -o jsonpath='{.spec.selector.matchLabels.agentrun\.dev/pool}')
          sel_husk=$(kubectl -n default get pdb husk-e2e-husk -o jsonpath='{.spec.selector.matchLabels.agentrun\.dev/husk}')
          minavail=$(kubectl -n default get pdb husk-e2e-husk -o jsonpath='{.spec.minAvailable}')
          echo "PDB selector: pool='${sel_pool}' husk='${sel_husk}', minAvailable='${minavail}'"
          [ "$sel_pool" = "husk-e2e" ] || { echo "EVICTION-FAILED: PDB pool selector is not husk-e2e"; exit 1; }
          [ "$sel_husk" = "true" ] || { echo "EVICTION-FAILED: PDB husk selector is not true"; exit 1; }
          [ "$minavail" = "1" ] || { echo "EVICTION-FAILED: PDB minAvailable='${minavail}', want 1 (max(1, Replicas-1) for replicas: 2)"; exit 1; }
          echo "PASS: the pool's PodDisruptionBudget exists, selects the husk pods, and bounds drain to minAvailable=1"
      - name: Eviction 2, the warm pool self-heals a deleted husk pod
        # OBJECT-LEVEL self-heal: a husk pod is owner-referenced to its pool, so
        # deleting one enqueues the pool (Owns(pods)) and the deficit logic
        # recreates the replacement. Record a husk pod name, delete it, and assert
        # the husk pod count returns to Replicas with a NEW pod (a different name)
        # owned by the pool. This proves the warm pool recovers a lost dormant
        # slot without an operator. A failure here is an EVICTION conformance
        # failure (the self-heal regressed), not a SETUP issue.
        run: |
          set -euo pipefail
          dump() {
            echo "=== self-heal diagnostics ==="
            kubectl get pods -A -l agentrun.dev/husk=true -o wide || true
            kubectl -n agent-run logs -l app.kubernetes.io/component=controller --tail=120 || true
          }
          trap dump ERR

          before=$(kubectl get pods -n default -l agentrun.dev/husk=true \
            --field-selector=status.phase!=Failed -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' \
            | grep . | sort)
          echo "husk pods before delete:"; printf '%s\n' "$before"
          victim=$(printf '%s\n' "$before" | head -1)
          [ -n "$victim" ] || { echo "EVICTION-FAILED: no husk pod to delete (self-heal precondition)"; exit 1; }
          echo "deleting victim husk pod: $victim"
          kubectl -n default delete pod "$victim" --wait=false

          # The pool recreates the replacement: the count returns to 2 (Replicas)
          # AND a name not in the before-set appears (a genuinely new pod).
          healed=0
          for i in $(seq 1 36); do
            now=$(kubectl get pods -n default -l agentrun.dev/husk=true \
              --field-selector=status.phase!=Failed -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' \
              | grep . | sort)
            count=$(printf '%s\n' "$now" | grep -c . || true)
            newpods=$(comm -13 <(printf '%s\n' "$before") <(printf '%s\n' "$now") | grep . || true)
            echo "  [${i}/36] husk pod count: ${count}, new pods: '$(printf '%s' "$newpods" | tr '\n' ' ')'"
            if [ "$count" -ge 2 ] && [ -n "$newpods" ]; then healed=1; break; fi
            sleep 5
          done
          if [ "$healed" -ne 1 ]; then
            echo "EVICTION-FAILED: the warm pool did not self-heal the deleted husk pod back to Replicas with a new pod"
            kubectl get pods -A -l agentrun.dev/husk=true -o wide || true
            exit 1
          fi
          # The new pod is owned by the pool (owner-reference, the GC + self-heal edge).
          newpod=$(comm -13 <(printf '%s\n' "$before") <(printf '%s\n' "$now") | grep . | head -1)
          owner=$(kubectl -n default get pod "$newpod" -o jsonpath='{.metadata.ownerReferences[0].name}')
          [ "$owner" = "husk-e2e" ] || { echo "EVICTION-FAILED: the replacement husk pod $newpod is not owned by the pool (owner='${owner}')"; exit 1; }
          echo "PASS: the warm pool self-healed; new husk pod $newpod owned by the pool replaced the deleted $victim"
      - name: Eviction 3, a claim re-pends when its husk pod is deleted (object-level)
        # OBJECT-LEVEL re-pend (the full re-activate needs a Ready dormant pod,
        # the nested-VMM boundary). We drive a claim to point at a husk pod at the
        # object level: stamp a husk pod with agentrun.dev/claim and set the
        # claim's Status.Node/Endpoint/SandboxID, then delete that pod and assert
        # the claim goes Pending (re-pend) and the pool recreates a replacement
        # husk pod. The Watches(pod)->claim mapping + checkHuskPodLost drive this.
        # The full re-activate onto a Ready replacement completes where the VMM
        # runs (kvm-test.yaml / bare metal), documented in docs/husk-pods.md.
        run: |
          set -euo pipefail
          dump() {
            echo "=== re-pend diagnostics ==="
            kubectl -n default get sandboxclaim repend-probe -o yaml 2>/dev/null || true
            kubectl get pods -n default -l agentrun.dev/husk=true -o wide || true
            kubectl -n agent-run logs -l app.kubernetes.io/component=controller --tail=120 || true
          }
          trap dump ERR

          # Pick a husk pod to back the probe claim.
          backing=$(kubectl get pods -n default -l agentrun.dev/husk=true \
            --field-selector=status.phase!=Failed -o jsonpath='{.items[0].metadata.name}')
          [ -n "$backing" ] || { echo "EVICTION-FAILED: no husk pod to back the re-pend probe"; exit 1; }
          podip=$(kubectl -n default get pod "$backing" -o jsonpath='{.status.podIP}')
          podnode=$(kubectl -n default get pod "$backing" -o jsonpath='{.spec.nodeName}')
          echo "backing husk pod $backing on node '${podnode}' ip '${podip}'"

          # Create the probe claim, then stamp it active on the backing pod at the
          # object level (label the pod claimed; set the claim status). This is the
          # object-level stand-in for a real husk activation (which needs the VMM).
          cat <<'YAML' | kubectl apply -f -
          apiVersion: agentrun.dev/v1alpha1
          kind: SandboxClaim
          metadata:
            name: repend-probe
            namespace: default
          spec:
            poolRef:
              name: husk-e2e
          YAML
          kubectl -n default label pod "$backing" agentrun.dev/claim=repend-probe --overwrite
          # Patch the claim status to "active on the backing pod" via the status
          # subresource so checkHuskPodLost sees it as Ready on that pod.
          kubectl -n default patch sandboxclaim repend-probe --subresource=status --type=merge \
            -p "{\"status\":{\"phase\":\"Ready\",\"node\":\"${podnode}\",\"endpoint\":\"${podip}:9091\",\"sandboxID\":\"${backing}\"}}"

          # Delete the backing pod: the claim must re-pend (Phase Pending) and the
          # pool must recreate a replacement husk pod.
          kubectl -n default delete pod "$backing" --wait=false

          repended=0
          for i in $(seq 1 36); do
            phase=$(kubectl -n default get sandboxclaim repend-probe -o jsonpath='{.status.phase}' 2>/dev/null || true)
            echo "  [${i}/36] repend-probe phase: '${phase}'"
            if [ "$phase" = "Pending" ]; then repended=1; break; fi
            sleep 5
          done
          if [ "$repended" -ne 1 ]; then
            echo "EVICTION-FAILED: the claim did not re-pend after its husk pod was deleted (HuskPodLost trigger regressed)"
            exit 1
          fi
          # Endpoint/Node cleared on re-pend.
          ep=$(kubectl -n default get sandboxclaim repend-probe -o jsonpath='{.status.endpoint}' 2>/dev/null || true)
          [ -z "$ep" ] || { echo "EVICTION-FAILED: re-pended claim still advertises endpoint '${ep}'"; exit 1; }
          # The pool recreates a replacement husk pod (warm pool restored).
          poolcount=0
          for i in $(seq 1 24); do
            n=$(kubectl get pods -n default -l agentrun.dev/husk=true --field-selector=status.phase!=Failed --no-headers 2>/dev/null | wc -l | tr -d ' ')
            echo "  [${i}/24] husk pod count after re-pend: $n"
            if [ "$n" -ge 2 ]; then poolcount=1; break; fi
            sleep 5
          done
          [ "$poolcount" -eq 1 ] || { echo "EVICTION-FAILED: the pool did not recreate a replacement husk pod after the re-pend"; exit 1; }
          echo "PASS: the claim re-pended (Pending, endpoint cleared) on husk pod loss and the pool recreated a replacement. The full re-activate onto a Ready dormant pod completes where the VMM runs (kvm-test.yaml / bare metal)."
          kubectl -n default delete sandboxclaim repend-probe --ignore-not-found=true --wait=false || true
      - name: Eviction 4, an over-allocatable husk-shaped pod is Unschedulable (autoscaler signal)
        # The native cluster-autoscaler pending signal: a husk-shaped pod whose
        # requests exceed node allocatable stays Pending with an Unschedulable
        # condition. This is the same scheduler-truth probe pattern as Conformance
        # 1, asserted here with the EXPLICIT Unschedulable condition so the
        # autoscaler-trigger narrative is gated (a cluster-autoscaler watches for
        # exactly this Pending+Unschedulable to scale a node group up).
        run: |
          set -euo pipefail
          dump() {
            echo "=== unschedulable diagnostics ==="
            kubectl -n default describe pod husk-unsched-probe 2>/dev/null || true
          }
          trap dump ERR

          cat <<'YAML' | kubectl apply -f -
          apiVersion: v1
          kind: Pod
          metadata:
            name: husk-unsched-probe
            namespace: default
            labels:
              agentrun.dev/husk: "true"
          spec:
            restartPolicy: Always
            containers:
              - name: husk-stub
                image: busybox:stable
                command: ["sleep", "3600"]
                resources:
                  requests:
                    cpu: "1000"
                    memory: 512Mi
          YAML

          unsched=0
          for i in $(seq 1 18); do
            phase=$(kubectl -n default get pod husk-unsched-probe -o jsonpath='{.status.phase}' 2>/dev/null || true)
            reason=$(kubectl -n default get pod husk-unsched-probe \
              -o jsonpath='{range .status.conditions[?(@.type=="PodScheduled")]}{.reason}{end}' 2>/dev/null || true)
            echo "  [${i}/18] husk-unsched-probe phase='${phase}' PodScheduled.reason='${reason}'"
            if [ "$phase" = "Pending" ] && [ "$reason" = "Unschedulable" ]; then unsched=1; break; fi
            sleep 3
          done
          probe_node=$(kubectl -n default get pod husk-unsched-probe -o jsonpath='{.spec.nodeName}' 2>/dev/null || true)
          kubectl -n default delete pod husk-unsched-probe --ignore-not-found=true --wait=false || true
          if [ "$unsched" -ne 1 ] || [ -n "$probe_node" ]; then
            echo "EVICTION-FAILED: the over-allocatable husk-shaped pod was not Pending+Unschedulable (nodeName='${probe_node}'); the native autoscaler signal regressed"
            exit 1
          fi
          echo "PASS: an over-allocatable husk-shaped pod stays Pending with an Unschedulable condition (the native cluster-autoscaler scale-up signal)"
      - name: Best effort, husk pods reach Ready and a claim activates one (full claim -> exec tail)
        # The husk pod becomes Ready ONLY when its dormant Firecracker VMM comes
        # up INSIDE the kind pod (Firecracker nested in a kind-node container).
        # That nested-VMM bring-up is the one piece this shared runner cannot
        # guarantee; the in-VM activation + exec path is GATED in kvm-test.yaml
        # (Firecracker on the host). So this step is BEST EFFORT:
        #   - if a husk pod reaches Ready, create a SandboxClaim, assert it
        #     reaches Ready via husk-pod activation, then exec over the in-pod
        #     sandbox API using the bearer token from <claim>-sandbox-token and
        #     the claim Status.Endpoint, and assert exec works (the FULL default
        #     path, tightened gate);
        #   - if no husk pod reaches Ready in the window, report the documented
        #     kind boundary (HUSK-KIND-VMM) and pass: the cluster lifecycle is
        #     already gated above and the in-VM path is gated in kvm-test.yaml.
        # It never fails the job for the nested-VMM limitation; a real claim or
        # exec failure AFTER a husk pod went Ready DOES fail.
        run: |
          set -euo pipefail
          dump() {
            echo "=== husk activation diagnostics ==="
            kubectl get pods -A -l agentrun.dev/husk=true -o wide || true
            kubectl -n default get sandboxclaim husk-e2e-claim -o yaml || true
            kubectl -n agent-run logs -l app.kubernetes.io/component=controller --tail=120 || true
            for p in $(kubectl get pods -A -l agentrun.dev/husk=true -o jsonpath='{range .items[*]}{.metadata.namespace}/{.metadata.name} {end}'); do
              ns=${p%%/*}; name=${p##*/}
              echo "--- logs $ns/$name ---"; kubectl -n "$ns" logs "$name" --tail=80 || true
            done
          }
          trap 'dump' ERR

          # Wait up to 4 minutes for a husk pod to go Ready (nested dormant VMM up).
          ready=0
          for i in $(seq 1 48); do
            r=$(kubectl get pods -A -l agentrun.dev/husk=true \
              -o jsonpath='{range .items[*]}{range .status.conditions[?(@.type=="Ready")]}{.status}{end} {end}' 2>/dev/null || true)
            echo "  [${i}/48] husk pod Ready conditions: '${r}'"
            for v in $r; do
              if [ "$v" = "True" ]; then ready=1; break; fi
            done
            [ "$ready" = "1" ] && break
            sleep 5
          done

          if [ "$ready" != "1" ]; then
            echo "HUSK-KIND-VMM: no husk pod reached Ready in the window. The nested dormant Firecracker VMM did not come up inside the kind pod, the documented kind boundary. The cluster object lifecycle is gated by the prior steps; the in-VM dormant-VMM + mTLS activation + exec path is gated in kvm-test.yaml (Firecracker on the host). Not failing the job for the nested-VMM limitation."
            kubectl get pods -A -l agentrun.dev/husk=true -o wide || true
            exit 0
          fi

          echo "A husk pod reached Ready, tightening to the FULL claim -> Ready -> exec gate."
          cat <<'YAML' | kubectl apply -f -
          apiVersion: agentrun.dev/v1alpha1
          kind: SandboxClaim
          metadata:
            name: husk-e2e-claim
            namespace: default
          spec:
            poolRef:
              name: husk-e2e
          YAML

          # The claim activates a dormant husk pod in place and goes Ready.
          if ! kubectl -n default wait --for=jsonpath='{.status.phase}'=Ready \
              sandboxclaim/husk-e2e-claim --timeout=180s; then
            echo "HUSK-FAILED: claim did not reach Ready after a husk pod was Ready (activation over the mTLS control channel failed)"
            exit 1
          fi
          echo "PASS: claim activated a husk pod and reached Ready"

          # Exec over the in-pod sandbox API: read the endpoint + bearer token the
          # claim minted, port-forward to the husk pod's sandbox port, and run a
          # command. The token Secret is <claim>-sandbox-token; its value is a
          # secret and is not echoed.
          endpoint=$(kubectl -n default get sandboxclaim husk-e2e-claim -o jsonpath='{.status.endpoint}')
          echo "claim endpoint (podIP:port): $endpoint"
          podip=${endpoint%%:*}
          sbport=${endpoint##*:}
          huskpod=$(kubectl get pods -A -l agentrun.dev/claim=husk-e2e-claim \
            -o jsonpath='{.items[0].metadata.name}')
          hns=$(kubectl get pods -A -l agentrun.dev/claim=husk-e2e-claim \
            -o jsonpath='{.items[0].metadata.namespace}')
          token=$(kubectl -n default get secret husk-e2e-claim-sandbox-token \
            -o jsonpath='{.data.token}' | base64 -d)
          kubectl -n "$hns" port-forward "pod/$huskpod" "18091:${sbport}" >/tmp/pf.log 2>&1 &
          pf=$!
          trap 'kill $pf 2>/dev/null || true; dump' ERR
          # Wait for the port-forward to come up by retrying the exec call. The
          # in-pod sandbox API serves POST /v1/exec; the JSON "sandbox" field is
          # the husk stub's fixed sandbox id ("husk") and is the token-gate key.
          out=""
          for i in $(seq 1 20); do
            out=$(curl -fsS -X POST "http://127.0.0.1:18091/v1/exec" \
              -H "Authorization: Bearer ${token}" \
              -H 'Content-Type: application/json' \
              -d '{"sandbox":"husk","command":"echo husk-e2e-ok","timeout":30}' 2>/dev/null) && break
            sleep 1
          done
          echo "exec response: $out"
          kill $pf 2>/dev/null || true
          echo "$out" | grep -q "husk-e2e-ok" || {
            echo "HUSK-FAILED: exec over the in-pod sandbox API did not return the expected output"
            exit 1
          }
          echo "PASS: exec works over the husk pod sandbox API (FULL default path proven on kind)"
      - name: Husk e2e diagnostics and cleanup
        if: always()
        run: |
          kubectl -n default delete sandboxclaim husk-e2e-claim --ignore-not-found=true || true
          kubectl -n default delete sandboxpool husk-e2e --ignore-not-found=true || true
          kubectl -n default delete sandboxtemplate husk-e2e --ignore-not-found=true || true
          kubectl get pods -A -l agentrun.dev/husk=true -o wide || true

  facade-conformance:
    # The agents.x-k8s.io conformance harness (issue #19): apply the UPSTREAM
    # example Sandbox manifest UNCHANGED against our facade and assert
    # OBJECT-LEVEL conformance on kind. This mirrors kind-e2e-husk (image
    # build/load, kind cluster, CRD install, deploy, apply, assert, diagnostics
    # trap, SETUP-vs-conformance distinction).
    #
    # SCOPE SPLIT, stated honestly:
    #   - PROVEN here (object level, no running sandbox needed): the upstream
    #     agents.x-k8s.io Sandbox CRD ADMITS their manifest verbatim; our facade
    #     CREATES the bridged husk-backed SandboxClaim (owner reference +
    #     agentrun.dev/pool bridge annotation); our facade UPDATES the Sandbox
    #     status with a Ready condition reflecting the run-path state achievable
    #     on kind (Ready=False while the husk claim is Pending, since no VMM
    #     boots here); deleting the Sandbox leaves the claim owner-referenced for
    #     GC and a replicas-0 Sandbox terminates the run-path object.
    #   - NOT asserted here (the #18 nested-VMM boundary): the in-VM Ready tail.
    #     Upstream conformance predicates (PodReady / ChromeReady, the
    #     "Pod is Ready; Service Exists" status) require a RUNNING sandbox. Our
    #     run path reaches Ready only when a dormant Firecracker VMM boots inside
    #     the husk pod, which needs a KVM-capable kubelet (proven in
    #     kvm-test.yaml, not on this shared runner). Their Go e2e suite also
    #     imports their in-tree controller and asserts upstream-controller pods /
    #     services, so it is bare-metal-gated and is NOT run here; see the matrix
    #     in docs/facade-conformance.md.
    #
    # Every failure distinguishes a SETUP issue (image load, CRD install, stack
    # rollout) from a real CONFORMANCE failure, and dumps facade + our-claim +
    # sandbox describe/logs on any failure (trap).
    runs-on: ubuntu-latest
    needs: [go-test, docker-build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - uses: helm/kind-action@v1
        with:
          cluster_name: agent-run-facade
          config: hack/kind-config.yaml
      - name: Build and load the facade + controller images
        # The facade reconciles the upstream Sandbox; the controller owns the
        # SandboxPool/SandboxClaim object lifecycle the facade bridges onto. The
        # device plugin and forkd (the in-VM engine) are NOT needed for the
        # object-level assertions and are deliberately omitted (their VMM tail is
        # the bare-metal boundary documented above).
        run: |
          set -euo pipefail
          docker build -f Dockerfile.facade -t agent-run-facade:ci .
          docker build -f Dockerfile.controller -t agent-run-controller:ci .
          for img in agent-run-facade agent-run-controller; do
            kind load docker-image "$img:ci" --name agent-run-facade
          done
      - name: Install the upstream agents.x-k8s.io CRDs (vendored, unchanged)
        # Install the upstream Sandbox CRD from the vendored third_party tree, so
        # the apiserver ADMITS their Sandbox manifest verbatim. A failure here is
        # a SETUP issue (the vendored CRD did not apply), not a conformance gap.
        run: |
          set -euo pipefail
          kubectl apply -f third_party/agent-sandbox/crds/agents.x-k8s.io_sandboxes.yaml
          kubectl apply -f third_party/agent-sandbox/crds/extensions.agents.x-k8s.io_sandboxtemplates.yaml
          kubectl apply -f third_party/agent-sandbox/crds/extensions.agents.x-k8s.io_sandboxwarmpools.yaml
          kubectl apply -f third_party/agent-sandbox/crds/extensions.agents.x-k8s.io_sandboxclaims.yaml
          kubectl wait --for=condition=Established --timeout=60s \
            crd/sandboxes.agents.x-k8s.io
          for c in sandboxtemplates sandboxwarmpools sandboxclaims; do
            kubectl wait --for=condition=Established --timeout=60s \
              "crd/${c}.extensions.agents.x-k8s.io"
          done
      - name: Deploy our CRDs, controller, and the facade (default-pool=default)
        # Apply our production base (CRDs + controller + RBAC + namespace), then
        # the opt-in facade. Retarget both images to the locally-loaded :ci tags
        # with IfNotPresent (kind serves the local image, no registry pull). The
        # facade default pool is "default" (set below), matching the SandboxPool
        # we create; the upstream manifest carries no agentrun.dev/pool
        # annotation, so the facade binds it to that default pool.
        run: |
          set -euo pipefail
          kubectl apply -k deploy/
          kubectl apply -f deploy/facade/facade.yaml

          kubectl -n agent-run set image deployment/agent-run-controller \
            controller=agent-run-controller:ci
          kubectl -n agent-run set image deployment/agent-run-facade \
            facade=agent-run-facade:ci
          for d in deployment/agent-run-controller deployment/agent-run-facade; do
            kubectl -n agent-run patch "$d" --type=json \
              -p='[{"op":"replace","path":"/spec/template/spec/containers/0/imagePullPolicy","value":"IfNotPresent"}]'
          done
          kubectl -n agent-run scale deployment/agent-run-controller --replicas=1
      - name: Stack rolls out (controller + facade Ready, PKI Secrets exist)
        # Gate: the controller and facade roll out Ready and the controller's
        # EnsurePKI minted the CA + forkd + controller TLS Secrets. A missing
        # rollout or Secret is a SETUP failure, distinct from a conformance gap.
        run: |
          set -euo pipefail
          dump() {
            echo "=== facade-conformance setup diagnostics ==="
            kubectl -n agent-run get pods -o wide || true
            kubectl -n agent-run get secrets || true
            kubectl -n agent-run describe deployment/agent-run-facade || true
            kubectl -n agent-run logs -l app.kubernetes.io/component=facade --tail=80 || true
            kubectl -n agent-run logs -l app.kubernetes.io/component=controller --tail=80 || true
          }
          trap dump ERR
          kubectl -n agent-run rollout status deployment/agent-run-controller --timeout=180s
          kubectl -n agent-run rollout status deployment/agent-run-facade --timeout=180s
          for s in agent-run-ca agent-run-forkd-tls agent-run-controller-tls; do
            kubectl -n agent-run get secret "$s" >/dev/null || {
              echo "FACADE-SETUP: PKI Secret $s missing (EnsurePKI did not complete)"
              exit 1
            }
            echo "PKI Secret present: $s"
          done
      - name: Create the default SandboxPool the facade binds to
        # The facade binds an annotation-less Sandbox to its --default-pool
        # ("default"). Create the SandboxTemplate + SandboxPool so the bridged
        # claim references a real pool object. The pool need not reach Ready for
        # the object-level assertions (a running pool needs the VMM tail); the
        # SandboxClaim CRD admitting the claim is what matters here.
        run: |
          set -euo pipefail
          cat <<'YAML' | kubectl apply -f -
          apiVersion: agentrun.dev/v1alpha1
          kind: SandboxTemplate
          metadata:
            name: default
            namespace: default
          spec:
            image: busybox:stable
            resources:
              cpu: "1"
              memory: 512Mi
          ---
          apiVersion: agentrun.dev/v1alpha1
          kind: SandboxPool
          metadata:
            name: default
            namespace: default
          spec:
            templateRef:
              name: default
            replicas: 0
          YAML
          kubectl -n default get sandboxtemplate default
          kubectl -n default get sandboxpool default
      - name: Apply the upstream example Sandbox manifest UNCHANGED
        # The conformance acceptance: their example manifest applies verbatim.
        # We substitute ONLY the ${IMAGE} placeholder on a COPY (the vendored
        # file is not edited; apply-unchanged is the point), then kubectl apply.
        # A rejection here is a CONFORMANCE failure (their manifest is not
        # admitted by the upstream CRD we installed).
        run: |
          set -euo pipefail
          src=third_party/agent-sandbox/examples/hello-world-sandbox/hello-world.yaml
          cp "$src" /tmp/hello-world.yaml
          sed -i 's#${IMAGE}#busybox:stable#g' /tmp/hello-world.yaml
          echo "=== applied manifest (image placeholder substituted on a copy) ==="
          cat /tmp/hello-world.yaml
          kubectl -n default apply -f /tmp/hello-world.yaml
      - name: Conformance assertions (object level)
        # The five object-level conformance facts. Each is gated; a failure is a
        # CONFORMANCE failure (the setup gates above already passed). The trap
        # dumps the sandbox + our claim + facade logs on any failure.
        run: |
          set -euo pipefail
          dump() {
            echo "=== facade-conformance diagnostics ==="
            kubectl -n default get sandbox.agents.x-k8s.io -o wide || true
            kubectl -n default describe sandbox.agents.x-k8s.io hello-world || true
            kubectl -n default get sandboxclaim -o wide || true
            kubectl -n default describe sandboxclaim hello-world || true
            kubectl -n agent-run logs -l app.kubernetes.io/component=facade --tail=120 || true
          }
          trap dump ERR

          # (a) the Sandbox is ADMITTED by the upstream CRD.
          kubectl -n default get sandbox.agents.x-k8s.io hello-world >/dev/null
          echo "PASS (a): upstream Sandbox admitted verbatim"

          # (b) our facade creates the bridged husk-backed SandboxClaim, with the
          # owner reference back to the Sandbox AND the agentrun.dev/pool bridge
          # annotation.
          claimed=0
          for i in $(seq 1 30); do
            if kubectl -n default get sandboxclaim hello-world >/dev/null 2>&1; then
              claimed=1
              break
            fi
            echo "  [${i}/30] waiting for the bridged SandboxClaim"
            sleep 2
          done
          if [ "$claimed" -ne 1 ]; then
            echo "FACADE-CONFORMANCE: facade did not create the bridged SandboxClaim"
            exit 1
          fi
          owner=$(kubectl -n default get sandboxclaim hello-world \
            -o jsonpath='{.metadata.ownerReferences[0].kind}/{.metadata.ownerReferences[0].name}')
          pool=$(kubectl -n default get sandboxclaim hello-world \
            -o jsonpath='{.metadata.annotations.agentrun\.dev/pool}')
          if [ "$owner" != "Sandbox/hello-world" ]; then
            echo "FACADE-CONFORMANCE: claim owner = '$owner', want Sandbox/hello-world"
            exit 1
          fi
          if [ "$pool" != "default" ]; then
            echo "FACADE-CONFORMANCE: claim agentrun.dev/pool = '$pool', want default"
            exit 1
          fi
          echo "PASS (b): facade bridged a husk-backed SandboxClaim (owner=$owner pool=$pool)"

          # (c) our facade UPDATES the Sandbox status with a Ready condition. On
          # kind no VMM boots, so the run-path state is Ready=False while the
          # husk claim is Pending; assert the condition EXISTS and is being
          # mirrored by the facade (the run-path state reflected here).
          got_cond=0
          for i in $(seq 1 30); do
            status=$(kubectl -n default get sandbox.agents.x-k8s.io hello-world \
              -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || true)
            if [ -n "$status" ]; then
              got_cond=1
              echo "  Ready condition status mirrored by the facade: $status"
              break
            fi
            echo "  [${i}/30] waiting for the facade to mirror the Sandbox status"
            sleep 2
          done
          if [ "$got_cond" -ne 1 ]; then
            echo "FACADE-CONFORMANCE: facade did not mirror a Ready condition into the Sandbox status"
            exit 1
          fi
          echo "PASS (c): facade mirrors the run-path state into the Sandbox status (in-VM Ready tail is the #18 bare-metal boundary, not asserted here)"

          # (d) deleting the Sandbox GCs our claim (owner-reference cascade; a
          # live apiserver runs the garbage collector, unlike envtest).
          kubectl -n default delete sandbox.agents.x-k8s.io hello-world
          gone=0
          for i in $(seq 1 30); do
            if ! kubectl -n default get sandboxclaim hello-world >/dev/null 2>&1; then
              gone=1
              break
            fi
            echo "  [${i}/30] waiting for the owner-reference GC to reap the claim"
            sleep 2
          done
          if [ "$gone" -ne 1 ]; then
            echo "FACADE-CONFORMANCE: deleting the Sandbox did not GC the bridged claim"
            exit 1
          fi
          echo "PASS (d): deleting the Sandbox GCs the bridged claim"

          # (e) a replicas-0 Sandbox terminates the run-path object: re-create the
          # Sandbox, wait for the claim, then scale to replicas 0 and assert the
          # facade deletes the claim.
          sed 's#^spec:#spec:\n  replicas: 1#' /tmp/hello-world.yaml | kubectl -n default apply -f -
          for i in $(seq 1 30); do
            if kubectl -n default get sandboxclaim hello-world >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done
          kubectl -n default patch sandbox.agents.x-k8s.io hello-world --type=merge \
            -p '{"spec":{"replicas":0}}'
          term=0
          for i in $(seq 1 30); do
            if ! kubectl -n default get sandboxclaim hello-world >/dev/null 2>&1; then
              term=1
              break
            fi
            echo "  [${i}/30] waiting for replicas-0 to terminate the run-path object"
            sleep 2
          done
          if [ "$term" -ne 1 ]; then
            echo "FACADE-CONFORMANCE: replicas-0 Sandbox did not terminate the bridged claim"
            exit 1
          fi
          echo "PASS (e): replicas-0 Sandbox releases the run-path object (pause = warm-pool release)"

          # (f) replicas 1->0->1 is an OBJECT-LEVEL resume: the Sandbox is now at
          # replicas 0 with the claim released (from (e)). Scaling back to
          # replicas 1 RE-ACTIVATES it: the facade re-creates the bridged claim
          # via the same warm-pool fast path as create. The in-VM resume tail
          # (snapshot load + resume + guest-ready) is the #18 bare-metal boundary
          # and is NOT asserted here.
          kubectl -n default patch sandbox.agents.x-k8s.io hello-world --type=merge \
            -p '{"spec":{"replicas":1}}'
          resumed=0
          for i in $(seq 1 30); do
            if kubectl -n default get sandboxclaim hello-world >/dev/null 2>&1; then
              resumed=1
              break
            fi
            echo "  [${i}/30] waiting for the replicas-1 resume to re-activate the bridged claim"
            sleep 2
          done
          if [ "$resumed" -ne 1 ]; then
            echo "FACADE-CONFORMANCE: replicas 1->0->1 did not re-activate the bridged claim"
            exit 1
          fi
          owner=$(kubectl -n default get sandboxclaim hello-world \
            -o jsonpath='{.metadata.ownerReferences[0].kind}/{.metadata.ownerReferences[0].name}')
          if [ "$owner" != "Sandbox/hello-world" ]; then
            echo "FACADE-CONFORMANCE: re-activated claim owner = '$owner', want Sandbox/hello-world"
            exit 1
          fi
          echo "PASS (f): replicas 1->0->1 re-activates the run-path object (object-level resume; in-VM tail is the #18 bare-metal boundary)"
          echo "FACADE-CONFORMANCE OK: object-level conformance proven on kind; the in-VM Ready tail is the #18 bare-metal boundary"
      - name: Apply the upstream extension example manifests UNCHANGED
        # Apply their extension examples verbatim: a SandboxTemplate, a
        # SandboxWarmPool (replicas 1, referencing that template), and a
        # SandboxClaim (default warmpool policy, referencing that template). A
        # rejection here is a CONFORMANCE failure (their manifest is not admitted
        # by the upstream extension CRDs we installed).
        run: |
          set -euo pipefail
          kubectl -n default apply -f third_party/agent-sandbox/extensions/examples/sandboxtemplate.yaml
          kubectl -n default apply -f third_party/agent-sandbox/extensions/examples/sandboxwarmpool.yaml
          kubectl -n default apply -f third_party/agent-sandbox/extensions/examples/sandboxclaim.yaml
          echo "extension examples applied unchanged"
      - name: Extension conformance assertions (object level)
        # Object-level facts for the extension mappings: their SandboxTemplate
        # creates our template, their SandboxWarmPool creates our pool at the
        # requested replicas, their SandboxClaim binds our claim from the
        # template-matching pool (default policy), and deletion GCs ours.
        run: |
          set -euo pipefail
          dump() {
            echo "=== facade extension-conformance diagnostics ==="
            kubectl -n default get sandboxtemplate.extensions.agents.x-k8s.io -o wide || true
            kubectl -n default get sandboxwarmpool.extensions.agents.x-k8s.io -o wide || true
            kubectl -n default get sandboxclaim.extensions.agents.x-k8s.io -o wide || true
            kubectl -n default get sandboxtemplate.agentrun.dev -o wide || true
            kubectl -n default get sandboxpool.agentrun.dev -o wide || true
            kubectl -n default get sandboxclaim.agentrun.dev -o wide || true
            kubectl -n agent-run logs -l app.kubernetes.io/component=facade --tail=120 || true
          }
          trap dump ERR

          # (g) their SandboxTemplate creates our template (same name).
          got_tmpl=0
          for i in $(seq 1 30); do
            if kubectl -n default get sandboxtemplate.agentrun.dev secure-datascience-template >/dev/null 2>&1; then
              got_tmpl=1
              break
            fi
            echo "  [${i}/30] waiting for our mirrored SandboxTemplate"
            sleep 2
          done
          if [ "$got_tmpl" -ne 1 ]; then
            echo "FACADE-CONFORMANCE: their SandboxTemplate did not create our template"
            exit 1
          fi
          echo "PASS (g): their SandboxTemplate maps to our template"

          # (h) their SandboxWarmPool creates our pool at the requested replicas
          # (1), pointing at the resolved template.
          got_pool=0
          for i in $(seq 1 30); do
            replicas=$(kubectl -n default get sandboxpool.agentrun.dev sandboxwarmpool-example \
              -o jsonpath='{.spec.replicas}' 2>/dev/null || true)
            if [ "$replicas" = "1" ]; then
              got_pool=1
              break
            fi
            echo "  [${i}/30] waiting for our mirrored SandboxPool at replicas 1"
            sleep 2
          done
          if [ "$got_pool" -ne 1 ]; then
            echo "FACADE-CONFORMANCE: their SandboxWarmPool did not create our pool at replicas 1"
            exit 1
          fi
          tref=$(kubectl -n default get sandboxpool.agentrun.dev sandboxwarmpool-example \
            -o jsonpath='{.spec.templateRef.name}')
          if [ "$tref" != "secure-datascience-template" ]; then
            echo "FACADE-CONFORMANCE: our pool templateRef = '$tref', want secure-datascience-template"
            exit 1
          fi
          echo "PASS (h): their SandboxWarmPool maps to our pool at replicas 1 (template $tref)"

          # (i) their SandboxClaim binds our claim from the template-matching pool
          # (default warmpool policy), with the owner reference + the bridge
          # annotations.
          got_claim=0
          for i in $(seq 1 30); do
            if kubectl -n default get sandboxclaim.agentrun.dev my-secure-sandbox >/dev/null 2>&1; then
              got_claim=1
              break
            fi
            echo "  [${i}/30] waiting for our bridged SandboxClaim"
            sleep 2
          done
          if [ "$got_claim" -ne 1 ]; then
            echo "FACADE-CONFORMANCE: their SandboxClaim did not create our claim"
            exit 1
          fi
          bound_pool=$(kubectl -n default get sandboxclaim.agentrun.dev my-secure-sandbox \
            -o jsonpath='{.spec.poolRef.name}')
          policy=$(kubectl -n default get sandboxclaim.agentrun.dev my-secure-sandbox \
            -o jsonpath='{.metadata.annotations.agentrun\.dev/warmpool-policy}')
          if [ "$bound_pool" != "sandboxwarmpool-example" ]; then
            echo "FACADE-CONFORMANCE: our claim poolRef = '$bound_pool', want sandboxwarmpool-example"
            exit 1
          fi
          if [ "$policy" != "default" ]; then
            echo "FACADE-CONFORMANCE: our claim warmpool-policy = '$policy', want default"
            exit 1
          fi
          echo "PASS (i): their SandboxClaim binds our claim from the template-matching pool (policy=$policy pool=$bound_pool)"

          # (j) deleting their SandboxClaim GCs our claim (owner-reference cascade).
          kubectl -n default delete sandboxclaim.extensions.agents.x-k8s.io my-secure-sandbox
          gone=0
          for i in $(seq 1 30); do
            if ! kubectl -n default get sandboxclaim.agentrun.dev my-secure-sandbox >/dev/null 2>&1; then
              gone=1
              break
            fi
            echo "  [${i}/30] waiting for the owner-reference GC to reap our claim"
            sleep 2
          done
          if [ "$gone" -ne 1 ]; then
            echo "FACADE-CONFORMANCE: deleting their SandboxClaim did not GC our claim"
            exit 1
          fi
          echo "PASS (j): deleting their SandboxClaim GCs our claim"
          echo "FACADE-EXTENSION-CONFORMANCE OK: their SandboxTemplate + SandboxWarmPool + SandboxClaim map to our template/pool/claim object-level on kind; the running-sandbox tail is the #18 bare-metal boundary"
      - name: Facade conformance diagnostics and cleanup
        if: always()
        run: |
          kubectl -n default delete sandbox.agents.x-k8s.io hello-world --ignore-not-found=true || true
          kubectl -n default delete sandboxclaim.extensions.agents.x-k8s.io my-secure-sandbox --ignore-not-found=true || true
          kubectl -n default delete sandboxwarmpool.extensions.agents.x-k8s.io sandboxwarmpool-example --ignore-not-found=true || true
          kubectl -n default delete sandboxtemplate.extensions.agents.x-k8s.io secure-datascience-template --ignore-not-found=true || true
          kubectl -n default delete sandboxpool.agentrun.dev default --ignore-not-found=true || true
          kubectl -n default delete sandboxtemplate.agentrun.dev default --ignore-not-found=true || true
          kubectl -n agent-run logs -l app.kubernetes.io/component=facade --tail=60 || true
